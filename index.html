// Hilfsfunktion: Bild-Element auf Canvas zeichnen und ImageData zurückgeben
function _imgToCanvas(imageEl) {
  const c = document.createElement('canvas');
  c.width  = imageEl.naturalWidth  || imageEl.videoWidth  || imageEl.width  || 640;
  c.height = imageEl.naturalHeight || imageEl.videoHeight || imageEl.height || 480;
  c.getContext('2d').drawImage(imageEl, 0, 0, c.width, c.height);
  return c;
}

async function detectFromImage(imageEl) {
  // Methode 1: native BarcodeDetector (Chrome Android, Safari 17.4+)
  if ('BarcodeDetector' in window) {
    try {
      const fmts = await BarcodeDetector.getSupportedFormats().catch(()=>
        ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','code_93']);
      const det = new BarcodeDetector({
        formats: fmts.length ? fmts : ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'],
      });
      const codes = await det.detect(imageEl);
      if (codes.length) return { code: codes[0].rawValue, method: 'BarcodeDetector' };
    } catch(e) {}
  }

  // Methode 2: Quagga (läuft auf allen Browsern inkl. iOS Safari)
  if (typeof Quagga !== 'undefined') {
    try {
      const canvas = (imageEl instanceof HTMLCanvasElement)
        ? imageEl
        : _imgToCanvas(imageEl);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
      const result = await new Promise((resolve) => {
        Quagga.decodeSingle({
          src: dataUrl,
          numOfWorkers: 0,
          inputStream: { size: 800 },
          decoder: {
            readers: ['ean_reader','ean_8_reader','upc_reader','upc_e_reader','code_128_reader','code_39_reader'],
            multiple: false,
          },
          locate: true,
          locator: { patchSize: 'medium', halfSample: true },
        }, (res) => resolve(res));
      });
      if (result?.codeResult?.code) {
        return { code: result.codeResult.code, method: 'Quagga' };
      }
    } catch(e) {}
  }

  return null;
}

// ── Produkt-Detail-View (mit Referenz-Portionen) ─────────────────────────────
function ProductDetail({ product, barcode, onConfirm, onBack }) {
  // ── Portionen für dieses Produkt auflösen ─────────────────────────────────
  const portions = getPortionsForProduct(product);
  const hasPortions = portions.length > 0;

  // ── State ─────────────────────────────────────────────────────────────────
  // Modus: 'portions' (Portionen-Auswahl) oder 'manual' (Gramm-Eingabe)
  const [mode,    setMode]  = useState(hasPortions ? 'portions' : 'manual');
  const [selP,    setSelP]  = useState(portions[0] || null);   // ausgewählte Portion
  const [count,   setCount] = useState(1);                      // Anzahl Portionen
  const [qty,     setQty]   = useState('100');                  // manuelle Gramm-Eingabe
  const [unit,    setUnit]  = useState(product.isLiq ? 'ml' : 'g');

  // ── Effektive Gramm berechnen ─────────────────────────────────────────────
  // Umrechnungsformel: grams = portionGramm × anzahl  (Portions-Modus)
  //                   grams = eingabe                 (Manual-Modus)
  const effectiveGrams = mode === 'portions' && selP
    ? selP.g * count
    : (+qty || 0);

  // Nährwerte live berechnen
  const macros = calcNutrientFromGrams(product.per100, effectiveGrams);

  // Portion-Label für gespeicherten Eintrag (Anzeige in Verlauf/Journal)
  const portionLabel = mode === 'portions' && selP
    ? (count === 1 ? selP.label : `${count}× ${selP.label}`)
    : `${effectiveGrams}${unit}`;

  // ── Speichern ─────────────────────────────────────────────────────────────
  const confirm = () => {
    onConfirm({
      water:       product.isLiq ? effectiveGrams : 0,
      mealQ:       3,
      calories:    macros.kcal,
      protein:     macros.protein,
      carbs:       macros.carbs,
      fat:         macros.fat,
      sugar:       macros.sugar,
      fiber:       macros.fiber,
      productName: product.name,
      brand:       product.brand,
      quantity:    effectiveGrams,
      unit:        product.isLiq ? 'ml' : 'g',
      portionLabel,                              // neu: Beschriftung für Anzeige
      portionG:    selP?.g || null,              // neu: Basis-Portion in g
      barcode,
      note: '',
    });
  };

  const MRow = ({l,v,u,c}) => (
    <div style={{padding:'8px 10px',background:'#0A0806',borderRadius:8}}>
      <div style={{fontSize:9,color:C.muted,letterSpacing:0.6,textTransform:'uppercase',marginBottom:2}}>{l}</div>
      <div style={{fontSize:18,fontWeight:600,color:c,lineHeight:1}}>{v}</div>
      <div style={{fontSize:10,color:C.muted}}>{u}</div>
    </div>
  );

  return <>
    {/* ── Nährwert-Tabelle (pro 100g) ── */}
    <div style={{...ST.card,marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:600,marginBottom:product.brand?2:8}}>{product.name}</div>
      {product.brand && <div style={{fontSize:12,color:C.muted,marginBottom:10}}>{product.brand}</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 16px',fontSize:12,
        paddingTop:8,borderTop:`1px solid ${C.border}`}}>
        {[
          ['Energie',      product.per100.kcal,    'kcal', C.accent],
          ['Eiweiß',       product.per100.protein, 'g',    C.sport],
          ['Kohlenhydrate',product.per100.carbs,   'g',    C.water],
          ['Fett',         product.per100.fat,     'g',    C.mood],
          ['Zucker',       product.per100.sugar,   'g',    C.danger],
          ['Ballaststoffe',product.per100.fiber,   'g',    C.steps],
        ].map(([l,v,u,c]) => (
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}>
            <span style={{color:C.muted}}>{l}</span>
            <span style={{color:c,fontWeight:500}}>{v} {u}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,color:C.faint,marginTop:8}}>pro 100{product.isLiq?'ml':'g'}</div>
    </div>

    {/* ── Modus-Umschalter (nur wenn Portionen verfügbar) ── */}
    {hasPortions && (
      <div style={{display:'flex',gap:6,marginBottom:14}}>
        {[['portions','📏 Portionen'],['manual','⚖️ Gramm eingeben']].map(([m,l]) => (
          <button key={m} onClick={()=>setMode(m)}
            style={{flex:1,padding:'8px 0',borderRadius:8,fontSize:12,cursor:'pointer',
              fontFamily:'inherit',border:`1px solid ${mode===m?C.water:C.border}`,
              background:mode===m?`${C.water}18`:'transparent',
              color:mode===m?C.water:C.muted,fontWeight:mode===m?600:400}}>
            {l}
          </button>
        ))}
      </div>
    )}

    {/* ══ Portionen-Modus ══ */}
    {mode === 'portions' && (
      <>
        <label style={ST.lbl}>Portion wählen</label>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
          {portions.map((p, i) => (
            <button key={i}
              onClick={() => { setSelP(p); setCount(1); }}
              style={{
                padding:'8px 12px', borderRadius:10, fontSize:12,
                cursor:'pointer', fontFamily:'inherit', textAlign:'left',
                border:`1px solid ${selP===p ? C.water : C.border}`,
                background: selP===p ? `${C.water}18` : C.card,
                color: selP===p ? C.water : C.muted,
                fontWeight: selP===p ? 600 : 400,
              }}>
              <span style={{marginRight:5}}>{p.icon}</span>
              {p.label}
              <div style={{fontSize:10,color:selP===p?C.water+'AA':C.faint,marginTop:2}}>
                {p.g}{product.isLiq?'ml':'g'}
              </div>
            </button>
          ))}
        </div>

        {/* Anzahl-Stepper */}
        {selP && (
          <>
            <label style={ST.lbl}>Anzahl</label>
            <div style={{display:'flex',alignItems:'center',gap:0,marginBottom:14,
              background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden',
              width:'fit-content'}}>
              <button
                onClick={() => setCount(c => Math.max(0.5, +(c - 0.5).toFixed(1)))}
                style={{width:44,height:44,background:'none',border:'none',
                  color:count<=0.5?C.faint:C.text,fontSize:20,cursor:'pointer',
                  opacity:count<=0.5?0.3:1}}>−</button>
              <div style={{minWidth:52,textAlign:'center',padding:'0 8px'}}>
                <div style={{fontSize:18,fontWeight:700,color:C.text,lineHeight:1}}>{count}</div>
                <div style={{fontSize:9,color:C.faint}}>×&nbsp;{selP.label.split('(')[0].trim()}</div>
              </div>
              <button
                onClick={() => setCount(c => +(c + 0.5).toFixed(1))}
                style={{width:44,height:44,background:'none',border:'none',
                  color:C.text,fontSize:20,cursor:'pointer'}}>+</button>
            </div>

            {/* Konvertierungs-Anzeige */}
            <div style={{fontSize:11,color:C.faint,marginBottom:14,
              padding:'6px 10px',background:`${C.water}0A`,borderRadius:6,
              border:`1px solid ${C.water}20`}}>
              {count}× {selP.label} = <strong style={{color:C.water}}>
                {effectiveGrams}{product.isLiq?'ml':'g'}
              </strong>
              &nbsp;·&nbsp;
              <span style={{color:C.muted,fontFamily:'monospace',fontSize:10}}>
                {effectiveGrams}g × {product.per100.kcal}kcal/100g = {macros.kcal}kcal
              </span>
            </div>
          </>
        )}
      </>
    )}

    {/* ══ Manual-Modus (Gramm-Eingabe) ══ */}
    {mode === 'manual' && (
      <>
        <label style={ST.lbl}>Menge</label>
        <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'stretch'}}>
          <input style={{...ST.inp,marginBottom:0,flex:1}} type="number"
            inputMode="numeric" value={qty} onChange={e=>setQty(e.target.value)}/>
          <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:8,
            overflow:'hidden',flexShrink:0}}>
            {['g','ml'].map(u => (
              <button key={u} onClick={()=>setUnit(u)}
                style={{padding:'0 14px',background:unit===u?`${C.water}20`:'transparent',
                  color:unit===u?C.water:C.muted,border:'none',fontSize:13,
                  fontWeight:unit===u?600:400,cursor:'pointer'}}>{u}</button>
            ))}
          </div>
        </div>
        {/* Schnellauswahl-Presets */}
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
          {(product.isLiq ? [100,150,200,250,330,500] : [25,50,75,100,150,200]).map(q => (
            <button key={q} onClick={() => setQty(String(q))}
              style={{padding:'4px 12px',borderRadius:6,fontSize:12,cursor:'pointer',
                border:`1px solid ${+qty===q?C.water:C.border}`,
                background:+qty===q?`${C.water}18`:'transparent',
                color:+qty===q?C.water:C.muted}}>
              {q}{unit}
            </button>
          ))}
        </div>
      </>
    )}

    {/* ── Live-Makro-Anzeige ── */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:16}}>
      <MRow l="Kalorien"       v={macros.kcal}    u="kcal" c={C.accent}/>
      <MRow l="Eiweiß"         v={macros.protein} u="g"    c={C.sport}/>
      <MRow l="Kohlenhydrate"  v={macros.carbs}   u="g"    c={C.water}/>
      <MRow l="Fett"           v={macros.fat}     u="g"    c={C.mood}/>
    </div>

    <button style={ST.btn(C.water)} onClick={confirm}>Eintragen</button>
    <button style={{...ST.outbtn(C.muted),marginTop:8}} onClick={onBack}>Zurück</button>
  </>;
}

// ── Manuelle Nährwert-Eingabe (Fallback wenn nicht in DB) ─────────────────────
function ManualNutrition({ barcode, prefillName, onConfirm, onBack }) {
  const [name,setN]=useState(prefillName||'');
  const [kcal,setK]=useState('');
  const [prot,setP]=useState('');
  const [carb,setC]=useState('');
  const [fat, setF]=useState('');
  const [qty, setQ]=useState('100');
  const [unit,setU]=useState('g');

  const confirm = () => {
    const q=Math.max(+qty||1,1);
    onConfirm({ water:unit==='ml'?q:0, mealQ:3,
      calories:Math.round((+kcal||0)*q/100),
      protein: +((+prot||0)*q/100).toFixed(1),
      carbs:   +((+carb||0)*q/100).toFixed(1),
      fat:     +((+fat ||0)*q/100).toFixed(1),
      productName:name||`Produkt${barcode?' ('+barcode+')':''}`,
      brand:'', quantity:q, unit, barcode:barcode||'', note:'',
    });
  };

  return <>
    <div style={{padding:'10px 14px',background:`${C.water}0E`,border:`1px solid ${C.water}30`,borderRadius:10,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:3}}>Nährwerte manuell eingeben</div>
      <div style={{fontSize:12,color:C.muted}}>Produkt nicht in der Datenbank — Angaben vom Etikett übernehmen.</div>
    </div>
    <label style={ST.lbl}>Produktname</label>
    <input style={ST.inp} placeholder="z.B. REWE Bio Mozzarella" value={name} onChange={e=>setN(e.target.value)}/>
    <div style={ST.grid2}>
      <div><label style={ST.lbl}>kcal / 100g</label><input style={ST.inp} type="number" inputMode="decimal" placeholder="250" value={kcal} onChange={e=>setK(e.target.value)}/></div>
      <div><label style={ST.lbl}>Eiweiß (g)</label><input style={ST.inp} type="number" inputMode="decimal" placeholder="5.0" value={prot} onChange={e=>setP(e.target.value)}/></div>
      <div><label style={ST.lbl}>Kohlenhydrate (g)</label><input style={ST.inp} type="number" inputMode="decimal" placeholder="30.0" value={carb} onChange={e=>setC(e.target.value)}/></div>
      <div><label style={ST.lbl}>Fett (g)</label><input style={ST.inp} type="number" inputMode="decimal" placeholder="8.0" value={fat} onChange={e=>setF(e.target.value)}/></div>
    </div>
    <div style={{fontSize:11,color:C.faint,marginTop:-6,marginBottom:14}}>Alle Angaben pro 100g / 100ml</div>
    <label style={ST.lbl}>Menge</label>
    <div style={{display:'flex',gap:8,marginBottom:16}}>
      <input style={{...ST.inp,marginBottom:0,flex:1}} type="number" inputMode="numeric" value={qty} onChange={e=>setQ(e.target.value)}/>
      <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden',flexShrink:0}}>
        {['g','ml'].map(u=>(<button key={u} onClick={()=>setU(u)}
          style={{padding:'0 14px',background:unit===u?`${C.water}20`:'transparent',
            color:unit===u?C.water:C.muted,border:'none',fontSize:13,fontWeight:unit===u?600:400}}>{u}</button>))}
      </div>
    </div>
    <button style={ST.btn(C.water)} onClick={confirm}>Eintragen</button>
    <button style={{...ST.outbtn(C.muted),marginTop:8}} onClick={onBack}>Zurück</button>
  </>;
}

// ── ProductLookup — Scan- ODER Suchmodal ─────────────────────────────────────
function ProductLookup({ mode, onSave, onClose }) {
  // view: 'scan'|'photo'|'search'|'loading'|'product'|'notfound'|'manual'
  const [view,    setView]   = useState(mode==='scan'?'scan':'search');
  const [product, setProd]   = useState(null);
  const [barcode, setBC]     = useState('');
  const [errMsg,  setErr]    = useState('');
  const [searchQ, setSQ]     = useState('');
  const [results, setRes]    = useState([]);
  const [srching, setSrch]   = useState(false);
  const [manualIn,setMan]    = useState('');
  const [prefill, setPre]    = useState('');

  const videoRef   = useRef(null);
  const captureRef = useRef(null);
  const streamRef  = useRef(null);
  const timerRef   = useRef(null);
  const canvasRef  = useRef(document.createElement('canvas'));

  const stopCam = () => {
    clearTimeout(timerRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
  };

  useEffect(() => () => stopCam(), []);

  // Kamera für Live-Scan starten
  const startLive = async () => {
    setErr(''); setView('scan');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
      });
      streamRef.current = stream;
      await new Promise(r=>setTimeout(r,50)); // kurz warten bis video gemounted
      if (!videoRef.current) { stream.getTracks().forEach(t=>t.stop()); return; }
      videoRef.current.srcObject = stream;
      await videoRef.current.play().catch(()=>{});

      const canvas = canvasRef.current;
      const ctx    = canvas.getContext('2d');
      const tick = async () => {
          if (!streamRef.current) return;
          const vid = videoRef.current;
          if (vid && vid.readyState >= 2 && vid.videoWidth > 0) {
            const result = await detectFromImage(vid);
            if (result && streamRef.current) { stopCam(); fetchProd(result.code); return; }
          }
          timerRef.current = setTimeout(tick, 400);
        };
        tick();
    } catch(err) {
      stopCam();
      if (err.name==='NotAllowedError') { setErr('Kamera-Zugriff verweigert'); }
      // Live-Scan nicht verfügbar → Foto-Modus bleibt
    }
  };

  // Kamera beim Scan-View starten
  useEffect(() => {
    if (view === 'scan') startLive();
  }, []); // nur beim ersten Rendern wenn mode=scan

  // ── Foto scannen ─────────────────────────────────────────────────────────
  const handleCapture = async e => {
    const file = e.target.files?.[0]; if (!file) return; e.target.value='';
    setView('loading'); setErr('');
    try {
      // Bild-Element direkt nutzen — BarcodeDetector arbeitet besser mit <img> als Canvas
      const url = URL.createObjectURL(file);
      const img = new Image();
      await new Promise((res,rej) => { img.onload=res; img.onerror=rej; img.src=url; });
      const result = await detectFromImage(img);
      URL.revokeObjectURL(url);
      if (result) { stopCam(); fetchProd(result.code); }
      else {
        setErr('Kein Barcode erkannt. Tipps: Barcode gerade halten, gute Beleuchtung, möglichst nah herangehen und nur den Barcode im Bild.');
        setView('scan');
      }
    } catch(e) { setErr('Fehler: '+e.message); setView('scan'); }
  };

  // ── OpenFoodFacts Barcode — DE zuerst, world als Fallback ────────────────
  const fetchProd = async code => {
    setBC(code); setView('loading');
    try {
      let json = null;
      // Zuerst DE-Datenbank (Supermarktprodukte Deutschland)
      try {
        const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),10000);
        const res = await fetch(
          `https://de.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,
          { signal:ctrl.signal }
        );
        const j = await res.json();
        if (j.status===1 && j.product?.product_name) json = j;
      } catch(e1) {}
      // Fallback: world.openfoodfacts.org
      if (!json) {
        const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),10000);
        const res = await fetch(
          `https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,
          { signal:ctrl.signal }
        );
        const j = await res.json();
        if (j.status===1 && j.product?.product_name) json = j;
      }
      if (json) {
        setProd(buildProd(json.product)); setView('product');
      } else {
        setPre(''); setView('notfound');
      }
    } catch(err) {
      setErr(err.name==='AbortError'?'Zeitüberschreitung':'Netzwerkfehler');
      setView('scan');
    }
  };

  // ── OpenFoodFacts Suche ───────────────────────────────────────────────────
  const doSearch = async q => {
    if (!q.trim()) return;
    setSrch(true); setErr(''); setRes([]);
    try {
      const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),12000);
      const fields='code,product_name,brands,nutriments,product_quantity_unit';
      const deUrl=`https://de.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=20&sort_by=unique_scans_n&fields=${fields}`;
      const res   = await fetch(deUrl,{signal:ctrl.signal});
      const json  = await res.json();
      const off   = mkItems(json.products||[]);
      setRes(off.slice(0,20));
      if (!off.length) setErr('Keine Treffer — andere Schreibweise versuchen');
    } catch {
      setErr('Kein Netzwerk — manuelle Eingabe nutzen');
    }
    setSrch(false);
  };

  const mkItems = ps => ps.filter(p=>p.product_name?.trim()).map(p=>({
    code:p.code, name:p.product_name.trim(),
    brand:(p.brands||'').split(',')[0].trim(),
    isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),
    kcal:Math.round(pn((p.nutriments||{})['energy-kcal_100g'])),
    nutriments:p.nutriments||{}, pqu:p.product_quantity_unit||'',
  }));

  const buildProd = p => {
    const n=p.nutriments||{}, liq=(p.product_quantity_unit||'').toLowerCase().includes('ml');
    return { name:(p.product_name||'Unbekannt').trim(), brand:(p.brands||'').split(',')[0].trim(), isLiq:liq,
      per100:{ kcal:Math.round(pn(n['energy-kcal_100g'])||(pn(n['energy_100g'])/4.184)||0),
        protein:+(pn(n['proteins_100g']).toFixed(1)), carbs:+(pn(n['carbohydrates_100g']).toFixed(1)),
        fat:+(pn(n['fat_100g']).toFixed(1)), sugar:+(pn(n['sugars_100g']).toFixed(1)),
        fiber:+(pn(n['fiber_100g']).toFixed(1)) } };
  };

  const safeTop='env(safe-area-inset-top,0px)';
  const title = view==='search'||view==='loading'&&!barcode ? 'Produkt suchen' :
                view==='product'||view==='notfound' ? 'Produkt gefunden' : 'Barcode scannen';

  return (
    <div style={{position:'fixed',inset:0,zIndex:400,background:C.bg,display:'flex',flexDirection:'column'}}>
      <input ref={captureRef} type="file" accept="image/*" capture="environment" onChange={handleCapture} style={{display:'none'}}/>

      {/* HEADER */}
      <div style={{flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:`calc(${safeTop} + 16px) 20px 14px`,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <div style={{fontSize:16,fontWeight:600}}>{title}</div>
        <button onClick={()=>{stopCam();onClose();}}
          style={{background:C.faint,border:'none',color:C.text,fontSize:18,
            width:34,height:34,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      </div>

      {/* VIDEO — nur beim Scan sichtbar, immer im DOM */}
      <div style={{flexShrink:0,background:'#000',overflow:'hidden',
          height:view==='scan'&&streamRef.current?'auto':0,position:'relative'}}>
