const toDay   = () => new Date().toISOString().slice(0,10);
const fmtD    = d => { const [y,m,dd]=d.split('-'); return `${dd}.${m}.${y.slice(2)}`; };
const calcBMI = (w,h) => h&&w ? +(w/((h/100)**2)).toFixed(1) : null;
const avg     = arr => arr.length ? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : null;

  get: k => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;} },

};

// Synonyme für häufige Tippfehler / alternative Schreibweisen
const SYNS = {
  'hähnchen':['huhn','hühnchen','chicken','hhn'],
  'hühnchen':['hähnchen','huhn'],
  'möhre':['karotte','möhren','mohre'],
  'karotte':['möhre','karotten'],
  'joghurt':['yogurt','yoghurt','jogurt'],
  'nudeln':['pasta','spaghetti','penne','fusilli'],
  'pasta':['nudeln','spaghetti'],
  'milch':['milk'],
  'ei':['eier','eggs'],
  'brötchen':['semmel','weck','schrippe'],
  'hähnchenbrust':['chicken breast','hühnerbrust'],
  'thunfisch':['tuna','thon'],
  'lachs':['salmon'],
  'blaubeeren':['heidelbeeren','blueberries'],
  'tomate':['tomaten'],
  'paprika':['peperoni'],
  'brokkoli':['broccoli'],
};

function expandQuery(q) {
  const w = q.toLowerCase().trim();
  const extras = SYNS[w] || [];
  // Auch Teilstring-Synonyme
  for (const [key, vals] of Object.entries(SYNS)) {
    if (w.includes(key)) extras.push(...vals);
    if (vals.some(v => w.includes(v))) extras.push(key);
  }
  return [w, ...extras];
}

// Lokale Suche — Sofortergebnisse ohne Netzwerk
function searchLocal(q) {
  if (!q || q.length < 1) return [];
  const ql = q.toLowerCase().trim();
  const expanded = expandQuery(ql); // inkl. Synonyme
  const terms = ql.split(/\s+/).filter(t=>t.length>1);

  const scored = LMDB.map(f => {
    const hay = (f.n+' '+f.b+' '+f.cat).toLowerCase();
    let score = 0;
    // Exakter Name-Match
    if (f.n.toLowerCase() === ql) score += 100;
    // Name beginnt mit Query
    if (f.n.toLowerCase().startsWith(ql)) score += 50;
    // Name enthält Query
    if (f.n.toLowerCase().includes(ql)) score += 30;
    // Kategorie enthält Query
    if (f.cat.toLowerCase().includes(ql)) score += 15;
    // Alle Terme matchen
    if (terms.length>1 && terms.every(t=>hay.includes(t))) score += 25;
    // Mind. ein Synonym matcht
    if (expanded.some(syn => hay.includes(syn))) score += 20;
    // Irgendwas aus dem Heuhaufen
    if (score===0 && hay.includes(ql)) score = 5;
    return { f, score };
  })
  .filter(x => x.score > 0)
  .sort((a,b) => b.score - a.score)
  .slice(0, 12)
  .map(({f}) => ({
    code:'', name:f.n, brand:f.b, isLiq:f.liq,
    kcal:f.k, isLocal:true,
    nutriments:{
      'energy-kcal_100g':f.k, 'proteins_100g':f.p,
      'carbohydrates_100g':f.c, 'fat_100g':f.f,
      'fiber_100g':f.fi, 'sugars_100g':f.s,
    },
    pqu: f.liq ? 'ml' : 'g',
  }));
}

// ── Chart.js wrapper (fixed mobile sizing) ────────────────────────────────────
function CJSChart({ type, labels, datasets, height=170, yMin, yMax, yTicks }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  const key  = useMemo(()=>JSON.stringify({labels,datasets}),[labels,datasets]);

  useEffect(()=>{
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current=null; }

    inst.current = new Chart(ref.current, {
      type,
      data: {
        labels,
        datasets: datasets.map(ds=>({
          label: ds.label,
          data: ds.data,
          borderColor: ds.color,
          backgroundColor: type==='bar' ? ds.color+'85' : ds.fill ? ds.color+'25' : 'transparent',
          borderWidth: type==='bar' ? 0 : 1.5,
          pointBackgroundColor: ds.color,
          pointRadius: type==='bar' ? 0 : 3,
          pointHoverRadius: 5,
          tension: 0.35,
          fill: ds.fill||false,
          borderRadius: type==='bar' ? [3,3,0,0] : 0,
          borderDash: ds.dashed ? [4,3] : undefined,
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration:250 },
        plugins: {
          legend: { display:false },
          tooltip: {
            backgroundColor:C.cardAlt, borderColor:C.border, borderWidth:1,
            titleColor:C.muted, bodyColor:C.text, padding:9, cornerRadius:8, displayColors:false,
          },
        },
        scales: {
          x: {
            grid:{ color:C.border+'66', drawTicks:false },
            ticks:{ color:C.muted, font:{size:10}, maxRotation:0, maxTicksLimit:7 },
            border:{ display:false },
          },
          y: {
            grid:{ color:C.border+'66', drawTicks:false },
            ticks:{ color:C.muted, font:{size:10}, ...(yTicks?{callback:v=>yTicks.includes(v)?v:null}:{}) },
            border:{ display:false },
            ...(yMin!=null?{min:yMin}:{}),
            ...(yMax!=null?{max:yMax}:{}),
          },
        },
      },
    });
    return ()=>{ inst.current?.destroy(); inst.current=null; };
  },[key, type]);

  // Fixed-height container — critical for mobile
  return (
    <div style={{ position:'relative', width:'100%', height:`${height}px` }}>
      <canvas ref={ref} style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%' }} />
    </div>
  );
}

// ── Barcode-Erkennung: BarcodeDetector → ZXing → Quagga ─────────────────────
async function detectFromImage(imageEl) {
  // Methode 1: native BarcodeDetector (iOS 17+, Android Chrome)
  if ('BarcodeDetector' in window) {
    try {
      const fmts = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'];
      const det = new BarcodeDetector({ formats: fmts });
      const codes = await det.detect(imageEl);
      if (codes.length) return { code: codes[0].rawValue, method: 'BarcodeDetector' };
    } catch(e) {}
  }

  // Methode 2: ZXing via Canvas
  const ZXL = window.ZXingLibrary || window.ZXing;
  if (ZXL) {
    try {
      const canvas = document.createElement('canvas');
      if (imageEl instanceof HTMLCanvasElement) {
        canvas.width = imageEl.width; canvas.height = imageEl.height;
        canvas.getContext('2d').drawImage(imageEl, 0, 0);
      } else {
        canvas.width = imageEl.naturalWidth || imageEl.videoWidth || imageEl.width;
        canvas.height = imageEl.naturalHeight || imageEl.videoHeight || imageEl.height;
        canvas.getContext('2d').drawImage(imageEl, 0, 0);
      }
      const id = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
      const hints = new Map();
      hints.set(ZXL.DecodeHintType.TRY_HARDER, true);
      hints.set(ZXL.DecodeHintType.POSSIBLE_FORMATS, [
        ZXL.BarcodeFormat.EAN_13, ZXL.BarcodeFormat.EAN_8,
        ZXL.BarcodeFormat.UPC_A, ZXL.BarcodeFormat.UPC_E,
        ZXL.BarcodeFormat.CODE_128, ZXL.BarcodeFormat.CODE_39,
      ]);
      const reader = new ZXL.MultiFormatReader();
      reader.setHints(hints);
      const lum = new ZXL.RGBLuminanceSource(id.data, canvas.width, canvas.height);
      const bmp = new ZXL.BinaryBitmap(new ZXL.HybridBinarizer(lum));
      const result = reader.decode(bmp).getText();
      if (result) return { code: result, method: 'ZXing' };
    } catch(e) {}
  }

  // Methode 3: Quagga (falls geladen)
  if (typeof Quagga !== 'undefined') {
    try {
      const canvas = document.createElement('canvas');
      const src = imageEl instanceof HTMLCanvasElement ? imageEl : null;
      if (!src) {
        canvas.width = imageEl.naturalWidth || imageEl.videoWidth;
        canvas.height = imageEl.naturalHeight || imageEl.videoHeight;
        canvas.getContext('2d').drawImage(imageEl, 0, 0);
      }
      const result = await new Promise((res) => {
        Quagga.decodeSingle({
          decoder: { readers: ['ean_reader','ean_8_reader','upc_reader','code_128_reader'] },
          locate: true, numOfWorkers: 0,
          inputStream: { size: 1920 },
          src: (src||canvas).toDataURL(),
        }, r => res(r?.codeResult?.code || null));
      });
      if (result) return { code: result, method: 'Quagga' };
    } catch(e) {}
  }

  return null;
}

// ── Produkt-Detail-View (geteilt von Scan + Suche) ────────────────────────────
function ProductDetail({ product, barcode, onConfirm, onBack }) {
  const [qty,  setQty]  = useState('100');
  const [unit, setUnit] = useState(product.isLiq ? 'ml' : 'g');
  const presets = product.isLiq ? [100,200,250,330,500] : [25,50,100,150,200];

  const calc = () => {
    const q=Math.max(+qty||1,1), p=product.per100;
    return { kcal:Math.round(p.kcal*q/100), protein:+(p.protein*q/100).toFixed(1),
             carbs:+(p.carbs*q/100).toFixed(1), fat:+(p.fat*q/100).toFixed(1) };
  };
  const confirm = () => {
    const n=calc();
    onConfirm({ water:product.isLiq?(+qty||0):0, mealQ:3, calories:n.kcal,
      protein:n.protein, carbs:n.carbs, fat:n.fat,
      productName:product.name, brand:product.brand, quantity:+qty, unit, barcode, note:'' });
  };
  const macros = calc();
  const MRow = ({l,v,u,c})=>(<div style={{padding:'8px 10px',background:'#0A0806',borderRadius:8}}>
    <div style={{fontSize:9,color:C.muted,letterSpacing:0.6,textTransform:'uppercase',marginBottom:2}}>{l}</div>
    <div style={{fontSize:18,fontWeight:600,color:c,lineHeight:1}}>{v}</div>
    <div style={{fontSize:10,color:C.muted}}>{u}</div>
  </div>);

  return <>
    <div style={{...ST.card,marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:600,marginBottom:product.brand?2:8}}>{product.name}</div>
      {product.brand&&<div style={{fontSize:12,color:C.muted,marginBottom:10}}>{product.brand}</div>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'4px 16px',fontSize:12,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
        {[['Energie',product.per100.kcal,'kcal',C.accent],['Eiweiß',product.per100.protein,'g',C.sport],
          ['Kohlenhydrate',product.per100.carbs,'g',C.water],['Fett',product.per100.fat,'g',C.mood],
          ['Zucker',product.per100.sugar,'g',C.danger],['Ballaststoffe',product.per100.fiber,'g',C.steps],
        ].map(([l,v,u,c])=>(<div key={l} style={{display:'flex',justifyContent:'space-between',padding:'3px 0'}}>
          <span style={{color:C.muted}}>{l}</span><span style={{color:c,fontWeight:500}}>{v} {u}</span>
        </div>))}
      </div>
      <div style={{fontSize:10,color:C.faint,marginTop:8}}>pro 100{product.isLiq?'ml':'g'}</div>
    </div>

    <label style={ST.lbl}>Menge</label>
    <div style={{display:'flex',gap:8,marginBottom:10,alignItems:'stretch'}}>
      <input style={{...ST.inp,marginBottom:0,flex:1}} type="number" inputMode="numeric" value={qty} onChange={e=>setQty(e.target.value)}/>
      <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden',flexShrink:0}}>
        {['g','ml'].map(u=>(<button key={u} onClick={()=>setUnit(u)}
          style={{padding:'0 14px',background:unit===u?`${C.water}20`:'transparent',
            color:unit===u?C.water:C.muted,border:'none',fontSize:13,fontWeight:unit===u?600:400}}>{u}</button>))}
      </div>
    </div>
    <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>

        style={{padding:'4px 12px',borderRadius:6,fontSize:12,

// ── ProductLookup — Scan- ODER Suchmodal ─────────────────────────────────────
function ProductLookup({ mode, onSave, onClose }) {
  // view: 'scan'|'photo'|'search'|'loading'|'product'|'notfound'|'manual'
  const [view,    setView]   = useState(mode==='scan'?'scan':'search');
  const [product, setProd]   = useState(null);
  const [barcode, setBC]     = useState('');
  const [errMsg,  setErr]    = useState('');
  const [searchQ, setSQ]     = useState('');
  const [results, setRes]    = useState([]);
  const [srching, setSrch]   = useState(false);
  const [manualIn,setMan]    = useState('');
  const [prefill, setPre]    = useState('');

  const videoRef   = useRef(null);
  const captureRef = useRef(null);
  const streamRef  = useRef(null);
  const timerRef   = useRef(null);
  const canvasRef  = useRef(document.createElement('canvas'));

  const stopCam = () => {
    clearTimeout(timerRef.current);
    if (streamRef.current) { streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
  };

  useEffect(() => () => stopCam(), []);

  // Kamera für Live-Scan starten
  const startLive = async () => {
    setErr(''); setView('scan');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
      });
      streamRef.current = stream;
      await new Promise(r=>setTimeout(r,50)); // kurz warten bis video gemounted
      if (!videoRef.current) { stream.getTracks().forEach(t=>t.stop()); return; }
      videoRef.current.srcObject = stream;
      await videoRef.current.play().catch(()=>{});

      const canvas = canvasRef.current;
      const ctx    = canvas.getContext('2d');
      const tick = async () => {
          if (!streamRef.current) return;
          const vid = videoRef.current;
          if (vid && vid.readyState >= 2 && vid.videoWidth > 0) {
            const result = await detectFromImage(vid);
            if (result && streamRef.current) { stopCam(); fetchProd(result.code); return; }
          }
          timerRef.current = setTimeout(tick, 400);
        };
        tick();
    } catch(err) {
      stopCam();
      if (err.name==='NotAllowedError') { setErr('Kamera-Zugriff verweigert'); }
      // Live-Scan nicht verfügbar → Foto-Modus bleibt
    }
  };

  // Kamera beim Scan-View starten
  useEffect(() => {
    if (view === 'scan') startLive();
  }, []); // nur beim ersten Rendern wenn mode=scan

  // ── Foto scannen ─────────────────────────────────────────────────────────
  const handleCapture = async e => {
    const file = e.target.files?.[0]; if (!file) return; e.target.value='';
    setView('loading'); setErr('');
    try {
      // Bild-Element direkt nutzen — BarcodeDetector arbeitet besser mit <img> als Canvas
      const url = URL.createObjectURL(file);
      const img = new Image();
      await new Promise((res,rej) => { img.onload=res; img.onerror=rej; img.src=url; });
      const result = await detectFromImage(img);
      URL.revokeObjectURL(url);
      if (result) { stopCam(); fetchProd(result.code); }
      else {
        setErr('Kein Barcode erkannt. Tipps: Barcode gerade halten, gute Beleuchtung, möglichst nah herangehen und nur den Barcode im Bild.');
        setView('scan');
      }
    } catch(e) { setErr('Fehler: '+e.message); setView('scan'); }
  };

  // ── OpenFoodFacts Barcode ─────────────────────────────────────────────────
  const fetchProd = async code => {
    setBC(code); setView('loading');
    try {
      const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),12000);
      const res = await fetch(
        `https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,
        { signal:ctrl.signal }
      );
      const json = await res.json();
      if (json.status===1 && json.product?.product_name) {
        setProd(buildProd(json.product)); setView('product');
      } else {
        setPre(''); setView('notfound');
      }
    } catch(err) {
      setErr(err.name==='AbortError'?'Zeitüberschreitung':'Netzwerkfehler');
      setView('scan');
    }
  };

  // ── OpenFoodFacts Suche ───────────────────────────────────────────────────
  const doSearch = async q => {
    if (!q.trim()) return;
    setSrch(true); setErr('');
    // 1. Lokale DB sofort anzeigen
    const local = searchLocal(q);
    setRes(local);
    try {
      const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),12000);
      const fields='code,product_name,brands,nutriments,product_quantity_unit';
      // Deutsche Subdomain für bessere DE-Abdeckung
      const deUrl=`https://de.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&action=process&json=1&page_size=20&sort_by=unique_scans_n&fields=${fields}`;
      const res   = await fetch(deUrl,{signal:ctrl.signal});
      const json  = await res.json();
      const off   = mkItems(json.products||[]);
      // Zusammenführen: lokal zuerst, dann OFF (Duplikate nach Name raus)
      const localNames = new Set(local.map(x=>x.name.toLowerCase()));
      const merged = [...local, ...off.filter(x=>!localNames.has(x.name.toLowerCase()))];
      setRes(merged.slice(0,20));
      if (!merged.length) setErr('Keine Treffer — andere Schreibweise versuchen');
    } catch {
      // Netzwerkfehler → lokale Ergebnisse bleiben sichtbar
      if (!local.length) setErr('Kein Netzwerk — nur lokale Ergebnisse');
    }
    setSrch(false);
  };

  const mkItems = ps => ps.filter(p=>p.product_name?.trim()).map(p=>({
    code:p.code, name:p.product_name.trim(),
    brand:(p.brands||'').split(',')[0].trim(),
    isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),
    kcal:Math.round((p.nutriments||{})['energy-kcal_100g']||0),
    nutriments:p.nutriments||{}, pqu:p.product_quantity_unit||'',
  }));

  const buildProd = p => {
    const n=p.nutriments||{}, liq=(p.product_quantity_unit||'').toLowerCase().includes('ml');
    return { name:(p.product_name||'Unbekannt').trim(), brand:(p.brands||'').split(',')[0].trim(), isLiq:liq,
      per100:{ kcal:Math.round(n['energy-kcal_100g']||(n['energy_100g']||0)/4.184),
        protein:+((n['proteins_100g']||0).toFixed(1)), carbs:+((n['carbohydrates_100g']||0).toFixed(1)),
        fat:+((n['fat_100g']||0).toFixed(1)), sugar:+((n['sugars_100g']||0).toFixed(1)),
        fiber:+((n['fiber_100g']||0).toFixed(1)) } };
  };

  const safeTop='env(safe-area-inset-top,0px)';
  const title = view==='search'||view==='loading'&&!barcode ? 'Produkt suchen' :
                view==='product'||view==='notfound' ? 'Produkt gefunden' : 'Barcode scannen';

  return (
    <div style={{position:'fixed',inset:0,zIndex:400,background:C.bg,display:'flex',flexDirection:'column'}}>
      <input ref={captureRef} type="file" accept="image/*" capture="environment" onChange={handleCapture} style={{display:'none'}}/>

      {/* HEADER */}
      <div style={{flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:`calc(${safeTop} + 16px) 20px 14px`,borderBottom:`1px solid ${C.border}`,background:C.bg}}>
        <div style={{fontSize:16,fontWeight:600}}>{title}</div>
        <button onClick={()=>{stopCam();onClose();}}
          style={{background:C.faint,border:'none',color:C.text,fontSize:18,
            width:34,height:34,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
      </div>

      {/* VIDEO — nur beim Scan sichtbar, immer im DOM */}
      <div style={{flexShrink:0,background:'#000',overflow:'hidden',
          height:view==='scan'&&streamRef.current?'auto':0,position:'relative'}}>
        <div style={{position:'relative',paddingTop:'56.25%'}}>
          <video ref={videoRef} playsInline muted autoPlay
            style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}}/>
          <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
            <div style={{width:'80%',aspectRatio:'3/1',border:`2px solid ${C.accent}`,borderRadius:8,
                boxShadow:'0 0 0 9999px rgba(0,0,0,0.45)'}}/>
          </div>
          <div style={{position:'absolute',bottom:10,left:0,right:0,textAlign:'center',
              fontSize:11,color:'rgba(234,224,208,0.9)',textShadow:'0 1px 4px #000',pointerEvents:'none'}}>
            Barcode in den Rahmen halten
          </div>
        </div>
      </div>

      {/* INHALT */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 20px 40px'}}>

        {view==='loading'&&<div style={{textAlign:'center',padding:'60px 0'}}>
          <div style={{fontSize:28,color:C.water,marginBottom:12}}>⋯</div>
          <div style={{fontSize:13,color:C.muted}}>{barcode?`Suche ${barcode}…`:'Wird gesucht…'}</div>
        </div>}

        {view==='scan'&&<>
          {/* Status: welche Erkennungsmethoden verfügbar */}
          <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
            {[
              ['BarcodeDetector', 'BarcodeDetector' in window],
              ['ZXing', !!(window.ZXingLibrary||window.ZXing)],
              ['Quagga', typeof Quagga!=='undefined'],
            ].map(([l,ok])=>(
              <span key={l} style={{fontSize:10,padding:'2px 8px',borderRadius:10,
                background:ok?`${C.success}18`:`${C.danger}18`,
                color:ok?C.success:C.muted}}>
                {ok?'✓':'✗'} {l}
              </span>
            ))}
          </div>
          {errMsg&&<div style={{fontSize:12,color:C.danger,marginBottom:12,padding:'8px 12px',background:`${C.danger}14`,borderRadius:8}}>{errMsg}</div>}
          <button style={{...ST.btn(C.water),marginBottom:10}} onClick={()=>captureRef.current.click()}>
            📷 Foto aufnehmen & Barcode erkennen
          </button>
          <button style={{...ST.outbtn(C.muted),marginBottom:8}} onClick={()=>{stopCam();setView('search');}}>
            🔍 Nach Namen suchen
          </button>
          <button style={ST.outbtn(C.muted)} onClick={()=>{stopCam();setMan('');setView('manualbc');}}>
            ✎ Barcode manuell eingeben
          </button>
        </>}

        {view==='search'&&<>
          <div style={{display:'flex',gap:8,marginBottom:12}}>
            <input style={{...ST.inp,marginBottom:0,flex:1}} placeholder="z.B. Vollmilch, Haferflocken, Joghurt…"
              value={searchQ} onChange={e=>{ setSQ(e.target.value); setRes(searchLocal(e.target.value)); }}
              onKeyDown={e=>e.key==='Enter'&&doSearch(searchQ)} autoFocus/>
            <button onClick={()=>doSearch(searchQ)}
              style={{background:C.water,color:C.bg,border:'none',borderRadius:8,padding:'0 16px',
                fontSize:13,fontWeight:600,flexShrink:0,opacity:srching?0.6:1}}>
              {srching?'…':'Suchen'}
            </button>
          </div>
          {errMsg&&<div style={{fontSize:12,color:C.danger,marginBottom:12,padding:'8px 12px',background:`${C.danger}14`,borderRadius:8}}>{errMsg}</div>}
          {results.map(r=>(
            <button key={r.code||r.name} onClick={()=>{setProd(buildProd({product_name:r.name,brands:r.brand,nutriments:r.nutriments,product_quantity_unit:r.pqu}));setBC(r.code||'');setView('product');}}
              style={{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
                padding:'12px 14px',textAlign:'left',marginBottom:6,display:'block'}}>
              <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{r.name}</div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{fontSize:11,color:C.muted}}>{r.brand||'—'}</span>
                {r.kcal>0&&<span style={{fontSize:11,color:C.accent,fontWeight:500}}>{r.kcal} kcal/100{r.isLiq?'ml':'g'}</span>}
              </div>
            </button>
          ))}
          {results.length>0&&<div style={{fontSize:11,color:C.faint,textAlign:'center',margin:'8px 0'}}>{results.length} Ergebnisse</div>}
          <button style={{...ST.outbtn(C.muted),marginTop:8}} onClick={()=>{setPre(searchQ);setView('manual');}}>
            Nährwerte manuell eingeben
          </button>
        </>}

        {view==='manualbc'&&<>
          <label style={ST.lbl}>Barcode-Nummer (EAN)</label>
          <input style={ST.inp} type="number" inputMode="numeric" placeholder="z.B. 4388860678727"
            value={manualIn} onChange={e=>setMan(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&manualIn&&fetchProd(manualIn.trim())}/>
          <button style={ST.btn(C.water)} onClick={()=>manualIn&&fetchProd(manualIn.trim())}>In Datenbank suchen</button>
          <button style={{...ST.outbtn(C.muted),marginTop:8}} onClick={()=>setView('scan')}>Zurück</button>
        </>}

        {view==='product'&&product&&(
          <ProductDetail product={product} barcode={barcode} onConfirm={onSave}
            onBack={()=>{setProd(null);setView(mode==='scan'?'scan':'search');}}/>
        )}

        {view==='notfound'&&(
          <ManualNutrition barcode={barcode} prefillName={prefill} onConfirm={onSave}
            onBack={()=>setView(mode==='scan'?'scan':'search')}/>
        )}

        {view==='manual'&&(
          <ManualNutrition barcode='' prefillName={prefill} onConfirm={onSave}
            onBack={()=>setView('search')}/>
        )}

      </div>
    </div>
  );
}


function preview(e) {
  const d=e.data;
  if(e.type==='gewicht')    return `${d.weight} kg${d.bmi?`  ·  BMI ${d.bmi}`:''}`;
  if(e.type==='sport')      return `${d.sportType}  ·  ${d.duration} min`;
  if(e.type==='stimmung')   return `Stimmung ${d.mood}/10  ·  Energie ${d.energy}/10`;
  if(e.type==='ernaehrung') { if(d.productName) return `${d.productName}${d.calories?' · '+d.calories+' kcal':''}`; return `${d.water} ml Wasser`; }
  if(e.type==='schlaf')     return `${d.hours} Std  ·  Qualität ${d.quality}/5`;
  if(e.type==='schritte')   return `${d.steps.toLocaleString('de-DE')} Schritte`;
  return '';
}

// ── Apple Health XML Import ───────────────────────────────────────────────────
function HealthImport({ onImport, settings }) {
  const [state,setState]   = useState('idle'); // idle|loading|preview|done|error
  const [parsed,setParsed] = useState(null);
  const [errMsg,setErr]    = useState('');

  const parseDoc = text => {
    const doc = new DOMParser().parseFromString(text,'text/xml');
    if (doc.querySelector('parsererror')) throw new Error('XML konnte nicht gelesen werden');
    return doc;
  };

  const readFile = async e => {
    const file = e.target.files[0];
    if (!file) return;
    setState('loading'); setParsed(null); setErr('');
    try {
      let doc;
      if (file.name.toLowerCase().endsWith('.zip')) {
        if (typeof JSZip==='undefined') throw new Error('ZIP-Unterstützung lädt noch — kurz warten und nochmal versuchen');
        const zip = await JSZip.loadAsync(file);
        const xmlEntry = Object.values(zip.files).find(f=>!f.dir&&f.name.includes('export.xml')&&!f.name.includes('cda'));
        if (!xmlEntry) throw new Error('Keine export.xml in der ZIP — ist es ein Apple Health Export?');
        doc = parseDoc(await xmlEntry.async('string'));
      } else {
        doc = parseDoc(await file.text());
      }

      const entries = [];
      let gw=0,sp=0,sl=0,sc=0;

      // Gewicht
      doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierBodyMass"]').forEach(r=>{
        const date=r.getAttribute('startDate')?.slice(0,10);
        const val=parseFloat(r.getAttribute('value'));
        const unit=r.getAttribute('unit');
        if(!date||isNaN(val)) return;
        const kg=unit==='lb'?+(val*0.453592).toFixed(1):val;
        entries.push({id:uid(),date,ts:new Date(date).getTime(),type:'gewicht',
          data:{weight:kg,fat:null,bmi:calcBMI(kg,settings.height),note:'Apple Health'}});
        gw++;
      });

      // Körperfett
      const fatMap={};
      doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierBodyFatPercentage"]').forEach(r=>{
        const date=r.getAttribute('startDate')?.slice(0,10);
        const val=parseFloat(r.getAttribute('value'));
        if(date&&!isNaN(val)) fatMap[date]=+(val*100).toFixed(1);
      });
      entries.forEach(e=>{ if(e.type==='gewicht'&&fatMap[e.date]) e.data.fat=fatMap[e.date]; });

      // Workouts
      doc.querySelectorAll('Workout').forEach(w=>{
        const date=w.getAttribute('startDate')?.slice(0,10);
        const dur=parseFloat(w.getAttribute('duration'));
        const actType=w.getAttribute('workoutActivityType');
        const cal=w.getAttribute('totalEnergyBurned');
        if(!date||isNaN(dur)||dur<1) return;
        entries.push({id:uid(),date,ts:new Date(date).getTime(),type:'sport',
          data:{sportType:ACTIVITY_MAP[actType]||'Sonstiges',duration:Math.round(dur),
                intensity:3,calories:cal?Math.round(parseFloat(cal)):null,note:'Apple Health'}});
        sp++;
      });

      // Schlaf
      const sleepMap={};
      doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierSleepAnalysis"]').forEach(r=>{
        const val=r.getAttribute('value')||'';
        if(!val.includes('Asleep')&&val!=='HKCategoryValueSleepAnalysisAsleep') return;
        const date=r.getAttribute('startDate')?.slice(0,10);
        const mins=(new Date(r.getAttribute('endDate'))-new Date(r.getAttribute('startDate')))/60000;
        if(date&&mins>0) sleepMap[date]=(sleepMap[date]||0)+mins;
      });
      Object.entries(sleepMap).forEach(([date,mins])=>{
        entries.push({id:uid(),date,ts:new Date(date).getTime(),type:'schlaf',
          data:{hours:+(mins/60).toFixed(1),quality:3,note:'Apple Health'}});
        sl++;
      });

      // Schritte — pro Tag summiert
      const stepsMap={};
      doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierStepCount"]').forEach(r=>{
        const date=r.getAttribute('startDate')?.slice(0,10);
        const val=parseInt(r.getAttribute('value'));
        if(date&&!isNaN(val)) stepsMap[date]=(stepsMap[date]||0)+val;
      });
      Object.entries(stepsMap).forEach(([date,steps])=>{
        entries.push({id:uid(),date,ts:new Date(date).getTime(),type:'schritte',
          data:{steps,note:'Apple Health'}});
        sc++;
      });

      if (entries.length===0)
        throw new Error('Keine Daten gefunden — ist es eine Apple Health export.xml?');

      // Datumsbereich
      const dates=entries.map(e=>e.date).sort();
      setParsed({ entries, gw, sp, sl, sc, from:dates[0], to:dates[dates.length-1] });
      setState('preview');
    } catch(err) {
      setErr(err.message||'Unbekannter Fehler');
      setState('error');
    }
    e.target.value='';
  };

  const confirm = () => {
    onImport(parsed.entries);
    setState('done');
  };

  const reset = () => { setState('idle'); setParsed(null); setErr(''); };

  const Row = ({label,count,color}) => count>0 ? (
    <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${C.border}44`,fontSize:12}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:3,height:10,background:color,borderRadius:1}}/>
        <span style={{color:C.muted}}>{label}</span>
      </div>
      <span style={{color,fontWeight:600}}>{count.toLocaleString('de-DE')}</span>
    </div>
  ) : null;

  return (
    <div style={ST.card}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>Apple Health Import</div>

      {state==='idle'&&<>
        <div style={{fontSize:12,color:C.muted,marginBottom:6,lineHeight:1.7}}>
          Gewicht, Workouts, Schlaf und Schritte aus Apple Health importieren.
        </div>
        <div style={{fontSize:11,color:C.faint,marginBottom:14,lineHeight:1.8,padding:'8px 12px',background:`${C.border}44`,borderRadius:8}}>
          1. Health App → Profil-Bild → "Alle Gesundheitsdaten exportieren"<br/>
          2. ZIP direkt auswählen — kein Entpacken nötig
        </div>
        <label style={{...ST.btn(C.accent),display:'block',textAlign:'center',cursor:'pointer'}}>
          ZIP oder XML auswählen
          <input type="file" accept=".zip,.xml" onChange={readFile} style={{display:'none'}}/>
        </label>
      </>}

      {state==='loading'&&(
        <div style={{textAlign:'center',padding:'20px 0',color:C.muted,fontSize:13}}>
          Wird gelesen…
        </div>
      )}

      {state==='preview'&&parsed&&<>
        <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6}}>
          Zeitraum: <span style={{color:C.text}}>{fmtD(parsed.from)} — {fmtD(parsed.to)}</span>
        </div>
        <div style={{marginBottom:14}}>
          <Row label="Gewichtsmessungen" count={parsed.gw} color={C.accent}/>
          <Row label="Workouts"          count={parsed.sp} color={C.sport}/>
          <Row label="Schlafdaten"       count={parsed.sl} color={C.sleep}/>
          <Row label="Schrittdaten"      count={parsed.sc} color={C.steps}/>
          <div style={{display:'flex',justifyContent:'space-between',padding:'7px 0',fontSize:13}}>
            <span style={{fontWeight:600}}>Gesamt</span>
            <span style={{fontWeight:700,color:C.accent}}>{parsed.entries.length.toLocaleString('de-DE')} Einträge</span>
          </div>
        </div>
        <button style={{...ST.btn(C.accent),marginBottom:8}} onClick={confirm}>
          Importieren
        </button>
        <button style={{...ST.outbtn(C.muted)}} onClick={reset}>Abbrechen</button>
      </>}

      {state==='done'&&<>
        <div style={{fontSize:12,color:C.success,marginBottom:14,padding:'10px 14px',background:`${C.success}14`,borderRadius:8}}>
          Import abgeschlossen.
        </div>
        <button style={ST.outbtn(C.muted)} onClick={reset}>Weiteren Import starten</button>
      </>}

      {state==='error'&&<>
        <div style={{fontSize:12,color:C.danger,marginBottom:14,padding:'10px 14px',background:`${C.danger}14`,borderRadius:8,lineHeight:1.6}}>
          <b>Fehler:</b> {errMsg}
        </div>
        <button style={ST.outbtn(C.muted)} onClick={reset}>Nochmal versuchen</button>
      </>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]           = useState('dashboard');
  const [entries,setEntries]   = useState(()=>store.get('entries')||[]);
  const [settings,setSettings] = useState(()=>store.get('settings')||{height:175});
  const [activeForm,setAF]     = useState(null);
  const [range,setRange]       = useState('30d');
  const [editing,setEditing]   = useState(null);

  useEffect(()=>{ store.set('entries',entries); },[entries]);
  useEffect(()=>{ store.set('settings',settings); },[settings]);

  const add = useCallback((type,data)=>{
    setEntries(prev=>[{id:uid(),date:toDay(),ts:Date.now(),type,data},...prev]);
    setAF(null);
  },[]);

  const del = useCallback(id=>setEntries(prev=>prev.filter(e=>e.id!==id)),[]);

  const updateEntry = useCallback((id,newData)=>{
    setEntries(prev=>prev.map(e=>e.id===id?{...e,data:newData}:e));
    setEditing(null);
  },[]);

  const importHealth = useCallback(newEntries=>{
    setEntries(prev=>{
      const existingKeys = new Set(prev.map(e=>`${e.type}|${e.date}`));
      const filtered = newEntries.filter(e=>{
        if(e.type==='gewicht'||e.type==='schlaf') return !existingKeys.has(`${e.type}|${e.date}`);
        return true;
      });
      return [...filtered,...prev].sort((a,b)=>b.ts-a.ts);
    });
  },[]);

  // Today aggregates
  const todayEs  = useMemo(()=>entries.filter(e=>e.date===toDay()),[entries]);
  const todayW   = todayEs.find(e=>e.type==='gewicht')?.data.weight;
  const todayS   = todayEs.filter(e=>e.type==='sport').reduce((s,e)=>s+(e.data.duration||0),0);
  const todayM   = todayEs.find(e=>e.type==='stimmung')?.data.mood;
  const todayWtr = todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.water||0),0);
  const todaySl  = todayEs.find(e=>e.type==='schlaf')?.data.hours;

  // Streak
  const streak = useMemo(()=>{
    const dates = new Set(entries.map(e=>e.date));
    let count=0, d=new Date();
    while(dates.has(d.toISOString().slice(0,10))) { count++; d.setDate(d.getDate()-1); }
    return count;
  },[entries]);

  // Filtered by range
  const filtered = useCallback(type=>{
    const base = entries.filter(e=>e.type===type).sort((a,b)=>a.ts-b.ts);
    if (range==='all') return base;
    const days={'7d':7,'30d':30,'3m':90,'1y':365}[range];
    const cut = Date.now()-days*864e5;
    return base.filter(e=>e.ts>=cut);
  },[entries,range]);

  const gwE  = useMemo(()=>filtered('gewicht'),[filtered]);
  const spE  = useMemo(()=>{ const m={}; filtered('sport').forEach(e=>{m[e.date]=(m[e.date]||0)+(e.data.duration||0);}); return Object.entries(m).map(([d,v])=>({date:d,min:v})); },[filtered]);
  const stE  = useMemo(()=>filtered('stimmung'),[filtered]);
  const wtE  = useMemo(()=>{ const m={}; filtered('ernaehrung').forEach(e=>{m[e.date]=(m[e.date]||0)+(e.data.water||0);}); return Object.entries(m).map(([d,v])=>({date:d,ml:v})); },[filtered]);
  const slE  = useMemo(()=>filtered('schlaf'),[filtered]);
  const scE  = useMemo(()=>{ const m={}; filtered('schritte').forEach(e=>{m[e.date]=(m[e.date]||0)+(e.data.steps||0);}); return Object.entries(m).map(([d,v])=>({date:d,steps:v})); },[filtered]);
  const calE = useMemo(()=>{ const m={}; filtered('ernaehrung').forEach(e=>{if(e.data.calories)m[e.date]=(m[e.date]||0)+(e.data.calories||0);}); return Object.entries(m).sort().map(([d,kcal])=>({date:d,kcal})); },[filtered]);

  const exportXLSX = () => {
    const wb=XLSX.utils.book_new();
    Object.entries(METRICS).forEach(([key,m])=>{
      const rows=entries.filter(e=>e.type===key).map(e=>({Datum:e.date,...e.data}));
      if(rows.length) XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),m.label);
    });
    XLSX.writeFile(wb,`HealthLog_${toDay()}.xlsx`);
  };

  const exportJSON = () => {
    const blob=new Blob([JSON.stringify({entries,settings,exported:new Date().toISOString()},null,2)],{type:'application/json'});
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`HealthLog_${toDay()}.json`}).click();
  };

  const dayStr = new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});

  // ── Dashboard ──────────────────────────────────────────────────────────────
  function Dashboard() {
    const stats = [
      {label:'Gewicht', val:todayW,       unit:todayW?`BMI ${calcBMI(todayW,settings.height)}`:'kg',  clr:C.accent},
      {label:'Aktivität',val:todayS||null, unit:'min',                                                 clr:C.sport},
      {label:'Stimmung', val:todayM,       unit:todayM?'/10':'',                                       clr:C.mood},
      {label:'Wasser',   val:todayWtr||null,unit:'ml',                                                 clr:C.water},
      {label:'Schlaf',   val:todaySl,      unit:todaySl?'Std':'',                                      clr:C.sleep},
    ];
    return <>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Heute</div>
        <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:22,fontWeight:400,lineHeight:1.25,marginBottom:6}}>{dayStr}</div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <div style={{fontSize:12,color:C.muted}}>{todayEs.length} Einträge</div>
          {streak>0&&<div style={ST.pill(C.accent)}>{streak} {streak===1?'Tag':'Tage'} Streak</div>}
        </div>
      </div>

      <div style={{...ST.grid2, gridTemplateColumns:'1fr 1fr 1fr'}}>
        {stats.slice(0,3).map(s=>(
          <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
            <Bar color={s.clr}/>
            <div style={{fontSize:9,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:5}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:600,color:s.val!=null?s.clr:C.faint,lineHeight:1}}>{s.val??'—'}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{s.unit}</div>
          </div>
        ))}
      </div>
      <div style={ST.grid2}>
        {stats.slice(3).map(s=>(
          <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
            <Bar color={s.clr}/>
            <div style={{fontSize:9,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:5}}>{s.label}</div>
            <div style={{fontSize:22,fontWeight:600,color:s.val!=null?s.clr:C.faint,lineHeight:1}}>{s.val??'—'}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{s.unit}</div>
          </div>
        ))}
      </div>

      <div style={ST.secttl}>Schnelleintrag</div>
      <div style={ST.grid2}>
        {Object.entries(METRICS).map(([key,m])=>(
          <button key={key} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 12px',textAlign:'left'}}
            onClick={()=>{setTab('eingabe');setAF(key);}}>

            <div style={{fontSize:13,fontWeight:500,color:C.text}}>{m.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{m.unit} eintragen</div>
          </button>
        ))}
      </div>

      {entries.length===0
        ? <div style={{...ST.card,textAlign:'center',padding:36}}><div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>Noch keine Einträge.<br/>Starte mit dem ersten Eintrag.</div></div>
        : <>
          <div style={ST.secttl}>Zuletzt eingetragen</div>
          {entries.slice(0,6).map(e=>(
            <div key={e.id} style={{...ST.card,display:'flex',alignItems:'center',gap:14,padding:'12px 16px'}}>
              <div style={{width:3,height:32,borderRadius:2,background:METRICS[e.type].color,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600}}>{METRICS[e.type].label}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.date}  ·  {preview(e)}</div>
              </div>
              <div style={{display:'flex',gap:2,flexShrink:0}}>
                <button onClick={()=>setEditing(e)} style={{background:'none',border:'none',color:C.muted,fontSize:13,padding:'4px 6px'}}>✎</button>
                <button onClick={()=>del(e.id)} style={{background:'none',border:'none',color:C.faint,fontSize:16,padding:'4px 6px'}}>×</button>
              </div>
            </div>
          ))}
        </>}
    </>;
  }

  // ── Eingabe ────────────────────────────────────────────────────────────────
  function Eingabe() {
    // Local height state — onBlur to avoid re-render on each keystroke
    const [heightVal,setHV] = useState(String(settings.height));
    return <>
      <div style={ST.secttl}>Kategorie</div>
      <div style={ST.grid2}>
        {Object.entries(METRICS).map(([key,m])=>(
          <button key={key} style={{background:activeForm===key?`${m.color}14`:C.card,border:`1px solid ${activeForm===key?m.color+'60':C.border}`,borderRadius:12,padding:'14px 12px',textAlign:'left'}}
            onClick={()=>setAF(key)}>
            <Bar color={m.color}/>
            <div style={{fontSize:13,fontWeight:500,color:activeForm===key?m.color:C.text}}>{m.label}</div>
          </button>
        ))}
      </div>

      {activeForm
        ? <div style={ST.card}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:2}}>Eintrag</div>
              <div style={{fontSize:16,fontWeight:600,color:METRICS[activeForm].color}}>{METRICS[activeForm].label}</div>
            </div>
            {activeForm==='gewicht'    && <GewichtForm    add={add} settings={settings}/>}
            {activeForm==='sport'      && <SportForm      add={add}/>}
            {activeForm==='stimmung'   && <StimmungForm   add={add}/>}
            {activeForm==='ernaehrung' && <ErnaehrungForm add={add}/>}
            {activeForm==='schlaf'     && <SchlafForm     add={add}/>}
            {activeForm==='schritte'   && <SchrittForm    add={add}/>}
          </div>
        : <div style={{...ST.card,padding:28,textAlign:'center',color:C.muted,fontSize:13}}>Kategorie oben auswählen</div>}

      <div style={{...ST.card,marginTop:4}}>
        <div style={{fontSize:11,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:12}}>Einstellungen</div>
        <label style={ST.lbl}>Körpergröße (cm)</label>
        <input
          style={ST.inp}
          type="number"
          inputMode="numeric"
          value={heightVal}
          onChange={e=>setHV(e.target.value)}
          onBlur={()=>setSettings(s=>({...s,height:+heightVal||175}))}
        />
        <div style={{fontSize:11,color:C.muted,marginTop:-8}}>Wird für BMI-Berechnung verwendet</div>
      </div>
    </>;
  }

  // ── Verlauf ────────────────────────────────────────────────────────────────
  function Verlauf() {
    const wAvg  = avg(gwE.map(e=>e.data.weight));
    const sSum  = spE.reduce((a,e)=>a+e.min,0);
    const mAvg  = avg(stE.map(e=>e.data.mood));
    const wlAvg = avg(wtE.map(e=>e.ml));
    const slAvg = avg(slE.map(e=>e.data.hours));
    const scAvg  = scE.length ? Math.round(scE.reduce((a,e)=>a+e.steps,0)/scE.length) : null;
    const calAvg = calE.length ? Math.round(calE.reduce((a,e)=>a+e.kcal,0)/calE.length) : null;

    return <>
      <div style={{display:'flex',gap:6,marginBottom:22,flexWrap:'wrap'}}>
        {['7d','30d','3m','1y','all'].map(r=>(
          <button key={r} style={ST.rng(range===r)} onClick={()=>setRange(r)}>
            {r==='7d'?'7 Tage':r==='30d'?'30 Tage':r==='3m'?'3 Mon.':r==='1y'?'1 Jahr':'Alles'}
          </button>
        ))}
      </div>

      <ChartCard title="Gewichtsverlauf (kg)" color={C.accent} empty={!gwE.length} stat={wAvg?`Ø ${wAvg} kg`:null}>
        <CJSChart type="line" height={170}
          labels={gwE.map(e=>fmtD(e.date))}
          datasets={[{label:'Gewicht (kg)',data:gwE.map(e=>e.data.weight),color:C.accent,fill:true}]} />
      </ChartCard>

      <ChartCard title="Sportaktivität (Minuten)" color={C.sport} empty={!spE.length} stat={sSum?`${sSum} min`:null}>
        <CJSChart type="bar" height={170}
          labels={spE.map(e=>fmtD(e.date))}
          datasets={[{label:'Dauer (min)',data:spE.map(e=>e.min),color:C.sport}]} />
      </ChartCard>

      <ChartCard title="Stimmung, Energie & Stress" color={C.mood} empty={!stE.length} stat={mAvg?`Ø ${mAvg}/10`:null}>
        <CJSChart type="line" height={170} yMin={1} yMax={10} yTicks={[1,5,10]}
          labels={stE.map(e=>fmtD(e.date))}
          datasets={[
            {label:'Stimmung',data:stE.map(e=>e.data.mood),   color:C.mood},
            {label:'Energie', data:stE.map(e=>e.data.energy), color:C.sport},
            {label:'Stress',  data:stE.map(e=>e.data.stress), color:C.danger,dashed:true},
          ]} />
        <div style={{display:'flex',gap:14,marginTop:10,fontSize:11}}>
          <span style={{color:C.mood}}>— Stimmung</span>
          <span style={{color:C.sport}}>— Energie</span>
          <span style={{color:C.danger}}>- - Stress</span>
        </div>
      </ChartCard>

      <ChartCard title="Wasseraufnahme (ml / Tag)" color={C.water} empty={!wtE.length} stat={wlAvg?`Ø ${wlAvg} ml`:null}>
        <CJSChart type="bar" height={170}
          labels={wtE.map(e=>fmtD(e.date))}
          datasets={[{label:'Wasser (ml)',data:wtE.map(e=>e.ml),color:C.water}]} />
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>Empfehlung: mind. 2.000 ml / Tag</div>
      </ChartCard>

      <ChartCard title="Schlafdauer (Stunden)" color={C.sleep} empty={!slE.length} stat={slAvg?`Ø ${slAvg} Std`:null}>
        <CJSChart type="bar" height={170} yMin={0} yMax={12}
          labels={slE.map(e=>fmtD(e.date))}
          datasets={[{label:'Schlaf (Std)',data:slE.map(e=>e.data.hours),color:C.sleep}]} />
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>Empfehlung: 7–9 Stunden / Nacht</div>
      </ChartCard>

      <ChartCard title="Schritte pro Tag" color={C.steps} empty={!scE.length} stat={scAvg?`Ø ${scAvg.toLocaleString('de-DE')}`:null}>
        <CJSChart type="bar" height={170}
          labels={scE.map(e=>fmtD(e.date))}
          datasets={[{label:'Schritte',data:scE.map(e=>e.steps),color:C.steps}]} />
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>Empfehlung: 8.000–10.000 Schritte / Tag</div>
      </ChartCard>

      <ChartCard title="Kalorien aus Lebensmitteln (kcal)" color={C.accent} empty={!calE.length}
        stat={calE.length?`Ø ${Math.round(calE.reduce((a,e)=>a+e.kcal,0)/calE.length)} kcal`:null}>
        <CJSChart type="bar" height={170}
          labels={calE.map(e=>fmtD(e.date))}
          datasets={[{label:'Kalorien (kcal)',data:calE.map(e=>e.kcal),color:C.accent}]} />
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>Nur aus gescannten / eingetragenen Produkten</div>
      </ChartCard>
    </>;
  }

  // ── Export & Import ────────────────────────────────────────────────────────
  function ExportTab() {
    return <>
      <div style={ST.secttl}>Import</div>
      <HealthImport onImport={importHealth} settings={settings} />

      <div style={ST.secttl}>Export</div>
      {[
        {label:'Excel (.xlsx)',sub:`${entries.length} Einträge, je Metrik ein Sheet`,action:exportXLSX,clr:C.success},
        {label:'PDF',sub:'Druckansicht öffnen → Als PDF speichern',action:()=>window.print(),clr:C.accent},
        {label:'JSON Backup',sub:'Rohdaten für Backup oder Import',action:exportJSON,clr:C.water},
      ].map(b=>(
        <div key={b.label} style={ST.card}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{b.label}</div>
          <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>{b.sub}</div>
          <button style={ST.btn(b.clr)} onClick={b.action}>{b.label} herunterladen</button>
        </div>
      ))}

      <div style={ST.card}>
        <div style={{fontSize:11,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:12}}>Statistik</div>
        {Object.entries(METRICS).map(([key,m])=>{
          const n=entries.filter(e=>e.type===key).length;
          return <div key={key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:3,height:12,background:m.color,borderRadius:1}}/>
              <span style={{fontSize:13}}>{m.label}</span>
            </div>
            <span style={{fontSize:13,color:m.color,fontWeight:600}}>{n}</span>
          </div>;
        })}
        <div style={{display:'flex',justifyContent:'space-between',padding:'9px 0 2px',fontSize:14}}>
          <span style={{fontWeight:600}}>Gesamt</span>
          <span style={{fontWeight:700,color:C.accent}}>{entries.length}</span>
        </div>
      </div>

      <div style={{...ST.card,borderColor:`${C.danger}30`,background:'#1A0C08'}}>
        <div style={{fontSize:12,fontWeight:600,color:C.danger,marginBottom:4}}>Daten löschen</div>
        <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6}}>Alle Einträge permanent entfernen.</div>
        <button style={ST.outbtn(C.danger)} onClick={()=>{ if(confirm('Wirklich alle Daten löschen?')){setEntries([]);localStorage.removeItem('entries');} }}>Alle Daten löschen</button>
      </div>
    </>;
  }

  // ── Nav ────────────────────────────────────────────────────────────────────
  const NAV=[{id:'dashboard',l:'Heute'},{id:'eingabe',l:'Eingabe'},{id:'verlauf',l:'Verlauf'},{id:'export',l:'Daten'}];
  const bot='env(safe-area-inset-bottom,0px)', top='env(safe-area-inset-top,0px)';

  return (
    <div style={{background:C.bg,minHeight:'100svh',color:C.text,paddingBottom:`calc(76px + ${bot})`}}>
      <header style={{padding:`calc(20px + ${top}) 24px 16px`,borderBottom:`1px solid ${C.border}`}}>
        <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:22,fontWeight:400,letterSpacing:0.3}}>
          Health<span style={{color:C.accent}}>Log</span>
        </div>
        <div style={{fontSize:11,color:C.muted,marginTop:3,letterSpacing:0.4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>{entries.length} Einträge · lokal gespeichert</span>
          <span style={{color:C.faint}}>v2.5</span>
        </div>
      </header>

      <main style={{padding:'24px 24px 0'}}>
        {tab==='dashboard' && <Dashboard/>}
        {tab==='eingabe'   && <Eingabe/>}
        {tab==='verlauf'   && <Verlauf/>}
        {tab==='export'    && <ExportTab/>}
      </main>


      {editing && (
        <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)'}} onClick={()=>setEditing(null)}/>
          <div style={{position:'relative',background:C.card,borderRadius:'18px 18px 0 0',padding:'24px 24px 40px',maxHeight:'85svh',overflowY:'auto',border:`1px solid ${C.border}`,borderBottom:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
              <div>
                <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Eintrag bearbeiten</div>
                <div style={{fontSize:16,fontWeight:600,color:METRICS[editing.type].color}}>{METRICS[editing.type].label}</div>
                <div style={{fontSize:11,color:C.faint,marginTop:2}}>{editing.date}</div>
              </div>
              <button onClick={()=>setEditing(null)} style={{background:'none',border:'none',color:C.muted,fontSize:22,lineHeight:1,padding:4}}>×</button>
            </div>
            {editing.type==='gewicht'    && <GewichtForm    add={add} settings={settings} initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='sport'      && <SportForm      add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='stimmung'   && <StimmungForm   add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='ernaehrung' && <ErnaehrungForm add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='schlaf'     && <SchlafForm     add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='schritte'   && <SchrittForm    add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
          </div>
        </div>
      )}

      <nav style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:C.bg,borderTop:`1px solid ${C.border}`,display:'flex',padding:`10px 0 calc(10px + ${bot})`,zIndex:100}}>
        {NAV.map(n=>(
          <button key={n.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,background:'none',border:'none',padding:'4px 0'}} onClick={()=>setTab(n.id)}>
            <div style={{width:3,height:3,borderRadius:'50%',background:tab===n.id?C.accent:'transparent',marginBottom:2}}/>
            <span style={{fontSize:11,letterSpacing:0.6,textTransform:'uppercase',color:tab===n.id?C.accent:C.muted,fontWeight:tab===n.id?600:400,fontFamily:'inherit'}}>{n.l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
