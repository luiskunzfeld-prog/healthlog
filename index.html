            {editing.type==='herz'        && <HerzForm       add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='blutdruck'   && <BlutdruckForm  add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='koerpermass' && <KoerpermassForm add={add}                    initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/> }
            {editing.type==='zyklus'      && <ZyklusForm add={add} entries={entries}        initialData={editing}      onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
          </div>
        </div>
      )}

      {/* ── Journal: Neueintrag Modal ── */}
      {journalAdd && (
        <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)'}} onClick={()=>setJournalAdd(null)}/>
          <div style={{position:'relative',background:C.card,borderRadius:'18px 18px 0 0',
            padding:'24px 24px 40px',maxHeight:'90svh',overflowY:'auto',
            border:`1px solid ${C.border}`,borderBottom:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
              <div>
                <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>
                  Eintrag hinzufügen · {fmtD(journalAdd.date)}
                </div>
                <div style={{fontSize:16,fontWeight:600,color:METRICS[journalAdd.type].color}}>
                  {METRICS[journalAdd.type].label}
                </div>
              </div>
              <button onClick={()=>setJournalAdd(null)}
                style={{background:'none',border:'none',color:C.muted,fontSize:22,lineHeight:1,padding:4}}>×</button>
            </div>
            {journalAdd.type==='gewicht'    && <GewichtForm    add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} settings={settings} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='sport'      && <SportForm      add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='stimmung'   && <StimmungForm   add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='ernaehrung' && <ErrorBoundary><ErnaehrungForm add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} entries={entries} onSave={null} onClose={()=>setJournalAdd(null)}/></ErrorBoundary>}
            {journalAdd.type==='schlaf'     && <SchlafForm     add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='schritte'   && <SchrittForm    add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='herz'       && <HerzForm       add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='blutdruck'  && <BlutdruckForm  add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='koerpermass'&& <KoerpermassForm add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} onSave={null} onClose={()=>setJournalAdd(null)}/>}
            {journalAdd.type==='zyklus'     && <ZyklusForm add={(t,d)=>{add(t,d,journalAdd.date);setJournalAdd(null);}} entries={entries} onSave={null} onClose={()=>setJournalAdd(null)}/>}
          </div>
        </div>
      )}

      {/* ── Profil-Panel (Fullscreen Overlay) ── */}
      {showProfile && (
        <ProfilePanel
          settings={settings}
          setSettings={setSettings}
          onClose={()=>setShowProfile(false)}
          top={top}
          entries={entries}
        />
      )}

      {/* ── Undo-Toast (Eintrag gelöscht) ── */}
      {undoEntry && (
        <div style={{
          position:'fixed', bottom:`calc(${bot} + 56px)`, left:'50%', transform:'translateX(-50%)',
          zIndex:500, display:'flex', alignItems:'center', gap:12,
          background:C.cardAlt, border:`1px solid ${C.border}`,
          borderRadius:10, padding:'10px 16px',
          boxShadow:'0 4px 20px rgba(0,0,0,0.5)',
          maxWidth:'calc(min(440px, 100vw) - 32px)', width:'max-content',
        }}>
          <span style={{fontSize:13,color:C.text,flex:1}}>
            <span style={{color:METRICS[undoEntry.entry.type]?.color}}>{METRICS[undoEntry.entry.type]?.label}</span>
            {' '}gelöscht
          </span>
          <button onClick={undoDelete}
            style={{fontSize:13,fontWeight:600,color:C.accent,background:'none',
              border:`1px solid ${C.accent}50`,borderRadius:7,padding:'5px 14px',
              cursor:'pointer',flexShrink:0,fontFamily:'inherit'}}>
            Rückgängig
          </button>
        </div>
      )}

      <nav style={{flexShrink:0,background:C.bg,borderTop:`1px solid ${C.border}`,display:'flex',
        padding:`8px 0 ${bot}`}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)}
            style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,
              background:'none',border:'none',padding:'4px 0',minHeight:44,cursor:'pointer',
              WebkitTapHighlightColor:'transparent'}}>
            <div style={{width:4,height:4,borderRadius:'50%',
              background:tab===n.id?C.accent:'transparent',transition:'background 0.2s'}}/>
            <span style={{fontSize:10,letterSpacing:0.7,textTransform:'uppercase',
              color:tab===n.id?C.accent:C.muted,
              fontWeight:tab===n.id?600:400,fontFamily:'inherit',lineHeight:1.2}}>
              {n.l}
            </span>
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
  // Dynamic manifest - won't crash if file missing
  try {
    const ml=document.createElement('link');
    ml.rel='manifest'; ml.href='./manifest.json';
    document.head.appendChild(ml);
  } catch(e){}
  // Service worker
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
