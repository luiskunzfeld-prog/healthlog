<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>HealthLog</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="HealthLog" />
  <meta name="theme-color" content="#0A0806" />
  <!-- manifest loaded dynamically below -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; }
    html {
      background:#0A0806;
      height:100svh;
      overflow:hidden;
      overscroll-behavior:none;          /* verhindert Browser-Bounce */
    }
    body {
      color:#EAE0D0;
      font-family:'DM Sans',-apple-system,sans-serif;
      background:#0A0806;
      height:100svh;
      overflow:hidden;
      overscroll-behavior:none;          /* doppelt gesichert */
      -webkit-overflow-scrolling:auto;   /* kein iOS-Momentum auf body */
    }
    /* Root: harte Höhe statt min-height — verhindert Seitenüberlauf */
    #root {
      max-width:480px;
      margin:0 auto;
      height:100svh;                     /* FIX: war min-height, erlaubte Überwachsen */
      overflow:hidden;
    }
    input[type=range] { -webkit-appearance:none; width:100%; height:3px; border-radius:2px; background:#26201A; cursor:pointer; outline:none; display:block; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; cursor:pointer; }
    input::placeholder { color:#3A3028; }
    input:focus { outline:none; }
    button { font-family:inherit; cursor:pointer; }
    button:active { opacity:.75; transform:scale(.97); }
    ::-webkit-scrollbar { display:none; }
    /* overflow-x:hidden + #root overflow:hidden bereits oben definiert */
  </style>
</head>
<body>
<!-- ── Splash Screen ─────────────────────────────────────────────────────────── -->
<div id="splash" style="
  position:fixed;inset:0;z-index:9999;
  background:#0A0806;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.4s ease, visibility 0.4s ease;
">
  <div style="text-align:center;">
    <div style="
      font-family:'DM Serif Display',Georgia,serif;
      font-size:32px;font-weight:400;letter-spacing:0.5px;
      color:#EAE0D0;
    ">Health<span style="color:#C8B89A">Log</span></div>
    <div style="font-size:11px;color:#3A3028;letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;">Wird geladen…</div>
  </div>
  <div style="display:flex;gap:6px;margin-top:8px;">
    <span class="dot" style="width:5px;height:5px;border-radius:50%;background:#C8B89A;animation:pulse 1.2s ease-in-out infinite;"></span>
    <span class="dot" style="width:5px;height:5px;border-radius:50%;background:#C8B89A;animation:pulse 1.2s ease-in-out 0.2s infinite;"></span>
    <span class="dot" style="width:5px;height:5px;border-radius:50%;background:#C8B89A;animation:pulse 1.2s ease-in-out 0.4s infinite;"></span>
  </div>
</div>
<style>
  @keyframes pulse {
    0%,100%{opacity:0.2;transform:scale(0.8);}
    50%{opacity:1;transform:scale(1.1);}
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
<div id="root"></div>

// ── Portionen-Auflösung ───────────────────────────────────────────────────────
// Gibt Array von {label, g, icon} zurück, oder [] wenn keine Portionen gefunden
function getPortionsForProduct(product) {
  // 1. Explizites portions-Feld (höchste Prio — z.B. aus OpenFoodFacts)
  if (product.portions?.length) return product.portions;

  // 2. Name-basierter Match (partial, case-insensitive)
  const name = (product.name || product.n || '').toLowerCase();
  for (const [key, portions] of Object.entries(PORTIONS_CATALOG)) {
    if (name.includes(key)) return portions;
  }

  // 3. Kategorie-Match
  const cat = product.cat || product.category || '';
  if (PORTIONS_BY_CAT[cat]) return PORTIONS_BY_CAT[cat];

  // 4. Flüssigkeits-Fallback
  if (product.isLiq || product.liq) {
    return [
      { label:'1 Glas (200ml)', g:200, icon:'🥤' },
      { label:'1 Flasche (330ml)', g:330, icon:'🥤' },
      { label:'1 Flasche (500ml)', g:500, icon:'🥤' },
    ];
  }

  // 5. Keine Portionen → nur manuelle Gramm-Eingabe
  return [];
}

// Hilfsfunktion: Nährwert aus per-100-Wert und Gramm berechnen
// formula: nutrient = (value_per_100 × grams) / 100
function calcNutrientFromGrams(per100, grams) {
  return {
    kcal:    Math.round(per100.kcal    * grams / 100),
    protein: +((per100.protein || 0) * grams / 100).toFixed(1),
    carbs:   +((per100.carbs   || 0) * grams / 100).toFixed(1),
    fat:     +((per100.fat     || 0) * grams / 100).toFixed(1),
    sugar:   +((per100.sugar   || 0) * grams / 100).toFixed(1),
    fiber:   +((per100.fiber   || 0) * grams / 100).toFixed(1),
  };
}

// ── Lokale Suche ──────────────────────────────────────────────────────────────
// Gibt bis zu `limit` Treffer zurück, sortiert nach Relevanz (Name > Synonym)
// Fuzzy-Ähnlichkeit: kombiniert Trigram + Levenshtein
// Trigram gut für lange Strings, Levenshtein gut für kurze / Buchstabendreher
function fuzzySim(a, b) {
  if (!a || !b) return 0;
  if (a === b) return 1;
  // Trigram
  const tri = s => { const t = new Set(); for (let i=0;i<s.length-2;i++) t.add(s.slice(i,i+3)); return t; };
  const ta = tri(a), tb = tri(b);
  let trig = 0;
  if (ta.size && tb.size) {
    let shared = 0; ta.forEach(t => { if (tb.has(t)) shared++; });
    trig = (2 * shared) / (ta.size + tb.size);
  }
  // Levenshtein (für kurze Strings zuverlässiger)
  const lev = (() => {
    const la = a.length, lb = b.length;
    if (!la || !lb) return 0;
    let row = Array.from({length:la+1},(_,i)=>i);
    for (let j=0;j<lb;j++) {
      const nr = [j+1];
      for (let i=0;i<la;i++)
        nr.push(Math.min(nr[i]+1, row[i+1]+1, row[i]+(a[i]===b[j]?0:1)));
      row = nr;
    }
    return 1 - row[la] / Math.max(la, lb);
  })();
  return Math.max(trig, lev);
}

function searchLocalFoods(query, limit=6) {
  if (!query || query.trim().length < 1) return [];
  const q = query.trim().toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length >= 2);

  const scored = LOCAL_FOOD_DB.map(item => {
    const name = item.n.toLowerCase();
    const allTokens = [name, ...item.syn];
    const allText = allTokens.join(' ');
    let score = 0;

    // ── Exakte Treffer (höchste Priorität) ───────────────────────────────
    if (name === q)                               score = 100;
    else if (name.startsWith(q))                  score = 85;
    else if (name.includes(q))                    score = 70;
    else if (item.syn.some(s => s === q))         score = 80;
    else if (item.syn.some(s => s.startsWith(q))) score = 65;
    else if (item.syn.some(s => s.includes(q)))   score = 50;

    // ── Wort-für-Wort bei mehreren Suchwörtern ───────────────────────────
    if (score === 0 && words.length > 1) {
      const matched = words.filter(w => allText.includes(w)).length;
      if (matched === words.length)      score = 45;
      else if (matched >= 1)             score = 20 + matched * 8;
    }

    // ── Fuzzy via Trigram (Tippfehler-Toleranz) ──────────────────────────
    if (score === 0) {
      // Query gegen alle Tokens des Eintrags
      let best = 0;
      for (const token of allTokens) {
        // ganzer Token
        const sim = fuzzySim(q, token);
        if (sim > best) best = sim;
        // Query-Wörter einzeln gegen Token
        for (const w of words) {
          const ws = fuzzySim(w, token);
          if (ws > best) best = ws;
        }
      }
      if (best >= 0.5)      score = Math.round(best * 40);   // max ~40
      else if (best >= 0.35) score = Math.round(best * 25);  // schwacher Match
    }

    return { item, score };
  }).filter(x => x.score > 0);

  scored.sort((a,b) => b.score - a.score);
  return scored.slice(0, limit).map(x => x.item);
}

// ── Chart.js wrapper (fixed mobile sizing) ────────────────────────────────────
function CJSChart({ type='line', labels, datasets, height=170, yMin, yMax, yTicks }) {
  const chartType = type==='area' ? 'line' : type;
  const isArea    = type==='area';
  const ref  = useRef(null);
  const inst = useRef(null);
  const key  = useMemo(()=>JSON.stringify({labels,datasets,type}),[labels,datasets,type]);

  useEffect(()=>{
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current=null; }

    inst.current = new Chart(ref.current, {
      type: chartType,
      data: {
        labels,
        datasets: datasets.map(ds=>({
          label: ds.label,
          data: ds.data,
          borderColor: ds.color,
          backgroundColor: chartType==='bar' ? ds.color+'85' : (isArea||ds.fill) ? ds.color+'28' : 'transparent',
          borderWidth: chartType==='bar' ? 0 : ds.isAvg ? 1 : 1.5,
          pointBackgroundColor: ds.color,
          pointRadius: chartType==='bar' ? 0 : ds.isAvg ? 0 : 3,
          pointHoverRadius: ds.isAvg ? 0 : 5,
          tension: 0.35,
          fill: isArea || ds.fill || false,
          borderRadius: chartType==='bar' ? [3,3,0,0] : 0,
          borderDash: ds.dashed||ds.isAvg ? [5,4] : undefined,
          order: ds.isAvg ? 0 : 1,
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration:250 },
        plugins: {
          legend: { display:false },
          tooltip: {
            backgroundColor:C.cardAlt, borderColor:C.border, borderWidth:1,
            titleColor:C.muted, bodyColor:C.text, padding:9, cornerRadius:8, displayColors:false,
            filter: item => !datasets[item.datasetIndex]?.isAvg,
          },
        },
        scales: {
          x: {
            grid:{ color:C.border+'66', drawTicks:false },
            ticks:{ color:C.muted, font:{size:10}, maxRotation:0, maxTicksLimit:7 },
            border:{ display:false },
          },
          y: {
            grid:{ color:C.border+'66', drawTicks:false },
            ticks:{ color:C.muted, font:{size:10}, ...(yTicks?{callback:v=>yTicks.includes(v)?v:null}:{}) },
            border:{ display:false },
            ...(yMin!=null?{min:yMin}:{}),
            ...(yMax!=null?{max:yMax}:{}),
          },
        },
      },
    });
    return ()=>{ inst.current?.destroy(); inst.current=null; };
  },[key, chartType, isArea]);

  // Fixed-height container — critical for mobile
  return (
    <div style={{ position:'relative', width:'100%', height:`${height}px` }}>
      <canvas ref={ref} style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%' }} />
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// KORRELATIONS-ENGINE
//
// Algorithmus: Pearson-Korrelationskoeffizient (r)
//   r =  Σ[(xi − x̄)(yi − ȳ)]  /  √[Σ(xi−x̄)² · Σ(yi−ȳ)²]
//
//   r = +1.0  perfekte positive Korrelation
//   r = -1.0  perfekte negative Korrelation
//   r =  0.0  keine lineare Korrelation
//
// Signifikanz-Schwellen (konservativ, da n meist < 100):
//   |r| >= 0.5  → stark    (signifikant ab n ≥ 7)
//   |r| >= 0.3  → mittel   (signifikant ab n ≥ 10)
//   |r| >= 0.15 → schwach  (nur info, ab n ≥ 20)
//   n < 7       → zu wenig Daten, nicht zeigen
//
// Ziel-Variablen (Y): mood, energy, stress
// Prädiktor-Variablen (X): alle anderen messbaren Tageswerte
// ══════════════════════════════════════════════════════════════════════════════

// ── Faktor-Definitionen ───────────────────────────────────────────────────────
const CORR_FACTORS = {
  mood:         { label:'Stimmung',        unit:'/10',  color:'#A09080', group:'mental'  },
  energy:       { label:'Energie',          unit:'/10',  color:'#9A8462', group:'mental'  },
  stress:       { label:'Stress',           unit:'/10',  color:'#B87060', group:'mental'  },
  sleepHours:   { label:'Schlafdauer',      unit:'Std',  color:'#8A7E96', group:'schlaf'  },
  sleepQuality: { label:'Schlafqualität',   unit:'/5',   color:'#9A8EB0', group:'schlaf'  },
  sportMinutes: { label:'Sport',            unit:'min',  color:'#9A8462', group:'aktivität'},
  calories:     { label:'Kalorien',         unit:'kcal', color:'#C8B89A', group:'ernährung'},
  protein:      { label:'Eiweiß',           unit:'g',    color:'#9A8462', group:'ernährung'},
  carbs:        { label:'Kohlenhydrate',    unit:'g',    color:'#B4ACA0', group:'ernährung'},
  fat:          { label:'Fett',             unit:'g',    color:'#A09080', group:'ernährung'},
  water:        { label:'Wasser',           unit:'ml',   color:'#B4ACA0', group:'ernährung'},
  steps:        { label:'Schritte',         unit:'',     color:'#7A9080', group:'aktivität'},
  heartRate:    { label:'Herzfrequenz',     unit:'bpm',  color:'#D07878', group:'vitalwerte'},
  weight:       { label:'Gewicht',          unit:'kg',   color:'#C8B89A', group:'körper'  },
};

// Die Ziel-Variablen für Korrelationsberechnung
const CORR_TARGETS = ['mood','energy','stress'];

// ── Pearson-Korrelationskoeffizient ──────────────────────────────────────────
// Gibt r ∈ [-1, 1] zurück oder null bei zu wenig Daten / konstanten Werten
function pearson(xs, ys) {
  const n = xs.length;
  if (n < 7) return null;
  // Mittelwerte
  const mx = xs.reduce((a,b)=>a+b,0) / n;
  const my = ys.reduce((a,b)=>a+b,0) / n;
  // Kovarianz und Varianzen
  let num=0, dx2=0, dy2=0;
  for (let i=0; i<n; i++) {
    const dx=xs[i]-mx, dy=ys[i]-my;
    num += dx*dy;
    dx2 += dx*dx;
    dy2 += dy*dy;
  }
  const denom = Math.sqrt(dx2 * dy2);
  if (denom === 0) return null; // konstante Variable → keine Aussage möglich
  return +(num / denom).toFixed(3);
}

// ── Tages-Matrix aufbauen ────────────────────────────────────────────────────
// Gibt Map<date, {mood, energy, stress, sleepHours, ...}> zurück
// Nur Tage wo der Zielwert (mood/energy/stress) vorhanden ist, sind relevant
function buildDailyMatrix(entries) {
  const map = {}; // date → factor values

  const ensure = (date) => {
    if (!map[date]) map[date] = {};
    return map[date];
  };

  entries.forEach(e => {
    const d = e.data;
    const row = ensure(e.date);
    switch(e.type) {
      case 'stimmung':
        row.mood   = d.mood;
        row.energy = d.energy;
        row.stress = d.stress;
        break;
      case 'schlaf':
        row.sleepHours   = d.hours;
        row.sleepQuality = d.quality;
        break;
      case 'sport':
        row.sportMinutes = (row.sportMinutes||0) + (d.duration||0);
        break;
      case 'ernaehrung':
        row.calories = (row.calories||0) + (d.calories||0);
        row.protein  = (row.protein||0)  + (d.protein||0);
        row.carbs    = (row.carbs||0)    + (d.carbs||0);
        row.fat      = (row.fat||0)      + (d.fat||0);
        row.water    = (row.water||0)    + (d.water||0);
        break;
      case 'schritte':
        row.steps = (row.steps||0) + (d.steps||0);
        break;
      case 'herz':
        // Durchschnitt über mehrere BPM-Messungen am gleichen Tag
        row._herzN = (row._herzN||0) + 1;
        row.heartRate = ((row.heartRate||0) * (row._herzN-1) + d.bpm) / row._herzN;
        break;
      case 'gewicht':
        row.weight = d.weight;
        break;
    }
  });

  return map;
}

// ── Alle Korrelationen berechnen ─────────────────────────────────────────────
// Gibt Array von {target, factor, r, n, pairs} sortiert nach |r| absteigend
function computeAllCorrelations(matrix) {
  const dates = Object.keys(matrix);
  const results = [];

  const factorKeys = Object.keys(CORR_FACTORS).filter(k => !CORR_TARGETS.includes(k));

  CORR_TARGETS.forEach(target => {
    factorKeys.forEach(factor => {
      // Nur Tage nehmen wo BEIDE Werte vorhanden sind
      const pairs = dates
        .filter(d => matrix[d][target] != null && matrix[d][factor] != null)
        .map(d => ({ x: matrix[d][factor], y: matrix[d][target], date: d }));

      if (pairs.length < 7) return;

      const xs = pairs.map(p=>p.x);
      const ys = pairs.map(p=>p.y);
      const r = pearson(xs, ys);
      if (r === null) return;
      if (Math.abs(r) < 0.15) return; // Schwelle: zu schwach um interessant zu sein

      results.push({ target, factor, r, n: pairs.length, pairs });
    });
  });

  // Sortieren nach Stärke der Korrelation
  return results.sort((a,b) => Math.abs(b.r) - Math.abs(a.r));
}

// ── Insight-Text generieren ───────────────────────────────────────────────────
// Vergleich: obere vs. untere Hälfte des Faktors → Prozentdifferenz im Zielwert
function generateInsightText(corr, matrix) {
  const { target, factor, r, pairs } = corr;
  const tLabel = CORR_FACTORS[target].label;
  const fLabel = CORR_FACTORS[factor].label;
  const fUnit  = CORR_FACTORS[factor].unit;

  // Median des Faktors berechnen
  const sorted = [...pairs].sort((a,b)=>a.x-b.x);
  const mid = Math.floor(sorted.length / 2);
  const medianX = sorted.length % 2 === 0
    ? (sorted[mid-1].x + sorted[mid].x) / 2
    : sorted[mid].x;

  const low  = pairs.filter(p=>p.x <= medianX);
  const high = pairs.filter(p=>p.x >  medianX);
  if (!low.length || !high.length) return null;

  const avgLow  = +(low.reduce((s,p)=>s+p.y,0)  / low.length).toFixed(1);
  const avgHigh = +(high.reduce((s,p)=>s+p.y,0) / high.length).toFixed(1);

  // Prozentuale Differenz (relativ zum Gesamtdurchschnitt)
  const totalAvg = +(pairs.reduce((s,p)=>s+p.y,0) / pairs.length).toFixed(1);
  const diffPct = totalAvg > 0 ? Math.abs(Math.round(((avgHigh - avgLow) / totalAvg) * 100)) : 0;

  // Medianwert formatieren
  const medFmt = medianX >= 1000
    ? `${(medianX/1000).toFixed(1)}k` : medianX < 10
    ? medianX.toFixed(1) : Math.round(medianX);

  // Richtungslogik: Stress ist negativ, also invertieren
  const targetIsNeg = target === 'stress';

  if (r > 0) {
    // Positiver Zusammenhang: mehr X → mehr Y
    const moreIsBetter = !targetIsNeg; // mehr Stimmung/Energie = gut; mehr Stress = schlecht
    return {
      headline: `Mehr ${fLabel} → ${moreIsBetter ? 'bessere' : 'höhere'} ${tLabel}`,
      body: `An Tagen mit viel ${fLabel} (>${medFmt}${fUnit ? ' '+fUnit : ''}) liegt deine ${tLabel} im Schnitt bei ${avgHigh}/10 — vs. ${avgLow}/10 an weniger aktiven Tagen (+${diffPct}%).`,
      positive: moreIsBetter,
    };
  } else {
    // Negativer Zusammenhang: mehr X → weniger Y
    const moreIsBetter = targetIsNeg; // weniger Stress ist besser
    return {
      headline: `Weniger ${fLabel} → ${moreIsBetter ? 'bessere' : 'schlechtere'} ${tLabel}`,
      body: `An Tagen mit wenig ${fLabel} (≤${medFmt}${fUnit ? ' '+fUnit : ''}) liegt deine ${tLabel} im Schnitt bei ${avgLow}/10 — ${diffPct}% ${moreIsBetter ? 'besser' : 'schlechter'} als an aktiveren Tagen.`,
      positive: moreIsBetter,
    };
  }
}

// ── r-Wert Hilfsfunktionen ────────────────────────────────────────────────────
function rStrength(r) {
  const a = Math.abs(r);
  if (a >= 0.6) return 'stark';
  if (a >= 0.4) return 'mittel';
  if (a >= 0.2) return 'schwach';
  return 'sehr schwach';
}

function rColorScale(r) {
  const a = Math.abs(r);
  if (r > 0) {
    if (a >= 0.5) return '#7A9A7A';  // strong positive → green
    if (a >= 0.3) return '#9AB890';  // medium positive
    return '#B4C8B4';                 // weak positive
  } else {
    if (a >= 0.5) return '#B87060';  // strong negative → red
    if (a >= 0.3) return '#C8907A';  // medium negative
    return '#C8B0A8';                 // weak negative
  }
}

// ── Scatter Chart Komponente (Chart.js scatter type) ─────────────────────────
function ScatterChart({ pairs, targetLabel, factorLabel, factorUnit, r }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  const col  = r >= 0 ? '#7A9A7A' : '#B87060';

  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) { inst.current.destroy(); inst.current = null; }

    // Regressionsgerade berechnen (lineare Regression y = a + bx)
    const n = pairs.length;
    const mx = pairs.reduce((s,p)=>s+p.x,0)/n;
    const my = pairs.reduce((s,p)=>s+p.y,0)/n;
    let num=0, denom=0;
    pairs.forEach(p=>{ num+=(p.x-mx)*(p.y-my); denom+=(p.x-mx)**2; });
    const slope = denom ? num/denom : 0;
    const intercept = my - slope*mx;
    const xMin = Math.min(...pairs.map(p=>p.x));
    const xMax = Math.max(...pairs.map(p=>p.x));
    const regLine = [{x:xMin, y:slope*xMin+intercept},{x:xMax, y:slope*xMax+intercept}];

    inst.current = new Chart(ref.current, {
      type: 'scatter',
      data: {
        datasets: [
          {
            label: `${factorLabel} vs ${targetLabel}`,
            data: pairs.map(p=>({x:p.x, y:p.y})),
            backgroundColor: col+'99',
            borderColor: col,
            borderWidth: 1,
            pointRadius: 5,
            pointHoverRadius: 7,
          },
          {
            label: 'Regressionsgerade',
            data: regLine,
            type: 'line',
            borderColor: col+'AA',
            borderWidth: 1.5,
            borderDash: [5,4],
            pointRadius: 0,
            fill: false,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 200 },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: C.cardAlt,
            borderColor: C.border,
            borderWidth: 1,
            titleColor: C.muted,
            bodyColor: C.text,
            callbacks: {
              label: ctx => `${factorLabel}: ${ctx.raw.x}${factorUnit?' '+factorUnit:''}, ${targetLabel}: ${ctx.raw.y}/10`
            }
          }
        },
        scales: {
          x: {
            title: { display:true, text:factorLabel+(factorUnit?' ('+factorUnit+')':''), color:C.muted, font:{size:10} },
            grid: { color:C.border+'66', drawTicks:false },
            ticks: { color:C.muted, font:{size:10} },
            border: { display:false },
          },
          y: {
            title: { display:true, text:targetLabel+' (1–10)', color:C.muted, font:{size:10} },
            grid: { color:C.border+'66', drawTicks:false },
            ticks: { color:C.muted, font:{size:10} },
            border: { display:false },
            min: 1, max: 10,
          }
        }
      }
    });
    return () => { inst.current?.destroy(); inst.current = null; };
  }, [pairs, r]);

  return (
    <div style={{position:'relative', width:'100%', height:'220px'}}>
      <canvas ref={ref} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}}/>
    </div>
  );
}

// ── Korrelationsmatrix (Heatmap) ──────────────────────────────────────────────
function CorrelationMatrix({ correlations }) {
  const targets  = CORR_TARGETS;
  const factors  = [...new Set(correlations.map(c=>c.factor))].slice(0,8);
  if (!factors.length) return null;

  // Lookup r für (target, factor)
  const rMap = {};
  correlations.forEach(c=>{ rMap[`${c.target}|${c.factor}`] = c.r; });

  return (
    <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch',marginBottom:2}}>
      <table style={{borderCollapse:'collapse',minWidth:'100%',fontSize:10}}>
        <thead>
          <tr>
            <th style={{width:80,textAlign:'right',paddingRight:6,color:C.faint,fontWeight:400}}></th>
            {targets.map(t=>(
              <th key={t} style={{padding:'0 4px 6px',textAlign:'center',
                color:CORR_FACTORS[t].color,fontWeight:600,fontSize:10,
                letterSpacing:0.4,textTransform:'uppercase',whiteSpace:'nowrap'}}>
                {CORR_FACTORS[t].label}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {factors.map(f=>(
            <tr key={f}>
              <td style={{textAlign:'right',paddingRight:8,paddingBottom:3,
                color:C.muted,fontSize:10,fontWeight:500,whiteSpace:'nowrap'}}>
                {CORR_FACTORS[f]?.label}
              </td>
              {targets.map(t=>{
                const r = rMap[`${t}|${f}`];
                const bg = r!=null ? rColorScale(r) : C.border;
                const txt = r!=null ? (r>0?'+':'')+r.toFixed(2) : '–';
                return (
                  <td key={t} style={{padding:'3px 4px',textAlign:'center'}}>
                    <div style={{
                      width:44,height:28,borderRadius:6,
                      background: r!=null ? bg+'30' : C.faint+'18',
                      border:`1px solid ${r!=null ? bg+'60' : C.faint+'30'}`,
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:10,fontWeight:r!=null?600:400,
                      color: r!=null ? bg : C.faint,
                      margin:'0 auto',
                    }}>
                      {txt}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── Tipp-Hook — wählt Tipp des Tages nach Kategorie ─────────────────────────
// Deterministisch rotierend: Tipp ändert sich täglich, ist aber für alle Nutzer
// am gleichen Tag identisch (basiert auf Datum-Hash).
function useTip(category, { skipDismissed = true } = {}) {
  const today = toDay();
  // Einfacher deterministischer Hash: Tag im Jahr → Index
  const dayOfYear = Math.floor((new Date(today) - new Date(today.slice(0,4)+'-01-01')) / 864e5);

  const pool = TIPS_DB
    .filter(t => t.category === category || (category === 'general' && t.category === 'general'))
    .sort((a,b) => a.priority - b.priority || a.id.localeCompare(b.id));

  if (!pool.length) return null;
  return pool[dayOfYear % pool.length] || pool[0];
}

// ── useDismiss — Tipp dauerhaft ausblenden (via localStorage) ────────────────
function useDismiss() {
  const [dismissed, setDismissed] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem('hl_dismissed_tips') || '[]')); }
    catch { return new Set(); }
  });
  const dismiss = (id) => {
    setDismissed(prev => {
      const next = new Set(prev); next.add(id);
      localStorage.setItem('hl_dismissed_tips', JSON.stringify([...next]));
      return next;
    });
  };
  return { dismissed, dismiss };
}

// Verhalten: Tap → kleines Popup unter dem Icon
function TipTooltip({ text }) {
  const [show, setShow] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    if (!show) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setShow(false); };
    document.addEventListener('touchstart', close);
    document.addEventListener('mousedown', close);
    return () => { document.removeEventListener('touchstart', close); document.removeEventListener('mousedown', close); };
  }, [show]);

  return (
    <span ref={ref} style={{ position: 'relative', display: 'inline-block', marginLeft: 4 }}>
      <button
        onClick={() => setShow(s => !s)}
        style={{
          width: 15, height: 15, borderRadius: '50%',
          background: C.faint, border: 'none',
          color: C.muted, fontSize: 9, fontWeight: 700,
          cursor: 'pointer', display: 'inline-flex',
          alignItems: 'center', justifyContent: 'center',
          verticalAlign: 'middle', lineHeight: 1,
          fontFamily: 'inherit',
        }}>
        ?
      </button>
      {show && (
        <div style={{
          position: 'absolute', left: 0, top: '100%', marginTop: 4,

// ── DailyTipCard — Dashboard-Tipp des Tages ──────────────────────────────────
// Platzierung: Am Ende des Dashboard, vor den Schnelleinträgen
// Verhalten: Täglich wechselnd, vollständig sichtbar, optional dismissbar
function DailyTipCard({ entries, dismissed, onDismiss }) {
  // Kontextbasiert: wähle Tipp aus der Kategorie, die heute noch nicht getrackt wurde
  const today = toDay();
  const todayTypes = new Set(entries.filter(e => e.date === today).map(e => e.type));
  const dayOfYear  = Math.floor((new Date(today) - new Date(today.slice(0,4)+'-01-01')) / 864e5);

  // Priorität: allgemeine Tipps + Tipp der am wenigsten getrackte Kategorie
  const priorityPool = TIPS_DB.filter(t => {
    if (dismissed?.has(t.id)) return false;
    // Bevorzuge Tipps für Metriken, die heute noch nicht getrackt wurden
    if (t.category !== 'general' && !todayTypes.has(t.category)) return true;
    if (t.category === 'general') return true;
    return false;
  }).sort((a,b) => a.priority - b.priority);

  const tip = priorityPool.length
    ? priorityPool[dayOfYear % priorityPool.length]
    : TIPS_DB.filter(t => !dismissed?.has(t.id))[dayOfYear % Math.max(1, TIPS_DB.filter(t => !dismissed?.has(t.id)).length)];

  if (!tip) return null;

  return (
    <div style={{
      ...ST.card,
      border: `1px solid ${C.accent}35`,
      background: `linear-gradient(135deg, ${C.card} 0%, ${C.cardAlt} 100%)`,
      marginBottom: 16, padding: '14px 16px',
    }}>
      {/* Header */}
      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,
        marginBottom: 10,
      }}>
        <div style={{
          width: 28, height: 28, borderRadius: 8,
          background: `${C.accent}18`, border: `1px solid ${C.accent}30`,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 14, flexShrink: 0,
        }}>
          {tip.icon}
        </div>
        <div style={{ flex: 1 }}>
          <div style={{
            fontSize: 9, color: C.accent, letterSpacing: 1.2,
            textTransform: 'uppercase', marginBottom: 1, fontWeight: 600,
          }}>
            Tipp des Tages
          </div>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.text, lineHeight: 1.2 }}>
            {tip.title}
          </div>
        </div>
        {onDismiss && (
          <button
            onClick={() => onDismiss(tip.id)}
            style={{
              background: 'none', border: 'none', color: C.faint,
              fontSize: 16, cursor: 'pointer', padding: '0 2px',
              lineHeight: 1, flexShrink: 0,
            }}>
            ×
          </button>
        )}
      </div>

      {/* Body */}
      <p style={{
        fontSize: 12, color: C.muted, lineHeight: 1.75,
        margin: 0,
      }}>
        {tip.body}
      </p>

      {/* Footer: Kategorie-Badge */}
      <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 6 }}>
        <span style={{
          fontSize: 9, padding: '2px 8px', borderRadius: 8,
          background: `${C.accent}14`, color: C.accent,
          letterSpacing: 0.6, textTransform: 'uppercase',
        }}>
          {tip.category === 'general'
            ? 'Allgemein'
            : METRICS[tip.category]?.label || tip.category}
        </span>
        <span style={{ fontSize: 9, color: C.faint }}>
          {TIPS_DB.filter(t => !dismissed?.has(t.id)).length} Tipps verfügbar
        </span>
      </div>
    </div>
  );
}
