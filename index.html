                  display:'inline-block',transition:'transform 0.25s',
                  transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>›</span>
              </button>

              {/* ══ Ebene 2: Detailansicht (bei Klick) ══ */}
              {isOpen && (
                <div style={{borderTop:`1px solid ${C.border}`,padding:'14px 16px 16px'}}>

                  {/* ── Ansichtsmodus: Read-only Zeilen ── */}
                  {!isEdit && (
                    <>
                      {rows.map((row,i)=>(
                        <ViewRow key={i} {...row}/>
                      ))}
                      {sec.hint && (
                        <div style={{fontSize:10,color:C.faint,marginTop:8,lineHeight:1.5}}>{sec.hint}</div>
                      )}

                      {/* Bearbeiten-Button (nur wenn Sektion nicht read-only) */}
                      {!sec.readOnly && (
                        <>
                          <button onClick={()=>startEdit(sec.id)}
                            style={{marginTop:14,width:'100%',background:`${sec.color}14`,
                              border:`1px solid ${sec.color}40`,borderRadius:8,
                              padding:'10px 0',fontSize:13,fontWeight:500,
                              color:sec.color,cursor:'pointer',fontFamily:'inherit',
                              letterSpacing:0.2}}>
                            ✎ Bearbeiten
                          </button>

                          {/* ── Kalorienrechner nur für Ernährungsziele ── */}
                          {sec.id === 'ziele_ern' && (
                            <>
                              <button
                                onClick={()=>setShowKcalCalc(s=>!s)}
                                style={{marginTop:8,width:'100%',
                                  background: showKcalCalc ? `${C.accent}20` : 'transparent',
                                  border:`1px solid ${showKcalCalc ? C.accent : C.border}`,
                                  borderRadius:8,padding:'10px 0',fontSize:13,fontWeight:500,
                                  color: showKcalCalc ? C.accent : C.muted,
                                  cursor:'pointer',fontFamily:'inherit',letterSpacing:0.2,
                                  transition:'all 0.2s'}}>
                                {showKcalCalc ? '✕ Rechner schließen' : '🧮 Kalorienrechner öffnen'}
                              </button>
                              {showKcalCalc && (
                                <div style={{marginTop:14,paddingTop:14,
                                  borderTop:`1px solid ${C.border}`}}>
                                  <div style={{fontSize:10,color:C.accent,letterSpacing:0.8,
                                    textTransform:'uppercase',marginBottom:12,fontWeight:600}}>
                                    Kalorienbedarf berechnen
                                  </div>
                                  <KalorienRechner
                                    settings={settings}
                                    lastWeight={lastWeight}
                                    onSave={kcal=>{
                                      setSettings(s=>({...s,kalorienZiel:kcal}));
                                      setShowKcalCalc(false);
                                      // Kurzes Feedback in der Sektion
                                      setSaved(sec.id);
                                      setTimeout(()=>setSaved(null), 2000);
                                    }}
                                    onUpdateSettings={updates=>setSettings(s=>({...s,...updates}))}
                                  />
                                </div>
                              )}
                            </>
                          )}
                        </>
                      )}
                    </>
                  )}

                  {/* ── Bearbeitungsmodus: Edit-Felder ── */}
                  {isEdit && (
                    <>
                      <div style={{fontSize:10,color:sec.color,letterSpacing:0.8,
                        textTransform:'uppercase',marginBottom:14,fontWeight:600}}>
                        Bearbeitungsmodus
                      </div>

                      {sec.editFields.map(field => renderEditField(field, sec))}

                      {sec.hint && (
                        <div style={{fontSize:10,color:C.faint,marginBottom:14,lineHeight:1.5}}>{sec.hint}</div>
                      )}

                      {/* Speichern / Abbrechen */}
                      <div style={{display:'flex',gap:8,marginTop:4}}>
                        <button onClick={cancelEdit}
                          style={{flex:1,background:'transparent',color:C.muted,
                            border:`1px solid ${C.border}`,borderRadius:8,
                            padding:'11px 0',fontSize:13,fontWeight:500,
                            cursor:'pointer',fontFamily:'inherit'}}>
                          Abbrechen
                        </button>
                        <button onClick={()=>commitEdit(sec.id)}
                          style={{flex:2,background:sec.color,color:C.bg,border:'none',
                            borderRadius:8,padding:'11px 0',fontSize:13,fontWeight:600,
                            cursor:'pointer',fontFamily:'inherit'}}>
                          ✓ Speichern
                        </button>
                      </div>
                    </>
                  )}
                </div>
              )}
            </div>
          );
        })}

      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]           = useState('dashboard');
  const [entries,setEntries]   = useState(()=>store.get('entries')||[]);
  const [settings,setSettings] = useState(()=>store.get('settings')||{height:175,kalorienZiel:2000,wasserZiel:2000,chartOrder:null,alter:null});
  const [activeForm,setAF]     = useState(null);
  const [range,setRange]       = useState('30d');
  const [customFrom,setCF]     = useState('');
  const [customTo,  setCT]     = useState('');
  const [editing,setEditing]   = useState(null);
  const [journalAdd,setJournalAdd] = useState(null);
  const [showProfile,setShowProfile] = useState(false);
  const [undoEntry,  setUndoEntry]   = useState(null); // { entry, timer }

  // ── Tipp-System: Dismiss-State ────────────────────────────────────────────
  const { dismissed, dismiss } = useDismiss();

  // Akzentfarbe aus Settings übernehmen (mutiert C vor jedem Render)
  C.accent = settings.accentColor || '#C8B89A';

  useEffect(()=>{ store.set('entries',entries); },[entries]);
  useEffect(()=>{ store.set('settings',settings); },[settings]);

  // Splash ausblenden sobald App gemounted ist
  useEffect(()=>{
    const splash = document.getElementById('splash');
    if (!splash) return;
    splash.style.opacity = '0';
    splash.style.visibility = 'hidden';
    const t = setTimeout(()=>{ if(splash.parentNode) splash.parentNode.removeChild(splash); }, 450);
    return ()=>clearTimeout(t);
  }, []);

  const add = useCallback((type,data,date=toDay())=>{
    setEntries(prev=>[{id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type,data,createdAt:Date.now()},...prev]);
    // Ernährung: in der Form bleiben (mehrere Einträge hintereinander möglich)
    if (type !== 'ernaehrung') setAF(null);
  },[]);

  const del = useCallback(id=>setEntries(prev=>prev.filter(e=>e.id!==id)),[]);

  // Soft-Delete: zeigt Undo-Toast für 4 Sekunden, dann erst wirklich löschen
  const softDel = useCallback((entry) => {
    // Sofort aus Liste entfernen (optimistic)
    setEntries(prev=>prev.filter(e=>e.id!==entry.id));
    // Laufenden Timer abbrechen falls noch einer läuft
    setUndoEntry(prev=>{ if(prev?.timer) clearTimeout(prev.timer); return null; });
    // Neuen 4s-Timer starten
    const timer = setTimeout(()=>setUndoEntry(null), 4000);
    setUndoEntry({ entry, timer });
  },[]);

  const undoDelete = useCallback(()=>{
    setUndoEntry(prev=>{
      if(!prev) return null;
      clearTimeout(prev.timer);
      // Eintrag wieder einfügen, sortiert nach ts
      setEntries(es=>[...es, prev.entry].sort((a,b)=>(b.ts||0)-(a.ts||0)));
      return null;
    });
  },[]);

  const updateEntry = useCallback((id,newData)=>{
    setEntries(prev=>prev.map(e=>e.id===id?{...e,data:newData}:e));
    setEditing(null);
  },[]);

  const importHealth = useCallback(newEntries=>{
    setEntries(prev=>{
      const existingKeys = new Set(prev.map(e=>`${e.type}|${e.date}`));
      const filtered = newEntries.filter(e=>{
        if(e.type==='gewicht'||e.type==='schlaf') return !existingKeys.has(`${e.type}|${e.date}`);
        return true;
      });
      return [...filtered,...prev].sort((a,b)=>b.ts-a.ts);
    });
  },[]);

  // Today aggregates
  const todayEs  = useMemo(()=>entries.filter(e=>e.date===toDay()),[entries]);
  const todayW   = todayEs.find(e=>e.type==='gewicht')?.data.weight;
  const todayS   = todayEs.filter(e=>e.type==='sport').reduce((s,e)=>s+(e.data.duration||0),0);
  const todayM   = todayEs.find(e=>e.type==='stimmung')?.data.mood;
  const todayWtr = todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.water||0),0);
  const todaySl  = todayEs.find(e=>e.type==='schlaf')?.data.hours;
  const todayKcal = todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.calories||0),0);
  const todayProt = todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.protein||0),0);
  const todayCarb = todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.carbs||0),0);
  const todayFat  = todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.fat||0),0);
  const todayFiber= todayEs.filter(e=>e.type==='ernaehrung').reduce((s,e)=>s+(e.data.fiber||0),0);
  const todaySteps= todayEs.filter(e=>e.type==='schritte').reduce((s,e)=>s+(e.data.steps||0),0);
  const todayHerz = todayEs.filter(e=>e.type==='herz').at(-1)?.data.bpm;
  const todayBP   = todayEs.filter(e=>e.type==='blutdruck').at(-1)?.data;

  // ── Streak-Logik ───────────────────────────────────────────────────────────
  // Nur Einträge zählen, die am selben Tag erstellt wurden wie ihr Datum
  // (createdAt fehlt bei alten Einträgen → gelten als legitim)
  const streakData = useMemo(()=>{
    const save = settings.streakSave ?? { available: true, savedDate: null };

    const legitDates = new Set();
    entries.forEach(e=>{
      // Nur Einträge mit createdAt zählen — importierte/rückdatierte ohne createdAt nie
      if (!e.createdAt) return;
      const createdDay = new Date(e.createdAt).toISOString().slice(0,10);
      if (createdDay === e.date) legitDates.add(e.date);
    });

    const today = toDay();
    const todayTracked = legitDates.has(today);

    // Rückwärts zählen — bei ungetracktem Heute von gestern starten
    let d = new Date(today+'T12:00:00');
    if (!todayTracked) d.setDate(d.getDate()-1);

    let count = 0;
    while (true) {
      const ds = d.toISOString().slice(0,10);
      if (legitDates.has(ds)) {
        count++;
      } else if (save.savedDate === ds) {
        // Shield hat diesen Tag gerettet — weiter zählen ohne count++
      } else {
        break;
      }
      d.setDate(d.getDate()-1);
    }

    // Ist die Streak gerade in Gefahr?
    const yest = new Date(today+'T12:00:00'); yest.setDate(yest.getDate()-1);
    const yesterdayStr = yest.toISOString().slice(0,10);
    const atRisk = !todayTracked
      && !legitDates.has(yesterdayStr)
      && save.savedDate !== yesterdayStr
      && count > 0;

    return { count, atRisk, saveAvailable: save.available && !save.savedDate, todayTracked };
  }, [entries, settings.streakSave]);

  // Shield einsetzen — rettet den gestrigen Tag
  const useStreakSave = useCallback(()=>{
    const yest = new Date(); yest.setDate(yest.getDate()-1);
    const yesterdayStr = yest.toISOString().slice(0,10);
    setSettings(s=>({...s, streakSave:{ available:false, savedDate:yesterdayStr }}));
  },[]);

  // Wenn Streak auf 0 fällt und kein Shield aktiv → Shield zurücksetzen für nächste Streak
  useEffect(()=>{
    if (streakData.count === 0 && settings.streakSave?.savedDate) {
      setSettings(s=>({...s, streakSave:{ available:true, savedDate:null }}));
    }
  }, [streakData.count]);

  // Filtered by range
  const filtered = useCallback(type=>{
    const base = entries.filter(e=>e.type===type).sort((a,b)=>a.ts-b.ts);
    if (range==='all') return base;
    if (range==='custom') {
      const from = customFrom ? new Date(customFrom+'T00:00:00').getTime() : 0;
      const to   = customTo   ? new Date(customTo+'T23:59:59').getTime()   : Date.now();
      return base.filter(e=>e.ts>=from && e.ts<=to);
    }
    const days={'7d':7,'30d':30,'3m':90,'1y':365}[range];
    const cut = Date.now()-days*864e5;
    return base.filter(e=>e.ts>=cut);
  },[entries,range,customFrom,customTo]);

  const gwE  = useMemo(()=>filtered('gewicht'),[filtered]);
  const spE  = useMemo(()=>{ const m={}; filtered('sport').forEach(e=>{m[e.date]=(m[e.date]||0)+(e.data.duration||0);}); return Object.entries(m).map(([d,v])=>({date:d,min:v})); },[filtered]);
  const stE  = useMemo(()=>filtered('stimmung'),[filtered]);
  const wtE  = useMemo(()=>{ const m={}; filtered('ernaehrung').forEach(e=>{m[e.date]=(m[e.date]||0)+(e.data.water||0);}); return Object.entries(m).map(([d,v])=>({date:d,ml:v})); },[filtered]);
  const slE  = useMemo(()=>filtered('schlaf'),[filtered]);
  const scE  = useMemo(()=>{ const m={}; filtered('schritte').forEach(e=>{m[e.date]=(m[e.date]||0)+(e.data.steps||0);}); return Object.entries(m).map(([d,v])=>({date:d,steps:v})); },[filtered]);
  const calE  = useMemo(()=>{ const m={}; filtered('ernaehrung').forEach(e=>{if(e.data.calories)m[e.date]=(m[e.date]||0)+(e.data.calories||0);}); return Object.entries(m).sort().map(([d,kcal])=>({date:d,kcal})); },[filtered]);
  const herzE = useMemo(()=>filtered('herz'),[filtered]);
  const bpE   = useMemo(()=>filtered('blutdruck'),[filtered]);
  const massE = useMemo(()=>filtered('koerpermass'),[filtered]);
  const zyklusE = useMemo(()=>filtered('zyklus').sort((a,b)=>a.date.localeCompare(b.date)),[filtered]);

  const exportXLSX = () => {
    const wb=XLSX.utils.book_new();
    Object.entries(METRICS).forEach(([key,m])=>{
      const rows=entries.filter(e=>e.type===key).map(e=>({Datum:e.date,...e.data}));
      if(rows.length) XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),m.label);
    });
    XLSX.writeFile(wb,`HealthLog_${toDay()}.xlsx`);
  };

  const exportJSON = () => {
    const blob=new Blob([JSON.stringify({entries,settings,exported:new Date().toISOString()},null,2)],{type:'application/json'});
    Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`HealthLog_${toDay()}.json`}).click();
  };

  const dayStr = new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});

  // ── Dashboard ──────────────────────────────────────────────────────────────
  function Dashboard() {
    const stats = [
      {label:'Gewicht',  val:todayW,       unit:todayW?`BMI ${calcBMI(todayW,settings.height)}`:'kg', clr:C.accent},
      {label:'Aktivität',val:todayS||null, unit:'min',                                                clr:C.sport},
      {label:'Stimmung', val:todayM,       unit:todayM?'/10':'',                                      clr:C.mood},
      {label:'Schlaf',   val:todaySl,      unit:todaySl?'Std':'',                                     clr:C.sleep},
      {label:'Herzfrq.', val:todayHerz,    unit:todayHerz?'bpm':'',                                   clr:C.heart},
      {label:'Blutdruck',val:todayBP?`${todayBP.sys}/${todayBP.dia}`:null,unit:todayBP?'mmHg':'',     clr:C.bp},
    ];
    const kcalGoal = settings.kalorienZiel||2000;
    const wtrGoal  = settings.wasserZiel||2000;
    const kcalPct  = Math.min(100,Math.round((todayKcal/kcalGoal)*100));
    const wtrPct   = Math.min(100,Math.round((todayWtr/wtrGoal)*100));

    // Alle konfigurierten Ziele als Fortschrittsbalken
    const allGoals = [
      { label:'Kalorien', val:todayKcal, goal:settings.kalorienZiel||2000, unit:'kcal', clr:C.accent, always:true },
      { label:'Wasser',   val:todayWtr,  goal:settings.wasserZiel||2000,   unit:'ml',   clr:C.water,  always:true },
      { label:'Eiweiß',   val:+todayProt.toFixed(1), goal:settings.proteinZiel,    unit:'g',    clr:C.sport,  always:false },
      { label:'Kohlenhydrate',val:+todayCarb.toFixed(1),goal:settings.kohlenhydrateZiel,unit:'g',clr:C.water,always:false },
      { label:'Fett',     val:+todayFat.toFixed(1),  goal:settings.fettZiel,       unit:'g',    clr:C.mood,   always:false },
      { label:'Ballaststoffe',val:+todayFiber.toFixed(1),goal:settings.ballaststoffeZiel,unit:'g',clr:C.success,always:false },
      { label:'Sport',    val:todayS,    goal:settings.sportZiel,          unit:'min',  clr:C.sport,  always:false },
      { label:'Schritte', val:todaySteps,goal:settings.schritteZiel,       unit:'Schr.',clr:C.steps,  always:false,
        fmt:v=>v>0?v.toLocaleString('de-DE'):null },
      { label:'Schlaf',   val:todaySl||0,goal:settings.schlafZiel,         unit:'Std',  clr:C.sleep,  always:false,
        fmt:v=>v>0?v:null },
    ].filter(g => g.always || (g.goal && g.goal > 0));

    const pct = (val,goal) => Math.min(100, Math.round(((val||0)/goal)*100));
    return <>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:11,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Heute</div>
        <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:22,fontWeight:400,lineHeight:1.25,marginBottom:10}}>{dayStr}</div>

        {/* ── Streak-Badge — immer sichtbar ── */}
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',marginBottom:streakData.atRisk?0:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,
            background:streakData.count>0?`${C.accent}15`:C.cardAlt,
            border:`1px solid ${streakData.count>0?C.accent+'40':C.border}`,
            borderRadius:10,padding:'8px 14px'}}>
            {streakData.count>0 ? <>
              <div style={{display:'flex',gap:2,alignItems:'flex-end'}}>
                {[...Array(Math.min(streakData.count,5))].map((_,i)=>(
                  <div key={i} style={{width:3,borderRadius:1.5,background:C.accent,height:5+i*2}}/>
                ))}
              </div>
              <div>
                <div style={{fontSize:16,fontWeight:700,color:C.accent,lineHeight:1}}>
                  {streakData.count} {streakData.count===1?'Tag':'Tage'}
                </div>
                <div style={{fontSize:10,color:C.accent,opacity:0.7,letterSpacing:0.5,marginTop:1}}>STREAK</div>
              </div>
            </> : <>
              <div style={{width:3,borderRadius:1.5,background:C.faint,height:8}}/>
              <div>
                <div style={{fontSize:14,fontWeight:600,color:C.muted,lineHeight:1}}>Kein Streak</div>
                <div style={{fontSize:10,color:C.faint,marginTop:1}}>Heute tracken zum Starten</div>
              </div>
            </>}
            {settings.streakSave?.savedDate&&!streakData.saveAvailable&&(
              <div style={{fontSize:9,color:C.accent,opacity:0.5,letterSpacing:0.5,marginLeft:2}}>SHIELD</div>
            )}
          </div>
          {streakData.saveAvailable&&!streakData.atRisk&&streakData.count>0&&(
            <div style={{fontSize:10,color:C.muted}}>Shield verfügbar</div>
          )}
        </div>

        {/* ── Streak-Shield Banner ── */}
        {streakData.atRisk&&streakData.saveAvailable&&(
          <div style={{marginTop:10,background:C.cardAlt,border:`1px solid ${C.border}`,
            borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:C.text}}>Streak in Gefahr</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>Gestern nicht getrackt — Shield verfügbar.</div>
            </div>
            <button onClick={useStreakSave} style={{background:'transparent',color:C.accent,
              border:`1px solid ${C.accent}`,borderRadius:7,padding:'6px 14px',
              fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0}}>Retten</button>
          </div>
        )}
        {streakData.atRisk&&!streakData.saveAvailable&&(
          <div style={{marginTop:8,fontSize:11,color:C.faint}}>Streak unterbrochen — heute tracken für Neustart.</div>
        )}
      </div>

      {/* ── Tagesziele Fortschritt ── */}
      <div style={{...ST.card,padding:'14px 16px',marginBottom:12}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:14}}>Tagesziele</div>
        {allGoals.map(g=>{
          const p = pct(g.val, g.goal);
          const displayVal = g.fmt ? g.fmt(g.val) : (g.val>0 ? g.val.toLocaleString('de-DE') : null);
          return (
            <div key={g.label} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:4}}>
                <span style={{fontSize:11,color:C.muted}}>{g.label}</span>
                <span style={{fontSize:11,color:p>=100?C.success:displayVal?g.clr:C.faint,fontWeight:500}}>
                  {displayVal??'—'} <span style={{color:C.faint,fontWeight:400}}>/ {g.goal.toLocaleString('de-DE')} {g.unit}</span>
                </span>
              </div>
              <div style={{height:3,background:C.border,borderRadius:2}}>
                <div style={{width:p+'%',height:'100%',borderRadius:2,
                  background:p>=100?C.success:g.clr,transition:'width .4s'}}/>
              </div>
            </div>
          );
        })}
        <div style={{marginTop:4,fontSize:10,color:C.faint,textAlign:'right'}}>
          Ziele anpassen → Profil
        </div>
      </div>

      <div style={{...ST.grid2, gridTemplateColumns:'1fr 1fr 1fr'}}>
        {stats.slice(0,3).map(s=>(
          <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
            <Bar color={s.clr}/>
            <div style={{fontSize:9,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:5}}>{s.label}</div>
            <div style={{fontSize:s.val!=null&&String(s.val).length>4?16:22,fontWeight:600,color:s.val!=null?s.clr:C.faint,lineHeight:1}}>{s.val??'—'}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{s.unit}</div>
          </div>
        ))}
      </div>
      <div style={ST.grid2}>
        {stats.slice(3).map(s=>(
          <div key={s.label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
            <Bar color={s.clr}/>
            <div style={{fontSize:9,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:5}}>{s.label}</div>
            <div style={{fontSize:s.val!=null&&String(s.val).length>4?16:22,fontWeight:600,color:s.val!=null?s.clr:C.faint,lineHeight:1}}>{s.val??'—'}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:3}}>{s.unit}</div>
          </div>
        ))}
      </div>

      {/* ── Tipp des Tages ── */}
      <DailyTipCard entries={entries} dismissed={dismissed} onDismiss={dismiss}/>

      <div style={ST.secttl}>Schnelleintrag</div>
      <div style={ST.grid2}>
        {Object.entries(METRICS).map(([key,m])=>(
          <button key={key} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 12px',textAlign:'left'}}
            onClick={()=>{setTab('eingabe');setAF(key);}}>
            <Bar color={m.color}/>
            <div style={{fontSize:13,fontWeight:500,color:C.text}}>{m.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{m.unit} eintragen</div>
          </button>
        ))}
      </div>

      {entries.length===0
        ? <div style={{...ST.card,textAlign:'center',padding:36}}><div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>Noch keine Einträge.<br/>Starte mit dem ersten Eintrag.</div></div>
        : <>
          <div style={ST.secttl}>Zuletzt eingetragen</div>
          {entries.slice(0,6).map(e=>(
            <div key={e.id} style={{...ST.card,display:'flex',alignItems:'center',gap:14,padding:'12px 16px'}}>
              <div style={{width:3,height:32,borderRadius:2,background:METRICS[e.type].color,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600}}>{METRICS[e.type].label}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.date}  ·  {preview(e)}</div>
              </div>
              <div style={{display:'flex',gap:2,flexShrink:0}}>
                <button onClick={()=>setEditing(e)} style={{background:'none',border:'none',color:C.muted,fontSize:13,padding:'4px 6px'}}>✎</button>
                <button onClick={()=>softDel(e)} style={{background:'none',border:'none',color:C.faint,fontSize:16,padding:'4px 6px'}}>×</button>
              </div>
            </div>
          ))}
        </>}
    </>;
  }

  // ── Eingabe ────────────────────────────────────────────────────────────────
  function Eingabe() {
    // Local height state — onBlur to avoid re-render on each keystroke
    const [heightVal,setHV] = useState(String(settings.height));
    return <>
      <div style={ST.secttl}>Kategorie</div>
      <div style={ST.grid2}>
        {Object.entries(METRICS).map(([key,m])=>(
          <button key={key} style={{background:activeForm===key?`${m.color}14`:C.card,border:`1px solid ${activeForm===key?m.color+'60':C.border}`,borderRadius:12,padding:'14px 12px',textAlign:'left'}}
            onClick={()=>setAF(key)}>
            <Bar color={m.color}/>
            <div style={{fontSize:13,fontWeight:500,color:activeForm===key?m.color:C.text}}>{m.label}</div>
          </button>
        ))}
      </div>

      {activeForm
        ? <div style={ST.card}>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:2}}>Eintrag</div>
              <div style={{fontSize:16,fontWeight:600,color:METRICS[activeForm].color}}>{METRICS[activeForm].label}</div>
            </div>
            {activeForm==='gewicht'    && <GewichtForm    add={add} settings={settings} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='sport'      && <SportForm      add={add} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='stimmung'   && <StimmungForm   add={add} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='ernaehrung' && <ErrorBoundary><ErnaehrungForm add={add} entries={entries}/></ErrorBoundary>}
            {activeForm==='schlaf'     && <SchlafForm     add={add} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='schritte'   && <SchrittForm    add={add} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='herz'        && <HerzForm       add={add} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='blutdruck'   && <BlutdruckForm  add={add} dismissed={dismissed} onDismiss={dismiss}/>}
            {activeForm==='koerpermass' && <KoerpermassForm add={add}/>}
            {activeForm==='zyklus'      && <ZyklusForm add={add} entries={entries}/>}
          </div>
        : <div style={{...ST.card,padding:28,textAlign:'center',color:C.muted,fontSize:13}}>Kategorie oben auswählen</div>}

      <div style={{...ST.card,marginTop:4}}>
        <div style={{fontSize:11,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:12}}>Einstellungen</div>
        <label style={ST.lbl}>Körpergröße (cm)</label>
        <input
          style={ST.inp}
          type="number"
          inputMode="numeric"
          value={heightVal}
          onChange={e=>setHV(e.target.value)}
          onBlur={()=>setSettings(s=>({...s,height:+heightVal||175}))}
        />
        <div style={{fontSize:11,color:C.muted,marginTop:-8,marginBottom:2}}>Wird für BMI-Berechnung verwendet</div>
        <div style={{marginTop:12,padding:'10px 12px',background:`${C.accent}0A`,
          border:`1px solid ${C.accent}20`,borderRadius:8,
          display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:18,flexShrink:0}}>⚙️</span>
          <div style={{fontSize:11,color:C.faint,lineHeight:1.6}}>
            Tagesziele (Kalorien, Makros, Wasser) werden jetzt im{' '}
            <span style={{color:C.accent,fontWeight:600}}>Profil</span>{' '}
            verwaltet — oben rechts auf den Avatar tippen.
          </div>
        </div>
      </div>
    </>;
  }

  // ── Verlauf ────────────────────────────────────────────────────────────────
  function Verlauf() {
    const wAvg  = avg(gwE.map(e=>e.data.weight));
    const sSum  = spE.reduce((a,e)=>a+e.min,0);
    const mAvg  = avg(stE.map(e=>e.data.mood));
    const wlAvg = avg(wtE.map(e=>e.ml));
    const slAvg = avg(slE.map(e=>e.data.hours));
    const scAvg = scE.length?Math.round(scE.reduce((a,e)=>a+e.steps,0)/scE.length):null;
    const calAvg= calE.length?Math.round(calE.reduce((a,e)=>a+e.kcal,0)/calE.length):null;

    const CHART_DEFS = [
      { id:'gewicht',   title:'Gewichtsverlauf (kg)',        color:C.accent,  hasData:!!gwE.length },
      { id:'sport',     title:'Sportaktivität (Minuten)',    color:C.sport,   hasData:!!spE.length },
      { id:'stimmung',  title:'Stimmung, Energie & Stress',  color:C.mood,    hasData:!!stE.length },
      { id:'wasser',    title:'Wasseraufnahme (ml / Tag)',   color:C.water,   hasData:!!wtE.length },
      { id:'schlaf',    title:'Schlafdauer (Stunden)',       color:C.sleep,   hasData:!!slE.length },
      { id:'schritte',  title:'Schritte pro Tag',            color:C.steps,   hasData:!!scE.length },
      { id:'kalorien',  title:'Kalorien (kcal)',             color:C.accent,  hasData:!!calE.length },
      { id:'herz',      title:'Herzfrequenz (bpm)',          color:C.heart,   hasData:!!herzE.length },
      { id:'blutdruck', title:'Blutdruck (mmHg)',            color:C.bp,      hasData:!!bpE.length },
      { id:'koerper',   title:'Körpermaße (cm)',             color:C.mass,    hasData:!!massE.length },
      { id:'zyklus',    title:'Zyklus & BBT',                color:C.zyklus,  hasData:!!zyklusE.length },
    ];

    const DEFAULT_ORDER = CHART_DEFS.map(d=>d.id);
    const [order,    setOrderLocal] = useState(()=>settings.chartOrder||DEFAULT_ORDER);
    const [editMode, setEditMode]   = useState(false);

    // ── Chart-Settings (Farbe, Typ, Avg) pro Diagramm ──────────────────────
    const chartSettings = settings.chartSettings || {};
    const getOpts = id => chartSettings[id] || { type:null, color:null, showAvg:false };
    const setOpts = (id, patch) => {
      const next = { ...chartSettings, [id]: { ...getOpts(id), ...patch } };
      setSettings(s => ({ ...s, chartSettings: next }));
    };

    // Avg-Hilfsfunktion: fügt horizontale Avg-Linie als Dataset ein
    const withAvg = (datasets, avgValue, color) => {
      if (!avgValue || !datasets[0]?.data?.length) return datasets;
      const n = datasets[0].data.length;
      return [...datasets, {
        label:'Ø Durchschnitt', data:Array(n).fill(avgValue),
        color: color+'AA', isAvg:true,
      }];
    };

    const renderChart = (id) => {
      const opts = getOpts(id);
      const col  = opts.color || CHART_DEFS.find(d=>d.id===id)?.color || C.accent;
      const cType = opts.type; // null = default, or 'line'/'bar'/'area'

      const CC = (props) => (
        <ChartCard {...props} chartId={id} chartOpts={opts}
          onOptsChange={patch=>setOpts(id,patch)}
          avgVal={props.avgVal}/>
      );

      switch(id) {
        case 'gewicht': {
          const avV = wAvg;
          const ds = withAvg([{label:'Gewicht (kg)',data:gwE.map(e=>e.data.weight),color:col,fill:cType==='area'}], opts.showAvg?avV:null, col);
          return <CC key="gewicht" title="Gewichtsverlauf (kg)" color={col} empty={!gwE.length} stat={wAvg?`Ø ${wAvg} kg`:null} avgVal={avV}>
            <CJSChart type={cType||'line'} height={170} labels={gwE.map(e=>fmtD(e.date))} datasets={ds}/>
          </CC>;
        }
        case 'sport': {
          const avV = sSum ? Math.round(sSum/spE.length) : null;
          const ds = withAvg([{label:'Dauer (min)',data:spE.map(e=>e.min),color:col}], opts.showAvg?avV:null, col);
          return <CC key="sport" title="Sportaktivität (Minuten)" color={col} empty={!spE.length} stat={sSum?`${sSum} min`:null} avgVal={avV}>
            <CJSChart type={cType||'bar'} height={170} labels={spE.map(e=>fmtD(e.date))} datasets={ds}/>
          </CC>;
        }
        case 'stimmung': {
          const avV = mAvg;
          const moodDs = [
            {label:'Stimmung',data:stE.map(e=>e.data.mood),color:opts.color||C.mood},
            {label:'Energie', data:stE.map(e=>e.data.energy),color:C.sport},
            {label:'Stress',  data:stE.map(e=>e.data.stress),color:C.danger,dashed:true},
          ];
          const ds = opts.showAvg ? [...moodDs,{label:'Ø Stimmung',data:Array(stE.length).fill(avV),color:(opts.color||C.mood)+'AA',isAvg:true}] : moodDs;
          return <CC key="stimmung" title="Stimmung, Energie & Stress" color={opts.color||C.mood} empty={!stE.length} stat={mAvg?`Ø ${mAvg}/10`:null} avgVal={avV}>
            <CJSChart type={cType||'line'} height={170} yMin={1} yMax={10} yTicks={[1,5,10]} labels={stE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{display:'flex',gap:14,marginTop:10,fontSize:11}}>
              <span style={{color:opts.color||C.mood}}>— Stimmung</span>
              <span style={{color:C.sport}}>— Energie</span>
              <span style={{color:C.danger}}>- - Stress</span>
            </div>
          </CC>;
        }
        case 'wasser': {
          const avV = wlAvg;
          const ds = withAvg([{label:'Wasser (ml)',data:wtE.map(e=>e.ml),color:col}], opts.showAvg?avV:null, col);
          return <CC key="wasser" title="Wasseraufnahme (ml / Tag)" color={col} empty={!wtE.length} stat={wlAvg?`Ø ${wlAvg} ml`:null} avgVal={avV}>
            <CJSChart type={cType||'bar'} height={170} labels={wtE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{marginTop:8,fontSize:11,color:C.muted}}>Empfehlung: mind. 2.000 ml / Tag</div>
          </CC>;
        }
        case 'schlaf': {
          const avV = slAvg;
          const ds = withAvg([{label:'Schlaf (Std)',data:slE.map(e=>e.data.hours),color:col}], opts.showAvg?avV:null, col);
          return <CC key="schlaf" title="Schlafdauer (Stunden)" color={col} empty={!slE.length} stat={slAvg?`Ø ${slAvg} Std`:null} avgVal={avV}>
            <CJSChart type={cType||'bar'} height={170} yMin={0} yMax={12} labels={slE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{marginTop:8,fontSize:11,color:C.muted}}>Empfehlung: 7–9 Stunden / Nacht</div>
          </CC>;
        }
        case 'schritte': {
          const avV = scAvg;
          const ds = withAvg([{label:'Schritte',data:scE.map(e=>e.steps),color:col}], opts.showAvg?avV:null, col);
          return <CC key="schritte" title="Schritte pro Tag" color={col} empty={!scE.length} stat={scAvg?`Ø ${scAvg.toLocaleString('de-DE')}`:null} avgVal={avV}>
            <CJSChart type={cType||'bar'} height={170} labels={scE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{marginTop:8,fontSize:11,color:C.muted}}>Empfehlung: 8.000–10.000 Schritte / Tag</div>
          </CC>;
        }
        case 'kalorien': {
          const avV = calAvg;
          const ds = withAvg([{label:'Kalorien (kcal)',data:calE.map(e=>e.kcal),color:col}], opts.showAvg?avV:null, col);
          return <CC key="kalorien" title="Kalorien aus Lebensmitteln (kcal)" color={col} empty={!calE.length} stat={calAvg?`Ø ${calAvg} kcal`:null} avgVal={avV}>
            <CJSChart type={cType||'bar'} height={170} labels={calE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{marginTop:8,fontSize:11,color:C.muted}}>Nur aus gescannten / eingetragenen Produkten</div>
          </CC>;
        }
        case 'herz': {
          const hAvg = herzE.length?Math.round(herzE.reduce((s,e)=>s+e.data.bpm,0)/herzE.length):null;
          const ds = withAvg([{label:'Herzfrequenz (bpm)',data:herzE.map(e=>e.data.bpm),color:col,fill:false}], opts.showAvg?hAvg:null, col);
          return <CC key="herz" title="Herzfrequenz (bpm)" color={col} empty={!herzE.length} stat={hAvg?`Ø ${hAvg} bpm`:null} avgVal={hAvg}>
            <CJSChart type={cType||'line'} height={170} yMin={40} labels={herzE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{marginTop:8,fontSize:11,color:C.muted}}>Normalbereich: 60–100 bpm in Ruhe</div>
          </CC>;
        }
        case 'blutdruck': {
          const sysAvg = bpE.length?Math.round(bpE.reduce((s,e)=>s+e.data.sys,0)/bpE.length):null;
          const diaAvg = bpE.length?Math.round(bpE.reduce((s,e)=>s+e.data.dia,0)/bpE.length):null;
          const bpDs = [
            {label:'Systolisch', data:bpE.map(e=>e.data.sys),color:opts.color||C.bp},
            {label:'Diastolisch',data:bpE.map(e=>e.data.dia),color:C.heart,dashed:true},
          ];
          const ds = opts.showAvg ? [...bpDs,
            {label:'Ø Sys',data:Array(bpE.length).fill(sysAvg),color:(opts.color||C.bp)+'AA',isAvg:true},
            {label:'Ø Dia',data:Array(bpE.length).fill(diaAvg),color:C.heart+'AA',isAvg:true},
          ] : bpDs;
          return <CC key="blutdruck" title="Blutdruck (mmHg)" color={opts.color||C.bp} empty={!bpE.length} stat={sysAvg?`${sysAvg}/${diaAvg} Ø`:null} avgVal={sysAvg?`${sysAvg}/${diaAvg}`:null}>
            <CJSChart type={cType||'line'} height={170} yMin={50} labels={bpE.map(e=>fmtD(e.date))} datasets={ds}/>
            <div style={{display:'flex',gap:14,marginTop:10,fontSize:11}}>
              <span style={{color:opts.color||C.bp}}>— Systolisch</span>
              <span style={{color:C.heart}}>- - Diastolisch</span>
            </div>
            <div style={{marginTop:6,fontSize:11,color:C.muted}}>Optimal: &lt;120/80 mmHg</div>
          </CC>;
        }
        case 'koerper': return massE.length>0 ? (() => {
          const tAvg = massE.some(e=>e.data.taille)?Math.round(avg(massE.filter(e=>e.data.taille).map(e=>e.data.taille))*10)/10:null;
          const massDs = [
            ...(massE.some(e=>e.data.taille)?[{label:'Taille',data:massE.map(e=>e.data.taille),color:col}]:[]),
            ...(massE.some(e=>e.data.hufte) ?[{label:'Hüfte', data:massE.map(e=>e.data.hufte), color:C.accent,dashed:true}]:[]),
            ...(massE.some(e=>e.data.arm)   ?[{label:'Arm',   data:massE.map(e=>e.data.arm),   color:C.muted}]:[]),
          ];
          return <CC key="koerper" title="Körpermaße (cm)" color={col} empty={false} stat={massE.at(-1)?.data.whr?`WHR ${massE.at(-1).data.whr}`:null} avgVal={tAvg}>
            <CJSChart type={cType||'line'} height={170} labels={massE.map(e=>fmtD(e.date))} datasets={massDs}/>
            <div style={{display:'flex',gap:14,marginTop:10,fontSize:11,flexWrap:'wrap'}}>
              <span style={{color:col}}>— Taille</span>
              <span style={{color:C.accent}}>- - Hüfte</span>
              <span style={{color:C.muted}}>— Arm</span>
            </div>
          </CC>;
        })() : null;
        case 'zyklus': {
          if(!zyklusE.length) return null;
          // Blutungs-Intensität als Balkendiagramm
          const blutDs=[{label:'Blutung (0–4)',data:zyklusE.map(e=>e.data.blutung||0),color:col}];
          // BBT als Linie (wenn vorhanden)
          const hasBBT=zyklusE.some(e=>e.data.bbt);
          const bbtDs=hasBBT?[{label:'BBT (°C)',data:zyklusE.map(e=>e.data.bbt||null),color:'#D4A86A',dashed:false}]:[];
          // Phasen-Legende
          const phasenHeute=ZYKLUS_PHASEN.filter(p=>zyklusE.some(e=>e.data.phase===p.id));
          const letzterEintrag=zyklusE.at(-1);
          const zyklusTag=letzterEintrag?.data.zyklusTag;
          const stat=zyklusTag?`Tag ${zyklusTag}`:(letzterEintrag?.data.phase?ZYKLUS_PHASEN.find(p=>p.id===letzterEintrag.data.phase)?.label:null);
          return <CC key="zyklus" title="Zyklus & Basaltemperatur" color={col} empty={false}
            stat={stat||null} avgVal={null}>
            <CJSChart type={cType||'bar'} height={170} yMin={0} yMax={4}
              labels={zyklusE.map(e=>fmtD(e.date))}
              datasets={hasBBT?[...blutDs,...bbtDs]:blutDs}/>
            {hasBBT&&<div style={{display:'flex',gap:14,marginTop:8,fontSize:11}}>
              <span style={{color:col}}>■ Blutung (0–4)</span>
              <span style={{color:'#D4A86A'}}>— BBT (°C)</span>
            </div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:10}}>
              {ZYKLUS_PHASEN.map(p=>(
                <span key={p.id} style={{fontSize:10,padding:'2px 8px',borderRadius:10,
                  background:`${p.color}20`,color:p.color}}>
                  {p.icon} {p.label}
                </span>
              ))}
            </div>
          </CC>;
        }
        default: return null;
      }
    };

    return <>
      {/* ── Zeitraum-Filter ── */}
      <div style={{marginBottom:16}}>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom: range==='custom'?10:0}}>
          {['7d','30d','3m','1y','all','custom'].map(r=>(
            <button key={r} style={ST.rng(range===r)} onClick={()=>setRange(r)}>
              {r==='7d'?'7 Tage':r==='30d'?'30 Tage':r==='3m'?'3 Mon.':r==='1y'?'1 Jahr':r==='all'?'Alles':'Von–Bis'}
            </button>
          ))}
          <button onClick={()=>setEditMode(e=>!e)}
            style={{marginLeft:'auto',padding:'5px 12px',borderRadius:6,fontSize:11,
              border:`1px solid ${editMode?C.accent:C.border}`,
              background:editMode?`${C.accent}14`:'transparent',
              color:editMode?C.accent:C.muted,cursor:'pointer',flexShrink:0}}>
            {editMode?'× Schließen':'⇅ Sortieren'}
          </button>
        </div>

        {/* Benutzerdefinierter Datumsbereich */}
        {range==='custom'&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:10}}>
            <div>
              <label style={{...ST.lbl,marginBottom:4}}>Von</label>
              <input type="date" max={customTo||toDay()} value={customFrom}
                onChange={e=>setCF(e.target.value)}
                style={{...ST.datePicker,marginBottom:0,fontSize:13}}/>
            </div>
            <div>
              <label style={{...ST.lbl,marginBottom:4}}>Bis</label>
              <input type="date" min={customFrom||undefined} max={toDay()} value={customTo}
                onChange={e=>setCT(e.target.value)}
                style={{...ST.datePicker,marginBottom:0,fontSize:13}}/>
            </div>
          </div>
        )}
      </div>

      {editMode&&(
        <div style={{...ST.card,marginBottom:16,padding:'12px 14px',overflowY:'visible'}}>
          <SortableChartList
            initialOrder={order}
            defs={CHART_DEFS}
            onSave={newOrder=>{
              setOrderLocal(newOrder);
              setSettings(s=>({...s,chartOrder:newOrder}));
              setEditMode(false);
            }}
            onCancel={()=>setEditMode(false)}
          />
        </div>
      )}
      {order.map(id=>renderChart(id))}
    </>;
  }



  // ── Journal ────────────────────────────────────────────────────────────────
  function Tagebuch() {
    const [selDate,  setSelDate] = useState(toDay());
    const [expanded, setExpanded]= useState(null);

    const goPrev = () => {
      const d = new Date(selDate+'T12:00:00'); d.setDate(d.getDate()-1);
      setSelDate(d.toISOString().slice(0,10)); setExpanded(null);
    };
    const goNext = () => {
      const d = new Date(selDate+'T12:00:00'); d.setDate(d.getDate()+1);
      if (d.toISOString().slice(0,10) <= toDay()) { setSelDate(d.toISOString().slice(0,10)); setExpanded(null); }
    };

    const dayEs = useMemo(()=>
      entries.filter(e=>e.date===selDate).sort((a,b)=>a.ts-b.ts),
    [selDate, entries]);

    const fmtLong = d => {
      try { return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
      catch { return d; }
    };

    const mealIcon = {Frühstück:'🌅',Mittagessen:'☀️',Abendessen:'🌙',Snack:'🍎'};

    const METRIC_LINES = {
      gewicht:    d=>[`${d.weight} kg`,d.bmi?`BMI ${d.bmi}`:null,d.fat?`${d.fat}% Körperfett`:null],
      sport:      d=>[`${d.sportType||'Sport'} · ${d.duration} min`,`Intensität ${d.intensity}/5`,d.calories?`${d.calories} kcal verbrannt`:null],
      stimmung:   d=>[`😊 Stimmung ${d.mood}/10`,`⚡ Energie ${d.energy}/10`,`😤 Stress ${d.stress}/10`],
      schlaf:     d=>{ const q=['','Sehr schlecht','Schlecht','Ok','Gut','Sehr gut']; return [`${d.hours} Std Schlaf`,`Qualität: ${q[d.quality]||d.quality}`]; },
      schritte:   d=>[`${(d.steps||0).toLocaleString('de-DE')} Schritte`],
      herz:       d=>[`${d.bpm} bpm`,d.context||null,d.category||null],
      blutdruck:  d=>[`${d.sys}/${d.dia} mmHg`,d.pulse?`Puls: ${d.pulse} bpm`:null,d.classification||null],
      koerpermass:d=>[d.taille?`Taille: ${d.taille} cm`:null,d.hufte?`Hüfte: ${d.hufte} cm`:null,d.brust?`Brust: ${d.brust} cm`:null,d.arm?`Arm: ${d.arm} cm`:null].filter(Boolean),
    };
    const METRIC_SUMMARY = {
      gewicht:    es=>es.map(e=>`${e.data.weight} kg`).join(' · '),
      sport:      es=>`${es.reduce((s,e)=>s+(e.data.duration||0),0)} min · ${[...new Set(es.map(e=>e.data.sportType))].filter(Boolean).join(', ')}`,
      stimmung:   es=>`Stimmung Ø ${(es.reduce((s,e)=>s+(e.data.mood||0),0)/es.length).toFixed(1)}/10`,
      schlaf:     es=>`${es[0]?.data.hours} Std Schlaf`,
      schritte:   es=>`${es.reduce((s,e)=>s+(e.data.steps||0),0).toLocaleString('de-DE')} Schritte`,
      herz:       es=>`${es.map(e=>e.data.bpm).join(', ')} bpm`,
      blutdruck:  es=>`${es[0]?.data.sys}/${es[0]?.data.dia} mmHg`,
      koerpermass:es=>{ const d=es[0]?.data; return [d?.taille?`Taille ${d.taille}cm`:null,d?.hufte?`Hüfte ${d.hufte}cm`:null,d?.whr?`WHR ${d.whr}`:null].filter(Boolean).join(' · ')||'Maße eingetragen'; },
    };

    const EditDel = ({e}) => (
      <div style={{display:'flex',gap:5,marginTop:8}}>
        <button onClick={()=>setEditing(e)} style={{fontSize:10,color:C.muted,background:'none',
          border:`1px solid ${C.border}`,borderRadius:5,padding:'3px 8px',cursor:'pointer'}}>Bearbeiten</button>
        <button onClick={()=>softDel(e)} style={{fontSize:10,color:C.danger,background:'none',
          border:`1px solid ${C.danger}30`,borderRadius:5,padding:'3px 8px',cursor:'pointer'}}>Löschen</button>
      </div>
    );

    const sections = useMemo(()=>{
      const secs=[];

      // ── Ernährung ──
      const ernEs = dayEs.filter(e=>e.type==='ernaehrung');
      const kcal=ernEs.reduce((s,e)=>s+(e.data.calories||0),0);
      const prot=ernEs.reduce((s,e)=>s+(e.data.protein||0),0);
      const carb=ernEs.reduce((s,e)=>s+(e.data.carbs||0),0);
      const fat =ernEs.reduce((s,e)=>s+(e.data.fat||0),0);
      const sugr=ernEs.reduce((s,e)=>s+(e.data.sugar||0),0);
      const sfat=ernEs.reduce((s,e)=>s+(e.data.satFat||0),0);
      const fibr=ernEs.reduce((s,e)=>s+(e.data.fiber||0),0);
      const salt=ernEs.reduce((s,e)=>s+(e.data.salt||0),0);
      const wtr =ernEs.reduce((s,e)=>s+(e.data.water||0),0);
      const foodEs =ernEs.filter(e=>e.data.calories>0||e.data.productName);
      const waterEs=ernEs.filter(e=>e.data.water>0&&!e.data.productName);

      secs.push({
        key:'ernaehrung', label:'Ernährung', color:C.water, count:ernEs.length,
        summary: ernEs.length ? [kcal>0&&`${kcal} kcal`,prot>0&&`${prot.toFixed(0)}g Eiweiß`,wtr>0&&`${wtr} ml Wasser`].filter(Boolean).join(' · ') : 'Noch kein Eintrag',
        detail: ()=> ernEs.length===0 ? null : <>
          {kcal>0&&<>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5,marginBottom:6}}>
              {[['Kalorien',kcal,'kcal',C.accent],['Eiweiß',+prot.toFixed(1),'g',C.sport],
                ['KH',+carb.toFixed(1),'g',C.water],['Fett',+fat.toFixed(1),'g',C.mood]].map(([l,v,u,c])=>(
                <div key={l} style={{background:C.card,borderRadius:8,padding:'8px 4px',textAlign:'center'}}>
                  <div style={{fontSize:14,fontWeight:700,color:c,lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:C.muted,marginTop:1}}>{u}</div>
                  <div style={{fontSize:8,color:C.faint,letterSpacing:0.3,textTransform:'uppercase',marginTop:1}}>{l}</div>
                </div>
              ))}
            </div>
            {(sugr>0||sfat>0||fibr>0||salt>0||wtr>0)&&(
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${C.border}33`}}>
                {sugr>0&&<span style={{fontSize:11,color:C.muted}}>Zucker <span style={{color:C.text,fontWeight:600}}>{sugr.toFixed(1)}g</span></span>}
                {sfat>0&&<span style={{fontSize:11,color:C.muted}}>ges.Fett <span style={{color:C.text,fontWeight:600}}>{sfat.toFixed(1)}g</span></span>}
                {fibr>0&&<span style={{fontSize:11,color:C.muted}}>Ballast. <span style={{color:C.success,fontWeight:600}}>{fibr.toFixed(1)}g</span></span>}
                {salt>0&&<span style={{fontSize:11,color:C.muted}}>Salz <span style={{color:C.text,fontWeight:600}}>{salt.toFixed(2)}g</span></span>}
                {wtr>0 &&<span style={{fontSize:11,color:C.water,fontWeight:600}}>{wtr} ml Wasser</span>}
              </div>
            )}
            {settings.kalorienZiel&&<>
              <div style={{height:3,background:C.border,borderRadius:2,marginBottom:3}}>
                <div style={{width:Math.min(100,Math.round(kcal/settings.kalorienZiel*100))+'%',height:'100%',background:C.accent,borderRadius:2}}/>
              </div>
              <div style={{fontSize:10,color:C.muted,marginBottom:12,textAlign:'right'}}>
                {Math.round(kcal/settings.kalorienZiel*100)}% von {settings.kalorienZiel} kcal Tagesziel
              </div>
            </>}
          </>}
          {['Frühstück','Mittagessen','Abendessen','Snack',''].map(tag=>{
            const grp=foodEs.filter(e=>(e.data.mealTag||'')===tag);
            if(!grp.length) return null;
            const gKcal=grp.reduce((s,e)=>s+(e.data.calories||0),0);
            return <div key={tag||'_'} style={{marginBottom:14}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',
                marginBottom:6,display:'flex',justifyContent:'space-between'}}>
                <span>{mealIcon[tag]||'🍽'} {tag||'Sonstiges'}</span>
                {gKcal>0&&<span style={{color:C.accent}}>{gKcal} kcal</span>}
              </div>
              {grp.map(e=>{
                const d=e.data;
                return <div key={e.id} style={{background:C.card,borderRadius:8,padding:'10px 12px',marginBottom:5}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:6}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.productName||'Manuell'}</div>
                      {d.brand&&<div style={{fontSize:10,color:C.muted}}>{d.brand}</div>}
                      {d.portionLabel
                        ? <div style={{fontSize:11,color:C.water,fontWeight:500,marginTop:1}}>
                            📏 {d.portionLabel}
                            {d.quantity && <span style={{color:C.faint}}> · {d.quantity}{d.unit}</span>}
                          </div>
                        : d.quantity&&<div style={{fontSize:10,color:C.faint}}>{d.quantity} {d.unit}</div>
                      }
                    </div>
                    {d.calories>0&&<span style={{fontSize:14,fontWeight:700,color:C.accent,flexShrink:0}}>{d.calories} kcal</span>}
                  </div>
                  {/* Alle Nährwerte */}
                  <div style={{display:'flex',gap:8,marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}33`,flexWrap:'wrap'}}>
                    {d.protein>0&&<span style={{fontSize:11}}><span style={{color:C.sport,fontWeight:600}}>{d.protein}g</span><span style={{color:C.faint}}> Eiweiß</span></span>}
                    {d.carbs>0  &&<span style={{fontSize:11}}><span style={{color:C.water,fontWeight:600}}>{d.carbs}g</span><span style={{color:C.faint}}> KH</span></span>}
                    {d.fat>0    &&<span style={{fontSize:11}}><span style={{color:C.mood,fontWeight:600}}>{d.fat}g</span><span style={{color:C.faint}}> Fett</span></span>}
                    {d.sugar>0  &&<span style={{fontSize:11}}><span style={{color:C.muted,fontWeight:600}}>{d.sugar}g</span><span style={{color:C.faint}}> Zucker</span></span>}
                    {d.satFat>0 &&<span style={{fontSize:11}}><span style={{color:C.muted,fontWeight:600}}>{d.satFat}g</span><span style={{color:C.faint}}> g.Fett</span></span>}
                    {d.fiber>0  &&<span style={{fontSize:11}}><span style={{color:C.success,fontWeight:600}}>{d.fiber}g</span><span style={{color:C.faint}}> Bstff.</span></span>}
                    {d.salt>0   &&<span style={{fontSize:11}}><span style={{color:C.muted,fontWeight:600}}>{d.salt}g</span><span style={{color:C.faint}}> Salz</span></span>}
                    {d.water>0  &&<span style={{fontSize:11,color:C.water,fontWeight:600}}>{d.water}ml H₂O</span>}
                  </div>
                  {d.note&&<div style={{fontSize:11,color:C.faint,marginTop:6,fontStyle:'italic'}}>{d.note}</div>}
                  <EditDel e={e}/>
                </div>;
              })}
            </div>;
          })}
          {waterEs.map(e=>(
            <div key={e.id} style={{background:C.card,borderRadius:8,padding:'10px 14px',marginBottom:5,
              display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:13,color:C.water}}>{e.data.water} ml Wasser</span>
              <EditDel e={e}/>
            </div>
          ))}
        </>
      });

      // ── Alle anderen Metriken — immer anzeigen ──
      Object.entries(METRICS).filter(([k])=>k!=='ernaehrung').forEach(([key,m])=>{
        const mes=dayEs.filter(e=>e.type===key);
        secs.push({
          key, label:m.label, color:m.color, count:mes.length,
          summary: mes.length ? (METRIC_SUMMARY[key]?.(mes)||`${mes.length} Einträge`) : 'Noch kein Eintrag',
          detail: mes.length===0 ? null : ()=><>{mes.map(e=>{
            const lines=(METRIC_LINES[key]?.(e.data)||[]).filter(Boolean);
            return <div key={e.id} style={{background:C.card,borderRadius:8,padding:'12px 14px',marginBottom:8}}>
              {lines.map((l,i)=>(<div key={i} style={{fontSize:i===0?15:12,fontWeight:i===0?600:400,color:i===0?m.color:C.muted,lineHeight:1.6}}>{l}</div>))}
              {e.data.note&&<div style={{fontSize:11,color:C.faint,marginTop:4,fontStyle:'italic'}}>{e.data.note}</div>}
              <EditDel e={e}/>
            </div>;
          })}</>
        });
      });
      return secs;
    },[dayEs]);

    return <>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <button onClick={goPrev} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
          width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',
          color:C.accent,fontSize:20,cursor:'pointer',flexShrink:0}}>‹</button>
        <input type="date" max={toDay()} value={selDate}
          onChange={e=>{setSelDate(e.target.value);setExpanded(null);}}
          style={{...ST.datePicker,marginBottom:0,flex:1,textAlign:'center'}}/>
        <button onClick={goNext} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
          width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',
          color:selDate>=toDay()?C.faint:C.accent,fontSize:20,cursor:'pointer',flexShrink:0}}
          disabled={selDate>=toDay()}>›</button>
      </div>
      <div style={{fontSize:12,color:C.muted,textAlign:'center',marginBottom:20}}>{fmtLong(selDate)}</div>

      {sections.map(sec=>{
        const isOpen = expanded===sec.key;
        const isEmpty = sec.count === 0;
        return <div key={sec.key} style={{...ST.card,padding:0,overflow:'hidden',marginBottom:8,
          opacity: isEmpty ? 0.7 : 1}}>
          <button onClick={()=>isEmpty ? setJournalAdd({type:sec.key,date:selDate}) : setExpanded(isOpen?null:sec.key)}
            style={{width:'100%',background:'transparent',border:'none',cursor:'pointer',
              padding:'12px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left'}}>
            <div style={{width:3,borderRadius:2,alignSelf:'stretch',minHeight:30,background:isEmpty?C.faint:sec.color,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                <div style={{fontSize:13,fontWeight:600,color:isEmpty?C.muted:C.text}}>{sec.label}</div>
                <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                  {isEmpty
                    ? <span style={{fontSize:11,color:C.faint,letterSpacing:0.2}}>+ Eintragen</span>
                    : <>
                        <div style={ST.pill(sec.color)}>{sec.count}</div>
                        <span style={{fontSize:18,color:isOpen?sec.color:C.faint,display:'inline-block',
                          transition:'transform 0.2s',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>›</span>
                      </>
                  }
                </div>
              </div>
              <div style={{fontSize:11,color:C.faint,marginTop:2,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sec.summary}</div>
            </div>
          </button>
          {isOpen&&sec.detail&&(
            <div style={{borderTop:`1px solid ${C.border}`,padding:'14px',background:`${sec.color}05`}}>
              {sec.detail()}
              <button onClick={()=>setJournalAdd({type:sec.key,date:selDate})}
                style={{width:'100%',marginTop:8,padding:'9px',borderRadius:8,fontSize:12,
                  background:'transparent',border:`1px dashed ${sec.color}50`,
                  color:sec.color,cursor:'pointer',letterSpacing:0.2}}>
                + Weiteres eintragen
              </button>
            </div>
          )}
        </div>;
      })}
    </>;
  }

  // ── Export & Import ────────────────────────────────────────────────────────
  function ExportTab() {
    const [open, setOpen] = useState(null); // 'import' | 'export' | 'stats' | null
    const toggle = key => setOpen(o => o===key ? null : key);

    const Section = ({ id, label, sub, children }) => {
      const isOpen = open === id;
      return (
        <div style={{...ST.card, padding:0, overflow:'hidden', marginBottom:8}}>
          <button onClick={()=>toggle(id)}
            style={{width:'100%', background:'transparent', border:'none', cursor:'pointer',
              padding:'14px 16px', display:'flex', alignItems:'center', justifyContent:'space-between',
              textAlign:'left', gap:12}}>
            <div>
              <div style={{fontSize:13, fontWeight:600, color:C.text}}>{label}</div>
              {!isOpen && sub && <div style={{fontSize:11, color:C.faint, marginTop:2}}>{sub}</div>}
            </div>
            <span style={{fontSize:16, color:isOpen?C.accent:C.faint, flexShrink:0,
              display:'inline-block', transition:'transform 0.2s',
              transform: isOpen ? 'rotate(90deg)' : 'rotate(0deg)'}}>›</span>
          </button>
          {isOpen && (
            <div style={{borderTop:`1px solid ${C.border}`, padding:'16px'}}>
              {children}
            </div>
          )}
        </div>
      );
    };

    return <>
      <Section id="import" label="Import" sub="Apple Health, Google Fit, Samsung, Fitbit, CSV …">
        <HealthImport onImport={importHealth} settings={settings} />
      </Section>

      <Section id="export" label="Export" sub="Excel, PDF oder JSON-Backup herunterladen">
        {[
          {label:'Excel (.xlsx)', sub:`${entries.length} Einträge, je Metrik ein Sheet`, action:exportXLSX, clr:C.success},
          {label:'PDF',           sub:'Druckansicht öffnen → Als PDF speichern',         action:()=>window.print(), clr:C.accent},
          {label:'JSON Backup',   sub:'Rohdaten für Backup oder Import',                 action:exportJSON, clr:C.water},
        ].map(b=>(
          <div key={b.label} style={{marginBottom:12}}>
            <div style={{fontSize:13, fontWeight:600, marginBottom:2}}>{b.label}</div>
            <div style={{fontSize:11, color:C.muted, marginBottom:10, lineHeight:1.5}}>{b.sub}</div>
            <button style={ST.btn(b.clr)} onClick={b.action}>{b.label} herunterladen</button>
          </div>
        ))}
      </Section>

      <Section id="stats" label="Statistik" sub={`${entries.length} Einträge gesamt`}>
        {Object.entries(METRICS).map(([key,m])=>{
          const n=entries.filter(e=>e.type===key).length;
          return <div key={key} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
            padding:'7px 0',borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:3,height:12,background:m.color,borderRadius:1}}/>
              <span style={{fontSize:13}}>{m.label}</span>
            </div>
            <span style={{fontSize:13,color:m.color,fontWeight:600}}>{n}</span>
          </div>;
        })}
        <div style={{display:'flex',justifyContent:'space-between',padding:'9px 0 2px',fontSize:14}}>
          <span style={{fontWeight:600}}>Gesamt</span>
          <span style={{fontWeight:700,color:C.accent}}>{entries.length}</span>
        </div>
      </Section>

      <div style={{...ST.card,borderColor:`${C.danger}20`,background:'#180A08',marginTop:4}}>
        <div style={{fontSize:12,fontWeight:600,color:C.danger,marginBottom:3}}>Daten löschen</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:10,lineHeight:1.5}}>Alle Einträge permanent entfernen.</div>
        <button style={ST.outbtn(C.danger)} onClick={()=>{ if(confirm('Wirklich alle Daten löschen?')){setEntries([]);localStorage.removeItem('entries');} }}>Alle Daten löschen</button>
      </div>
    </>;
  }

  // ── Insights ────────────────────────────────────────────────────────────────
  function InsightsTab() {
    const [selected, setSelected] = useState(null); // { corr } für Scatter-Popup
    const [filterTarget, setFilterTarget] = useState('all');
    const [minN, setMinN] = useState(7);

    // ── Alle Berechnungen memoized ──────────────────────────────────────────
    const matrix = useMemo(() => buildDailyMatrix(entries), [entries]);

    const allCorrelations = useMemo(() => {
      const raw = computeAllCorrelations(matrix);
      return raw.filter(c => c.n >= minN);
    }, [matrix, minN]);

    const filteredCorr = useMemo(() =>
      filterTarget === 'all'
        ? allCorrelations
        : allCorrelations.filter(c => c.target === filterTarget),
      [allCorrelations, filterTarget]
    );

    // ── Anzahl Stimmungs-Einträge ───────────────────────────────────────────
    const moodCount = useMemo(() =>
      entries.filter(e=>e.type==='stimmung').length, [entries]);

    // ── Minimum-Daten-Prüfung ───────────────────────────────────────────────
    if (moodCount < 7) {
      return (
        <div style={{...ST.card,textAlign:'center',padding:'32px 20px'}}>
          <div style={{fontSize:32,marginBottom:12}}>📊</div>
          <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:17,marginBottom:8,color:C.text}}>
            Noch zu wenig Daten
          </div>
          <div style={{fontSize:12,color:C.muted,lineHeight:1.8,marginBottom:16}}>
            Für aussagekräftige Korrelationen werden mindestens <strong style={{color:C.accent}}>7 Stimmungseinträge</strong> benötigt.<br/>
            Aktuell: <strong style={{color:C.accent}}>{moodCount}</strong> Einträge
          </div>
          <div style={{fontSize:11,color:C.faint,lineHeight:1.6,padding:'10px 14px',
            background:C.cardAlt,borderRadius:8,border:`1px solid ${C.border}`}}>
            Tipp: Trage täglich Stimmung, Schlaf und Sport ein — nach einer Woche erscheinen hier automatisch deine persönlichen Insights.
          </div>
        </div>
      );
    }

    const topInsights = filteredCorr.slice(0, 8);
    const hasStrong = topInsights.some(c=>Math.abs(c.r)>=0.4);

    return <>
      {/* ── Header ── */}
      <div style={{marginBottom:16}}>
        <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:18,fontWeight:400,marginBottom:4}}>
          Deine Insights
        </div>
        <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>
          Basierend auf <strong style={{color:C.accent}}>{moodCount} Stimmungseinträgen</strong> und {entries.length} Gesamteinträgen. Pearson r — je näher an ±1, desto stärker der Zusammenhang.
        </div>
      </div>

      {/* ── Ziel-Filter ── */}
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {[['all','Alle'],['mood','Stimmung'],['energy','Energie'],['stress','Stress']].map(([v,l])=>(
          <button key={v} onClick={()=>setFilterTarget(v)}
            style={{padding:'5px 12px',borderRadius:6,fontSize:11,cursor:'pointer',fontFamily:'inherit',
              border:`1px solid ${filterTarget===v?C.accent:C.border}`,
              background:filterTarget===v?`${C.accent}18`:'transparent',
              color:filterTarget===v?C.accent:C.muted,
              fontWeight:filterTarget===v?600:400}}>
            {l}
          </button>
        ))}
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:10,color:C.faint}}>Min. Tage:</span>
          {[7,14,30].map(n=>(
            <button key={n} onClick={()=>setMinN(n)}
              style={{padding:'4px 8px',borderRadius:6,fontSize:10,cursor:'pointer',fontFamily:'inherit',
                border:`1px solid ${minN===n?C.accent:C.border}`,
                background:minN===n?`${C.accent}18`:'transparent',
                color:minN===n?C.accent:C.muted}}>
              {n}
            </button>
          ))}
        </div>
      </div>

      {/* ── Keine Korrelationen ── */}
      {!topInsights.length && (
        <div style={{...ST.card,textAlign:'center',padding:'24px',color:C.muted,fontSize:12}}>
          Keine signifikanten Korrelationen bei ≥{minN} gemeinsamen Tagen.<br/>
          Versuche es mit weniger Minimum-Tagen.
        </div>
      )}

      {/* ── Insight-Karten ── */}
      {topInsights.map((corr,i)=>{
        const insight = generateInsightText(corr, matrix);
        if (!insight) return null;
        const tFact = CORR_FACTORS[corr.target];
        const fFact = CORR_FACTORS[corr.factor];
        const strength = rStrength(corr.r);
        const rCol = rColorScale(corr.r);
        const isPos = corr.r > 0;

        return (
          <div key={i} style={{...ST.card,marginBottom:10,padding:'14px 16px',
            border:`1px solid ${rCol}30`,cursor:'pointer'}}
            onClick={()=>setSelected(selected?.factor===corr.factor&&selected?.target===corr.target?null:corr)}>

            {/* Insight-Header */}
            <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
              {/* Strength-Indikator */}
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,flexShrink:0,paddingTop:2}}>
                {[...Array(3)].map((_,j)=>(
                  <div key={j} style={{width:3,height:3+j*2,borderRadius:1.5,
                    background: j < (strength==='stark'?3:strength==='mittel'?2:1) ? rCol : C.faint}}/>
                ))}
              </div>

              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>
                  <span style={{fontSize:12,fontWeight:600,color:C.text}}>{insight.headline}</span>
                  <span style={{fontSize:10,padding:'1px 7px',borderRadius:10,
                    background:`${rCol}20`,color:rCol,fontWeight:600,fontFamily:'monospace',flexShrink:0}}>
                    r = {corr.r > 0 ? '+' : ''}{corr.r.toFixed(2)}
                  </span>
                </div>
                <div style={{fontSize:11,color:C.muted,lineHeight:1.65}}>{insight.body}</div>
              </div>

              {/* Chevron */}
              <div style={{flexShrink:0,color:C.faint,fontSize:14,paddingTop:2,
                transform:selected?.factor===corr.factor&&selected?.target===corr.target?'rotate(90deg)':'rotate(0deg)',
                transition:'transform 0.2s'}}>›</div>
            </div>

            {/* Badges */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <span style={{fontSize:9,padding:'2px 7px',borderRadius:8,
                background:`${tFact.color}18`,color:tFact.color,letterSpacing:0.4,textTransform:'uppercase'}}>
                {tFact.label}
              </span>
              <span style={{fontSize:9,padding:'2px 7px',borderRadius:8,
                background:`${fFact.color}18`,color:fFact.color,letterSpacing:0.4,textTransform:'uppercase'}}>
                {fFact.label}
              </span>
              <span style={{fontSize:9,padding:'2px 7px',borderRadius:8,
                background:C.cardAlt,color:C.faint,letterSpacing:0.4}}>
                n={corr.n} Tage · {strength}
              </span>
            </div>

            {/* ── Scatter-Plot (bei Klick aufklappen) ── */}
            {selected?.factor===corr.factor&&selected?.target===corr.target && (
              <div style={{marginTop:16,borderTop:`1px solid ${C.border}`,paddingTop:14}}>
                {/* Split-Vergleich: untere vs. obere Hälfte */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                  {[
                    {label:`Wenig ${fFact.label}`, side:'low'},
                    {label:`Viel ${fFact.label}`,  side:'high'}
                  ].map(({label,side})=>{
                    const sorted = [...corr.pairs].sort((a,b)=>a.x-b.x);
                    const mid = Math.floor(sorted.length/2);
                    const half = side==='low' ? sorted.slice(0,mid) : sorted.slice(mid);
                    const halfAvg = +(half.reduce((s,p)=>s+p.y,0)/half.length).toFixed(1);
                    const pct = Math.round((halfAvg/10)*100);
                    const col2 = side==='high' ? (isPos?C.success:C.danger) : (isPos?C.danger:C.success);
                    return (
                      <div key={side} style={{...ST.card,padding:'10px 12px',border:`1px solid ${col2}30`,background:`${col2}08`}}>
                        <div style={{fontSize:9,color:C.muted,letterSpacing:0.5,textTransform:'uppercase',marginBottom:6}}>{label}</div>
                        <div style={{fontSize:20,fontWeight:700,color:col2,lineHeight:1}}>{halfAvg}</div>
                        <div style={{fontSize:9,color:C.faint,marginTop:2}}>{tFact.label}/10</div>
                        {/* Mini-Fortschrittsbalken */}
                        <div style={{marginTop:8,height:3,borderRadius:2,background:C.faint}}>
                          <div style={{width:`${pct}%`,height:'100%',borderRadius:2,background:col2,transition:'width 0.4s'}}/>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Scatter Chart */}
                <ScatterChart
                  pairs={corr.pairs}
                  targetLabel={tFact.label}
                  factorLabel={fFact.label}
                  factorUnit={fFact.unit}
                  r={corr.r}
                />
                <div style={{fontSize:10,color:C.faint,textAlign:'center',marginTop:6,lineHeight:1.5}}>
                  Jeder Punkt = 1 Tag · gestrichelte Linie = Regressionsgerade<br/>
                  Pearson r = {corr.r>0?'+':''}{corr.r.toFixed(3)} · {corr.n} Datenpunkte
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* ── Korrelationsmatrix ── */}
      {allCorrelations.length > 0 && (
        <>
          <div style={{...ST.secttl,marginTop:8}}>Korrelations­matrix</div>
          <div style={{...ST.card,padding:'14px 12px'}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:12,lineHeight:1.6}}>
              Alle Faktoren gegen Stimmung, Energie und Stress. Farbe zeigt Richtung und Stärke.
            </div>
            <CorrelationMatrix correlations={allCorrelations}/>
            {/* Legende */}
            <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap',justifyContent:'center'}}>
              {[['#7A9A7A','Positiv stark'],['#9AB890','Positiv mittel'],['#C8B0A8','Negativ schwach'],['#C8907A','Negativ mittel'],['#B87060','Negativ stark']].map(([c,l])=>(
                <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:9,color:C.muted}}>
                  <div style={{width:10,height:10,borderRadius:2,background:c+'40',border:`1px solid ${c}80`}}/>
                  {l}
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      {/* ── Erklärungsbox ── */}
      <div style={{...ST.card,marginTop:4,background:C.cardAlt,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:8}}>Wie wird das berechnet?</div>
        <div style={{fontSize:11,color:C.muted,lineHeight:1.8}}>
          Die App berechnet den <strong style={{color:C.text}}>Pearson-Korrelationskoeffizienten r</strong> für alle Tage, an denen beide Werte vorhanden sind. r misst, wie stark zwei Variablen linear zusammenhängen — unabhängig von ihrer absoluten Größe.
        </div>
        <div style={{marginTop:8,display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
          {[['r ≥ 0.5','Starke Korrelation'],['r 0.3–0.5','Mittlere Korrelation'],['r 0.15–0.3','Schwache Korrelation'],['< 7 Tage','Nicht angezeigt']].map(([v,l])=>(
            <div key={v} style={{fontSize:10,color:C.faint,lineHeight:1.5}}>
              <span style={{color:C.text,fontWeight:500}}>{v}</span> — {l}
            </div>
          ))}
        </div>
        <div style={{marginTop:10,fontSize:10,color:C.faint,lineHeight:1.6,padding:'8px 10px',
          background:`${C.danger}0A`,borderRadius:6,border:`1px solid ${C.danger}20`}}>
          ⚠️ Korrelation ≠ Kausalität. Diese Zusammenhänge sind statistisch — keine medizinische Diagnose.
        </div>
      </div>
    </>;
  }

  // ── Nav ────────────────────────────────────────────────────────────────────
  const NAV=[{id:'dashboard',l:'Heute'},{id:'eingabe',l:'Eingabe'},{id:'tagebuch',l:'Journal'},{id:'verlauf',l:'Verlauf'},{id:'insights',l:'Insights'},{id:'export',l:'Daten'}];
  const bot='env(safe-area-inset-bottom,0px)', top='env(safe-area-inset-top,0px)';

  return (
    <div style={{background:C.bg,height:'100svh',display:'flex',flexDirection:'column',overflow:'hidden',color:C.text}}>
      <header style={{flexShrink:0,padding:`calc(16px + ${top}) 20px 12px`,borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:22,fontWeight:400,letterSpacing:0.3}}>
            Health<span style={{color:C.accent}}>Log</span>
          </div>
          <button onClick={()=>setShowProfile(true)}
            style={{width:34,height:34,borderRadius:'50%',border:`1.5px solid ${C.border}`,
              background:C.cardAlt,display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',flexShrink:0}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
          </button>
        </div>
        <div style={{fontSize:10,color:C.faint,marginTop:3,letterSpacing:0.4,display:'flex',justifyContent:'space-between'}}>
          <span>{entries.length} Einträge · lokal</span>
          <span>v6.9</span>
        </div>
      </header>

      <main style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'20px 20px 24px',overscrollBehavior:'contain'}}>
        {tab==='dashboard' && <Dashboard/>}
        {tab==='eingabe'   && <Eingabe/>}
        {tab==='tagebuch'  && <Tagebuch/>}
        {tab==='verlauf'   && <Verlauf/>}
        {tab==='insights'  && <InsightsTab/>}
        {tab==='export'    && <ExportTab/>}
      </main>

      {editing && (
        <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)'}} onClick={()=>setEditing(null)}/>
          <div style={{position:'relative',background:C.card,borderRadius:'18px 18px 0 0',padding:'24px 24px 40px',maxHeight:'85svh',overflowY:'auto',border:`1px solid ${C.border}`,borderBottom:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
              <div>
                <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>Eintrag bearbeiten</div>
                <div style={{fontSize:16,fontWeight:600,color:METRICS[editing.type].color}}>{METRICS[editing.type].label}</div>
                <div style={{fontSize:11,color:C.faint,marginTop:2}}>{editing.date}</div>
              </div>
              <button onClick={()=>setEditing(null)} style={{background:'none',border:'none',color:C.muted,fontSize:22,lineHeight:1,padding:4}}>×</button>
            </div>
            {editing.type==='gewicht'    && <GewichtForm    add={add} settings={settings} initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='sport'      && <SportForm      add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='stimmung'   && <StimmungForm   add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='ernaehrung' && <ErrorBoundary><ErnaehrungForm add={add} entries={entries}                    initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/></ErrorBoundary>}
            {editing.type==='schlaf'     && <SchlafForm     add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/>}
            {editing.type==='schritte'   && <SchrittForm    add={add}                     initialData={editing.data} onSave={d=>updateEntry(editing.id,d)} onClose={()=>setEditing(null)}/> }
