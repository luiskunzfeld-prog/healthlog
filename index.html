// ── ErrorBoundary — verhindert App-Crash bei Render-Fehlern ──────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(e) { return { err: e }; }
  componentDidCatch(e) { console.warn('Render-Fehler abgefangen:', e?.message); }
  render() {
    if (this.state.err) return (
      <div style={{padding:'20px',textAlign:'center',color:'#B87060',fontSize:13,lineHeight:1.7}}>
        <div style={{fontSize:20,marginBottom:8}}>⚠</div>
        Fehler beim Laden.<br/>
        <button onClick={()=>this.setState({err:null})}
          style={{marginTop:12,padding:'8px 18px',borderRadius:8,border:'1px solid #B87060',
            background:'transparent',color:'#B87060',fontSize:13,cursor:'pointer'}}>
          Neu versuchen
        </button>
      </div>
    );
    return this.props.children;
  }
}

function ErnaehrungForm({ add, initialData, onSave, onClose, entries }) {
  // Beim Bearbeiten: richtigen Tab + Produkt vorausfüllen
  const initTab = () => {
    if (!initialData) return 'suche';
    if (initialData.productName) return 'suche';
    if (initialData.water > 0 && !initialData.productName) return 'wasser';
    return 'manuell';
  };
  const initSel = () => {
    if (!initialData?.productName) return null;
    const q = initialData.quantity || 100;
    const scale = v => v != null ? +(v * 100 / q).toFixed(2) : 0;
    return {
      name: initialData.productName, brand: initialData.brand||'',
      isLiq: initialData.unit==='ml',
      per100: {
        kcal:    scale(initialData.calories),
        protein: scale(initialData.protein),
        carbs:   scale(initialData.carbs),
        sugar:   scale(initialData.sugar),
        fat:     scale(initialData.fat),
        satFat:  scale(initialData.satFat),
        fiber:   scale(initialData.fiber),
        salt:    scale(initialData.salt),
      }
    };
  };

  const [tab,      setTab]  = useState(initTab);
  const [date,     setDate] = useState(toDay());
  const [mealTag,  setMT]   = useState(initialData?.mealTag||'');

  // ── Rezepte ──────────────────────────────────────────────────────────────
  const [rezepte,      setRezepte]     = useState(()=>store.get('hl_rezepte')||[]);
  const [rezeptMode,   setRezeptMode]  = useState(null); // null | 'neu' | 'edit'
  const [editRezeptId, setEditRezId]   = useState(null);
  const [rezName,      setRezName]     = useState('');
  const [rezZutaten,   setRezZutaten]  = useState([]); // [{name,qty,unit,kcal,protein,...}]
  const [rezSuchQ,     setRezSuchQ]    = useState('');
  const [rezResults,   setRezResults]  = useState([]);
  const [rezLoading,   setRezLoading]  = useState(false);
  const [rezAddedMsg,  setRezAddedMsg] = useState('');
  const rezAbortRef = useRef(null);

  const saveRezepte = (list) => { setRezepte(list); store.set('hl_rezepte', list); };

  const [rezLocalRes, setRezLocalRes] = React.useState([]);

  const rezDoSearch = async q => {
    if (rezAbortRef.current) { try { rezAbortRef.current.abort(); } catch(e){} rezAbortRef.current = null; }
    setRezResults([]);
    // Lokale DB sofort
    try { setRezLocalRes(searchLocalFoods(q, 6)); } catch(e) { setRezLocalRes([]); }
    if (!q || q.trim().length < 2) { setRezLoading(false); return; }
    setRezLoading(true);
    try {
      const ctrl = new AbortController(); rezAbortRef.current = ctrl;
      const timer = setTimeout(()=>{ try{ctrl.abort();}catch(e){} }, 8000);
      const url = `https://de.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q.trim())}&action=process&json=1&page_size=15&sort_by=unique_scans_n&fields=code,product_name,brands,nutriments,product_quantity_unit`;
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(timer);
      if (ctrl.signal.aborted) return;
      const json = await r.json();
      const remote = (json.products||[]).filter(p=>p?.product_name?.trim()).map(p=>({
        code:p.code||'', name:p.product_name.trim(),
        brand:(p.brands||'').split(',')[0].trim(),
        isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),
        kcal:Math.round(pn((p.nutriments||{})['energy-kcal_100g'])),
        nutriments:p.nutriments||{},
      }));
      if (!ctrl.signal.aborted) setRezResults(remote.slice(0,15));
    } catch(err) {}
    finally { setRezLoading(false); }
  };

  // Lokales Produkt als Rezept-Zutat hinzufügen
  const rezAddLocalZutat = (item) => {
    const portions = getPortionsForProduct({name: item.n, cat: item.cat, liq: item.liq});
    const defaultQty = portions.length > 0 ? portions[0].g : item.liq ? 200 : 100;
    const q = defaultQty;
    const p = item.per100;
    const f = (v,d=1) => +((v||0)*q/100).toFixed(d);
    const zutat = {
      name: item.n, brand: 'Schätzwert', qty: q, unit: item.liq ? 'ml' : 'g',
      kcal:   Math.round((p.kcal||0)*q/100),
      protein: f(p.protein), carbs: f(p.carbs), sugar: f(p.sugar||0),
      fat:     f(p.fat),     satFat: f(p.satFat||0), fiber: f(p.fiber||0), salt: f(p.salt||0, 2),
      per100: { kcal:p.kcal, protein:p.protein, carbs:p.carbs, sugar:p.sugar||0,
                fat:p.fat, satFat:p.satFat||0, fiber:p.fiber||0, salt:p.salt||0 }
    };
    setRezZutaten(prev => [...prev, zutat]);
    setRezSuchQ(''); setRezResults([]); setRezLocalRes([]);
  };

  const rezAddZutat = (r, qty=100) => {
    const n = r.nutriments || {};
    const q = qty;
    const f = (v,d=1) => +((pn(v)||0)*q/100).toFixed(d);
    const zutat = {
      name: r.name, brand: r.brand||'', qty, unit: r.isLiq?'ml':'g',
      kcal:   Math.round((r.kcal||pn(n['energy-kcal_100g'])||0)*q/100),
      protein: f(n['proteins_100g']),
      carbs:   f(n['carbohydrates_100g']),
      sugar:   f(n['sugars_100g']),
      fat:     f(n['fat_100g']),
      satFat:  f(n['saturated-fat_100g']),
      fiber:   f(n['fiber_100g']),
      salt:    f(n['salt_100g']||pn(n['sodium_100g'])*2.5, 2),
      per100: {
        kcal:   r.kcal||Math.round(pn(n['energy-kcal_100g']))||0,
        protein: +pn(n['proteins_100g']).toFixed(1),
        carbs:   +pn(n['carbohydrates_100g']).toFixed(1),
        sugar:   +pn(n['sugars_100g']).toFixed(1),
        fat:     +pn(n['fat_100g']).toFixed(1),
        satFat:  +pn(n['saturated-fat_100g']).toFixed(1),
        fiber:   +pn(n['fiber_100g']).toFixed(1),
        salt:    +pn(n['salt_100g']||pn(n['sodium_100g'])*2.5).toFixed(2),
      }
    };
    setRezZutaten(prev => [...prev, zutat]);
    setRezSuchQ('');
    setRezResults([]);
  };

  const rezUpdateQty = (i, rawVal) => {
    setRezZutaten(prev => prev.map((z,idx) => {
      if (idx !== i) return z;
      // qtyStr: was der Nutzer tippt (auch leer/unfertig) — keine Zwangskorrektur
      const qtyStr = rawVal;
      const q = Math.max(1, +rawVal || 1);
      const p = z.per100;
      const ff = (v,d=1) => +((v||0)*q/100).toFixed(d);
      return { ...z, qtyStr,
        qty: q,
        kcal: Math.round((p.kcal||0)*q/100),
        protein: ff(p.protein), carbs: ff(p.carbs), sugar: ff(p.sugar),
        fat: ff(p.fat), satFat: ff(p.satFat), fiber: ff(p.fiber), salt: ff(p.salt, 2) };
    }));
  };

  const rezGesamt = () => rezZutaten.reduce((acc,z) => ({
    kcal:    acc.kcal+z.kcal,
    protein: +(acc.protein+z.protein).toFixed(1),
    carbs:   +(acc.carbs+z.carbs).toFixed(1),
    sugar:   +(acc.sugar+(z.sugar||0)).toFixed(1),
    fat:     +(acc.fat+z.fat).toFixed(1),
    satFat:  +(acc.satFat+(z.satFat||0)).toFixed(1),
    fiber:   +(acc.fiber+(z.fiber||0)).toFixed(1),
    salt:    +(acc.salt+(z.salt||0)).toFixed(2),
  }), {kcal:0,protein:0,carbs:0,sugar:0,fat:0,satFat:0,fiber:0,salt:0});

  const rezSpeichern = (undEintragen=false) => {
    if (!rezName.trim() || rezZutaten.length === 0) return;
    const gesamt = rezGesamt();
    const rezept = {
      id: editRezeptId || ('rez_'+Date.now()),
      name: rezName.trim(),
      zutaten: rezZutaten,
      gesamt,
      updatedAt: Date.now(),
    };
    const liste = editRezeptId
      ? rezepte.map(r => r.id===editRezeptId ? rezept : r)
      : [...rezepte, rezept];
    saveRezepte(liste);
    if (undEintragen) {
      add('ernaehrung', {
        mealTag, water:0,
        calories: gesamt.kcal, protein: gesamt.protein, carbs: gesamt.carbs,
        sugar: gesamt.sugar, fat: gesamt.fat, satFat: gesamt.satFat,
        fiber: gesamt.fiber, salt: gesamt.salt,
        productName: rezName.trim(), brand: 'Eigenes Rezept',
        quantity: rezZutaten.reduce((s,z)=>s+z.qty,0),
        unit:'g', barcode:'', note: rezZutaten.map(z=>z.name).join(', ')
      }, date);
      setRezAddedMsg(rezName.trim());
      setTimeout(()=>setRezAddedMsg(''), 3000);
    }
    setRezeptMode(null); setEditRezId(null); setRezName(''); setRezZutaten([]);
  };

  const rezEintragen = (rezept) => {
    const g = rezept.gesamt;
    add('ernaehrung', {
      mealTag, water:0,
      calories: g.kcal, protein: g.protein, carbs: g.carbs,
      sugar: g.sugar||0, fat: g.fat, satFat: g.satFat||0,
      fiber: g.fiber||0, salt: g.salt||0,
      productName: rezept.name, brand: 'Eigenes Rezept',
      quantity: rezept.zutaten.reduce((s,z)=>s+z.qty,0),
      unit:'g', barcode:'', note: rezept.zutaten.map(z=>z.name).join(', ')
    }, date);
    setRezAddedMsg(rezept.name);
    setTimeout(()=>setRezAddedMsg(''), 3000);
  };

  const rezEditStart = (rezept) => {
    setEditRezId(rezept.id);
    setRezName(rezept.name);
    setRezZutaten(rezept.zutaten);
    setRezeptMode('edit');
  };

  const rezLoeschen = (id) => {
    if (!confirm('Rezept löschen?')) return;
    saveRezepte(rezepte.filter(r=>r.id!==id));
  };

  // Suche
  const [searchQ,  setSQ]      = useState('');
  const [results,  setRes]     = useState([]);
  const [loading,  setLoad]    = useState(false);
  const [selProd,  setSel]     = useState(initSel);
  const [qty,      setQty]     = useState(String(initialData?.quantity||100));
  const [unit,     setUnit]    = useState(initialData?.unit||'g');
  const [scanErr,  setScanE]   = useState('');
  const [scanManual, setScanManual] = useState(''); // EAN nach fehlgeschlagenem Scan auto-befüllen
  const [addedMsg, setAddedMsg]= useState('');   // ✓-Toast nach Eintragen
  const captureRef             = useRef(null);
  const abortRef               = useRef(null);
  const searchRef              = useRef(null);   // Re-Fokus nach Speichern
  const liveVideoRef           = useRef(null);
  const liveStreamRef          = useRef(null);
  const liveTimerRef           = useRef(null);
  const [liveScanning, setLiveScanning] = useState(false);
  const [liveScanErr,  setLiveScanErr]  = useState('');

  const stopLiveScan = () => {
    clearTimeout(liveTimerRef.current);
    if (liveStreamRef.current) { liveStreamRef.current.getTracks().forEach(t=>t.stop()); liveStreamRef.current=null; }
    setLiveScanning(false);
  };

  // Cleanup wenn Komponente unmountet
  React.useEffect(() => () => stopLiveScan(), []);

  const startLiveScan = async () => {
    setLiveScanErr('');
    setLiveScanning(true);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
      });
      liveStreamRef.current = stream;
      await new Promise(r=>setTimeout(r,80));
      if (!liveVideoRef.current) { stream.getTracks().forEach(t=>t.stop()); return; }
      liveVideoRef.current.srcObject = stream;
      await liveVideoRef.current.play().catch(()=>{});
      const tick = async () => {
        if (!liveStreamRef.current) return;
        const vid = liveVideoRef.current;
        if (vid && vid.readyState >= 2 && vid.videoWidth > 0) {
          const result = await detectFromImage(vid).catch(()=>null);
          if (result) {
            stopLiveScan();
            setScanE('⏳ Produkt wird gesucht…');
            let json = null;
            try {
              const ctrl = new AbortController(); setTimeout(()=>ctrl.abort(),10000);
              const r = await fetch(`https://de.openfoodfacts.org/api/v2/product/${result.code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,{signal:ctrl.signal});
              const j = await r.json(); if (j.status===1&&j.product?.product_name) json=j;
            } catch(e2) {}
            if (!json) {
              try {
                const ctrl2 = new AbortController(); setTimeout(()=>ctrl2.abort(),10000);
                const r2 = await fetch(`https://world.openfoodfacts.org/api/v2/product/${result.code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,{signal:ctrl2.signal});
                const j2 = await r2.json(); if (j2.status===1&&j2.product?.product_name) json=j2;
              } catch(e3) {}
            }
            setScanE('');
            if (json) {
              const p = json.product;
              pickProduct({name:p.product_name.trim(), brand:(p.brands||'').split(',')[0].trim(),
                isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),
                kcal:0, nutriments:p.nutriments||{}, pqu:p.product_quantity_unit||''});
            } else {
              setScanE(`❌ EAN ${result.code} nicht gefunden — manuell eingeben 👇`);
              setScanManual(result.code);
            }
            return;
          }
        }
        liveTimerRef.current = setTimeout(tick, 350);
      };
      tick();
    } catch(err) {
      stopLiveScan();
      if (err.name==='NotAllowedError') setLiveScanErr('Kamera-Zugriff verweigert. Bitte in den Browser-Einstellungen erlauben.');
      else setLiveScanErr('Kamera nicht verfügbar — Foto-Modus nutzen.');
    }
  };

  // Wasser-Tab
  const [water, setW]     = useState(initialData?.water ?? 0);
  const [mealQ, setMQ]    = useState(initialData?.mealQ ?? 3);
  const [cal,   setCal]   = useState(initialData?.calories != null ? String(initialData.calories) : '');
  const [note,  setNote]  = useState(initialData?.note || '');

  // Manuell-Tab — bei Edit mit Werten vorausfüllen wenn kein Produktname
  const backCalc = (v,q) => v!=null&&q ? String(+(v*100/q).toFixed(1)) : '';
  const mq0 = initialData?.quantity||100;
  const [mName,  setMN]  = useState(initialData?.productName||'');
  const [mKcal,  setMK]  = useState(initialData&&!initialData.productName ? backCalc(initialData.calories,mq0) : '');
  const [mProt,  setMP]  = useState(initialData&&!initialData.productName ? backCalc(initialData.protein,mq0) : '');
  const [mCarb,  setMC]  = useState(initialData&&!initialData.productName ? backCalc(initialData.carbs,mq0) : '');
  const [mSugar, setMSu] = useState(initialData&&!initialData.productName ? backCalc(initialData.sugar,mq0) : '');
  const [mFat,   setMF]  = useState(initialData&&!initialData.productName ? backCalc(initialData.fat,mq0) : '');
  const [mSatFat,setMSF] = useState(initialData&&!initialData.productName ? backCalc(initialData.satFat,mq0) : '');
  const [mFiber, setMFi] = useState(initialData&&!initialData.productName ? backCalc(initialData.fiber,mq0) : '');
  const [mSalt,  setMSa] = useState(initialData&&!initialData.productName ? backCalc(initialData.salt,mq0) : '');
  const [mQty,   setMQ2] = useState(String(mq0));
  const [mUnit,  setMU]  = useState(initialData?.unit||'g');

  // ── Verlauf — letzte eingetragene Produkte (de-dupliziert nach Name) ───────
  const foodHistory = useMemo(() => {
    if (!entries) return [];
    const seen = new Set();
    return entries
      .filter(e => e.type === 'ernaehrung' && e.data?.productName)
      .filter(e => {
        if (seen.has(e.data.productName)) return false;
        seen.add(e.data.productName);
        return true;
      })
      .slice(0, 25);
  }, [entries]);

  // ── Suche — lokale DB zuerst, dann OpenFoodFacts ────────────────────────────
  const [localRes, setLocalRes] = React.useState([]);

  const doSearch = async q => {
    if (abortRef.current) { try { abortRef.current.abort(); } catch(e){} abortRef.current = null; }
    setRes([]);
    // Lokale DB sofort, kein Warten
    try { setLocalRes(searchLocalFoods(q, 6)); } catch(e) { setLocalRes([]); }
    if (!q || q.trim().length < 2) { setLoad(false); return; }
    setLoad(true);
    try {
      const ctrl = new AbortController();
      abortRef.current = ctrl;
      const timer = setTimeout(()=>{ try{ctrl.abort();}catch(e){} }, 8000);
      const url = `https://de.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q.trim())}&action=process&json=1&page_size=20&sort_by=unique_scans_n&fields=code,product_name,brands,nutriments,product_quantity_unit`;
      const r = await fetch(url, { signal: ctrl.signal });
      clearTimeout(timer);
      if (ctrl.signal.aborted) return;
      const json = await r.json();
      const remote = (json.products||[]).filter(p=>p?.product_name?.trim()).map(p=>({
        code:p.code||'', name:p.product_name.trim(),
        brand:(p.brands||'').split(',')[0].trim(),
        isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),
        kcal:Math.round(pn((p.nutriments||{})['energy-kcal_100g'])),
        nutriments:p.nutriments||{}, pqu:p.product_quantity_unit||'',
      }));
      if (!ctrl.signal.aborted) setRes(remote.slice(0,20));
    } catch(err) { /* AbortError oder Netzwerkfehler */ }
    finally { setLoad(false); }
  };

  // Lokales Produkt aus LOCAL_FOOD_DB auswählen
  const pickLocalProduct = item => {
    setSel({
      name: item.n, brand: 'Schätzwert (BLS/USDA)', isLiq: !!item.liq,
      per100: {
        kcal:    item.per100.kcal,
        protein: item.per100.protein,
        carbs:   item.per100.carbs,
        sugar:   item.per100.sugar   || 0,
        fat:     item.per100.fat,
        satFat:  item.per100.satFat  || 0,
        fiber:   item.per100.fiber   || 0,
        salt:    item.per100.salt    || 0,
      }
    });
    setUnit(item.liq ? 'ml' : 'g');
    // Sinnvolle Standard-Portion aus Portionskatalog
    const portions = getPortionsForProduct({ name: item.n, cat: item.cat, liq: item.liq });
    setQty(portions.length > 0 ? String(portions[0].g) : item.liq ? '200' : '100');
  };

  const pickProduct = r => {
    try {
      const n = r.nutriments || {};
      setSel({
        name: r.name||'', brand: r.brand||'', isLiq: !!r.isLiq,
        per100: {
          kcal:   r.kcal || Math.round(pn(n['energy-kcal_100g'])) || 0,
          protein: +pn(n['proteins_100g']).toFixed(1),
          carbs:   +pn(n['carbohydrates_100g']).toFixed(1),
          sugar:   +pn(n['sugars_100g']).toFixed(1),
          fat:     +pn(n['fat_100g']).toFixed(1),
          satFat:  +pn(n['saturated-fat_100g']).toFixed(1),
          fiber:   +pn(n['fiber_100g']).toFixed(1),
          salt:    +pn(n['salt_100g'] || pn(n['sodium_100g'])*2.5).toFixed(2),
        }
      });
      setUnit(r.isLiq ? 'ml' : 'g');
      setQty(r.isLiq ? '200' : '100');
    } catch(e) { console.warn('Produkt auswählen fehlgeschlagen:', e?.message); }
  };

  const calcN = () => {
    if (!selProd?.per100) return null;
    const q = Math.max(+qty||1, 1), p = selProd.per100;
    const f = (v,d=1) => +((v||0)*q/100).toFixed(d);
    return { kcal:Math.round((p.kcal||0)*q/100), protein:f(p.protein),
      carbs:f(p.carbs), sugar:f(p.sugar), fat:f(p.fat),
      satFat:f(p.satFat), fiber:f(p.fiber), salt:f(p.salt,2) };
  };
  const N = calcN();
  const presets = selProd?.isLiq ? [100,200,250,330,500] : [25,50,100,150,200];

  // Ähnliche Produkte = restliche Suchergebnisse beim aktuell gewählten Produkt
  const similarProds = selProd ? results.filter(r => r.name !== selProd.name).slice(0,6) : [];

  // ── Barcode — OpenFoodFacts API (DE zuerst, world als Fallback) ──────────
  const handleCapture = async e => {
    const file = e?.target?.files?.[0]; if (!file) return; e.target.value=''; setScanE('');
    try {
      const url = URL.createObjectURL(file);
      const img = new Image();
      await new Promise((ok,fail)=>{img.onload=ok;img.onerror=fail;img.src=url;});
      const hit = await detectFromImage(img).catch(()=>null);
      URL.revokeObjectURL(url);
      if (!hit) {
        setScanE('❌ Kein Barcode erkannt — Barcode gerade halten, gute Beleuchtung, nah rangehen.\n\nTipp: Barcode-Nummer manuell eintippen 👇');
        return;
      }
      setScanE('⏳ Produkt wird gesucht…');
      const ctrl = new AbortController(); setTimeout(()=>ctrl.abort(),10000);
      // DE-Datenbank zuerst (besser für Supermarkt-Produkte in Deutschland)
      let json = null;
      try {
        const deRes = await fetch(
          `https://de.openfoodfacts.org/api/v2/product/${hit.code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,
          {signal: ctrl.signal}
        );
        const deJson = await deRes.json();
        if (deJson.status === 1 && deJson.product?.product_name) json = deJson;
      } catch(e2) {}
      // Fallback: world.openfoodfacts.org
      if (!json) {
        try {
          const ctrl2 = new AbortController(); setTimeout(()=>ctrl2.abort(),10000);
          const wRes = await fetch(
            `https://world.openfoodfacts.org/api/v2/product/${hit.code}.json?fields=product_name,brands,nutriments,product_quantity_unit`,
            {signal: ctrl2.signal}
          );
          const wJson = await wRes.json();
          if (wJson.status === 1 && wJson.product?.product_name) json = wJson;
        } catch(e3) {}
      }
      setScanE('');
      if (json) {
        const p = json.product;
        pickProduct({name:p.product_name.trim(), brand:(p.brands||'').split(',')[0].trim(),
          isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),
          kcal:0, nutriments:p.nutriments||{}, pqu:p.product_quantity_unit||''});
      } else {
        setScanE(`❌ EAN ${hit.code} nicht gefunden. Nährwerte manuell eingeben oder Barcode-Nummer unten eintippen.`);
        setScanManual(hit.code);
      }
    } catch(err) { setScanE('Fehler: '+(err?.message||'Unbekannt')); }
  };

  // ── Speichern ──────────────────────────────────────────────────────────────
  const showToast = name => {
    setAddedMsg(name);
    setTimeout(() => setAddedMsg(''), 3000);
  };
  const saveProduct = () => {
    if (!selProd || !N) return;
    const d = { mealTag, water:selProd.isLiq?(+qty||0):0,
      calories:N.kcal, protein:N.protein, carbs:N.carbs, sugar:N.sugar,
      fat:N.fat, satFat:N.satFat, fiber:N.fiber, salt:N.salt,
      productName:selProd.name, brand:selProd.brand,
      quantity:+qty, unit, barcode:'', note:'' };
    onSave ? onSave(d) : add('ernaehrung', d, date);
    if (!onSave) {
      // Kontext beibehalten: Suche offen lassen für direkt nächstes Produkt
      showToast(selProd.name);
      setSel(null);
      setQty('100');
      // Fokus zurück auf Suchfeld nach kurzem Delay
      setTimeout(() => searchRef.current?.focus(), 80);
    }
  };
  const saveWasser = () => {
    const d = { mealTag, water, mealQ, calories:cal?+cal:null, note, productName:null, brand:'' };
    onSave ? onSave(d) : add('ernaehrung', d, date);
  };
  const saveManuell = () => {
    const q = Math.max(+mQty||1,1);
    const p = (v,d=1) => +((+v||0)*q/100).toFixed(d);
    const d = { mealTag, water:mUnit==='ml'?q:0,
      calories:Math.round((+mKcal||0)*q/100),
      protein:p(mProt), carbs:p(mCarb), sugar:p(mSugar),
      fat:p(mFat), satFat:p(mSatFat), fiber:p(mFiber),
      salt:p(mSalt,2), productName:mName||'Manuell eingetragen',
      brand:'', quantity:q, unit:mUnit, barcode:'', note };
    onSave ? onSave(d) : add('ernaehrung', d, date);
  };
  // Verlauf: 1-Klick-Wiederholen mit gespeicherter Menge
  const quickAddHistory = histEntry => {
    add('ernaehrung', { ...histEntry.data, mealTag }, date);
    showToast(histEntry.data.productName);
  };

  // ── Nährstoff-Tabelle ──────────────────────────────────────────────────────
  const NutriTable = ({n}) => (
    <div style={{marginBottom:14,borderRadius:8,overflow:'hidden',border:`1px solid ${C.border}`}}>
      {[
        ['Kalorien',         n.kcal+' kcal',  C.accent,  true],
        ['Eiweiß',           n.protein+' g',  C.sport,   true],
        ['Kohlenhydrate',    n.carbs+' g',    C.water,   true],
        n.sugar>0  ? ['  davon Zucker',  n.sugar+' g',   C.muted,   false] : null,
        ['Fett',             n.fat+' g',      C.mood,    true],
        n.satFat>0 ? ['  ges. Fettsäuren',n.satFat+' g',C.muted,   false] : null,
        n.fiber>0  ? ['Ballaststoffe',   n.fiber+' g',  C.success, true] : null,
        n.salt>0   ? ['Salz',            n.salt+' g',   C.muted,   true] : null,
      ].filter(Boolean).map(([l,v,col,main],i,arr)=>(
        <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
          padding:`${main?8:5}px ${main?12:20}px`,
          background:i%2===0?`${C.bg}`:C.card,
          borderBottom:i<arr.length-1?`1px solid ${C.border}44`:'none'}}>
          <span style={{fontSize:main?12:11,color:main?C.muted:C.faint}}>{l.trim()}</span>
          <span style={{fontSize:main?14:12,fontWeight:main?600:400,color:col}}>{v}</span>
        </div>
      ))}
    </div>
  );

  const TABS=[
    {id:'suche',   l:'🔍 Suche'},
    {id:'verlauf', l:'⏱ Verlauf'},
    {id:'rezepte', l:'📋 Rezepte'},
    {id:'wasser',  l:'💧 Wasser'},
    {id:'manuell', l:'✎ Manuell'},
  ];

  return <>
    <input ref={captureRef} type="file" accept="image/*" capture="environment"
      onChange={handleCapture} style={{display:'none'}}/>
    {!initialData && <DatePickerField value={date} onChange={setDate}/>}

    <label style={ST.lbl}>Mahlzeit</label>
    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
      {['Frühstück','Mittagessen','Abendessen','Snack'].map(t=>(
        <button key={t} onClick={()=>setMT(mealTag===t?'':t)}
          style={{padding:'5px 12px',borderRadius:6,fontSize:12,
            border:`1px solid ${mealTag===t?C.water:C.border}`,
            background:mealTag===t?`${C.water}18`:'transparent',
            color:mealTag===t?C.water:C.muted}}>{t}</button>
      ))}
    </div>

    {/* ── ✓ Toast — bleibt über den Tabs damit er immer sichtbar ist ── */}
    {addedMsg&&(
      <div style={{
        background:`${C.success}14`,border:`1px solid ${C.success}35`,
        borderRadius:8,padding:'8px 12px',marginBottom:10,
        display:'flex',alignItems:'center',gap:8
      }}>
        <span style={{fontSize:15,color:C.success,flexShrink:0}}>✓</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:12,color:C.success,fontWeight:600,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {addedMsg}
          </div>
          <div style={{fontSize:10,color:C.muted,marginTop:1}}>
            hinzugefügt · nächstes Produkt wählen
          </div>
        </div>
      </div>
    )}

    {/* ── Tab-Bar (4 Tabs) ── */}
    <div style={{display:'flex',marginBottom:14,border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden'}}>
      {TABS.map((t,i)=>(
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{flex:1,padding:'9px 2px',fontSize:10,fontWeight:tab===t.id?600:400,
            background:tab===t.id?`${C.water}18`:'transparent',
            color:tab===t.id?C.water:C.muted,border:'none',
            borderRight:i<TABS.length-1?`1px solid ${C.border}`:'none',
            letterSpacing:0.2}}>
          {t.l}
        </button>
      ))}
    </div>

    {/* ══════════════════════════ SUCHE ════════════════════════════════════ */}
    {tab==='suche'&&<>
      {!selProd?<>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input ref={searchRef} style={{...ST.inp,marginBottom:0,flex:1}}
            placeholder="Apfel, Joghurt, Haferflocken…"
            value={searchQ} autoComplete="off"
            onChange={e=>{setSQ(e.target.value);doSearch(e.target.value);}}
            onKeyDown={e=>e.key==='Enter'&&doSearch(searchQ)}/>
          <button onClick={()=>liveScanning ? stopLiveScan() : startLiveScan()}
            style={{background:liveScanning?`${C.danger}20`:`${C.water}20`,
              border:`1px solid ${liveScanning?C.danger+'40':C.water+'40'}`,
              borderRadius:8,padding:'0 14px',color:liveScanning?C.danger:C.water,fontSize:20,
              flexShrink:0,cursor:'pointer'}}>{liveScanning?'✕':'📷'}</button>
        </div>

        {/* ── Live-Scanner-Ansicht ── */}
        {liveScanning&&(
          <div style={{position:'relative',marginBottom:10,borderRadius:10,overflow:'hidden',
            background:'#000',aspectRatio:'4/3',maxHeight:240}}>
            <video ref={liveVideoRef} playsInline muted autoPlay
              style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            {/* Fadenkreuz */}
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
              <div style={{width:180,height:80,border:`2px solid ${C.water}`,borderRadius:8,
                boxShadow:`0 0 0 2000px rgba(0,0,0,0.45)`}}/>
            </div>
            <div style={{position:'absolute',bottom:8,left:0,right:0,textAlign:'center',
              fontSize:11,color:'#fff',opacity:0.8}}>Barcode in den Rahmen halten</div>
          </div>
        )}
        {liveScanErr&&<div style={{fontSize:11,color:C.danger,marginBottom:8,padding:'8px 10px',
          background:`${C.danger}14`,borderRadius:6}}>{liveScanErr}</div>}

        {scanErr&&<div style={{fontSize:11,color:scanErr.startsWith('⏳')?C.muted:C.danger,
          marginBottom:8,padding:'8px 10px',
          background:scanErr.startsWith('⏳')?`${C.muted}14`:`${C.danger}14`,
          borderRadius:6,whiteSpace:'pre-line'}}>{scanErr}</div>}
        {/* EAN-Schnelleingabe: erscheint automatisch nach fehlgeschlagenem Scan */}
        {(scanManual || scanErr.includes('eintippen')) && !selProd && (
          <div style={{marginBottom:10}}>
            <label style={ST.lbl}>Barcode-Nummer (EAN) eingeben</label>
            <div style={{display:'flex',gap:8}}>
              <input style={{...ST.inp,marginBottom:0,flex:1,fontFamily:'monospace'}}
                type="number" inputMode="numeric" placeholder="z.B. 4388860678727"
                value={scanManual} onChange={e=>setScanManual(e.target.value)}
                onKeyDown={async e=>{
                  if(e.key==='Enter'&&scanManual.trim()){
                    setScanE('⏳ Produkt wird gesucht…');
                    const code=scanManual.trim();
                    let json=null;
                    try{const r=await fetch(`https://de.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`);const j=await r.json();if(j.status===1&&j.product?.product_name)json=j;}catch(e2){}
                    if(!json){try{const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`);const j=await r.json();if(j.status===1&&j.product?.product_name)json=j;}catch(e3){}}
                    setScanE('');
                    if(json){const p=json.product;pickProduct({name:p.product_name.trim(),brand:(p.brands||'').split(',')[0].trim(),isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),kcal:0,nutriments:p.nutriments||{},pqu:p.product_quantity_unit||''});setScanManual('');}
                    else setScanE(`❌ EAN ${code} nicht gefunden — bitte manuell eingeben.`);
                  }
                }}/>
              <button onClick={async ()=>{
                if(!scanManual.trim())return;
                setScanE('⏳ Produkt wird gesucht…');
                const code=scanManual.trim();
                let json=null;
                try{const r=await fetch(`https://de.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`);const j=await r.json();if(j.status===1&&j.product?.product_name)json=j;}catch(e2){}
                if(!json){try{const r=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=product_name,brands,nutriments,product_quantity_unit`);const j=await r.json();if(j.status===1&&j.product?.product_name)json=j;}catch(e3){}}
                setScanE('');
                if(json){const p=json.product;pickProduct({name:p.product_name.trim(),brand:(p.brands||'').split(',')[0].trim(),isLiq:(p.product_quantity_unit||'').toLowerCase().includes('ml'),kcal:0,nutriments:p.nutriments||{},pqu:p.product_quantity_unit||''});setScanManual('');}
                else setScanE(`❌ EAN ${code} nicht gefunden — bitte manuell eingeben.`);
              }} style={{background:C.water,color:C.bg,border:'none',borderRadius:8,
                padding:'0 14px',fontSize:13,fontWeight:600,cursor:'pointer',flexShrink:0}}>
                Suchen
              </button>
            </div>
          </div>
        )}
        {loading&&<div style={{fontSize:11,color:C.muted,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
          <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',
            border:`2px solid ${C.water}`,borderTopColor:'transparent',
            animation:'spin 0.7s linear infinite'}}/>
          Suche in OpenFoodFacts…
        </div>}
        <div style={{maxHeight:320,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
          {/* ── Lokale Treffer (sofort, aus interner DB) ── */}
          {localRes.length>0&&<>
            <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',
              marginBottom:6,marginTop:2,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:C.success,display:'inline-block',flexShrink:0}}/>
              Generische Einträge (Schätzwerte)
            </div>
            {localRes.map(item=>{
              const portions = getPortionsForProduct({name:item.n, cat:item.cat, liq:item.liq});
              const defaultPortion = portions[0];
              return (
                <button key={'loc_'+item.n} onClick={()=>pickLocalProduct(item)}
                  style={{width:'100%',background:`${C.success}08`,border:`1px solid ${C.success}25`,
                    borderRadius:8,padding:'10px 12px',textAlign:'left',marginBottom:5,display:'block',cursor:'pointer'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',
                      textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,paddingRight:8}}>{item.n}</div>
                    <span style={{fontSize:10,color:C.success,flexShrink:0,fontWeight:500,
                      background:`${C.success}15`,borderRadius:4,padding:'1px 5px'}}>lokal</span>
                  </div>
                  <div style={{display:'flex',gap:8,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
                    {defaultPortion&&<span style={{fontSize:10,color:C.muted,background:`${C.border}60`,
                      borderRadius:4,padding:'1px 5px'}}>{defaultPortion.label}</span>}
                    <span style={{fontSize:10,color:C.accent,fontWeight:500}}>
                      {item.per100.kcal} kcal/100{item.liq?'ml':'g'}
                    </span>
                    <span style={{fontSize:10,color:C.sport}}>{item.per100.protein}g P</span>
                    <span style={{fontSize:10,color:C.water}}>{item.per100.carbs}g KH</span>
                    <span style={{fontSize:10,color:C.mood}}>{item.per100.fat}g F</span>
                  </div>
                </button>
              );
            })}
            {results.length>0&&<div style={{fontSize:10,color:C.faint,letterSpacing:0.8,
              textTransform:'uppercase',marginBottom:6,marginTop:8,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:C.water,display:'inline-block',flexShrink:0}}/>
              Markenprodukte (OpenFoodFacts)
            </div>}
          </>}
          {/* ── OpenFoodFacts-Treffer ── */}
          {results.map(r=>(
            <button key={(r.code||'')+r.name} onClick={()=>pickProduct(r)}
              style={{width:'100%',background:C.cardAlt,border:`1px solid ${C.border}`,
                borderRadius:8,padding:'10px 12px',textAlign:'left',marginBottom:5,display:'block',cursor:'pointer'}}>
              <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                <span style={{fontSize:11,color:C.muted}}>{r.brand||'—'}</span>
                {r.kcal>0&&<span style={{fontSize:11,color:C.accent,fontWeight:500}}>
                  {r.kcal} kcal/100{r.isLiq?'ml':'g'}</span>}
              </div>
            </button>
          ))}
        </div>
        {searchQ.length>0&&results.length===0&&localRes.length===0&&!loading&&(
          <div style={{fontSize:12,color:C.muted,textAlign:'center',padding:'12px 0'}}>Keine Treffer</div>)}
        {searchQ.length===0&&(
          <div style={{fontSize:11,color:C.faint,textAlign:'center',padding:'10px 0',lineHeight:1.8}}>
            Produktname tippen oder Barcode scannen</div>)}
      </>:<>
        {/* ── Produkt-Detailansicht ── */}
        <div style={{...ST.card,marginBottom:12,background:C.cardAlt,padding:'12px 14px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{flex:1,minWidth:0,paddingRight:8}}>
              <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',
                whiteSpace:'nowrap'}}>{selProd.name}</div>
              {selProd.brand&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{selProd.brand}</div>}
            </div>
            <button onClick={()=>{setSel(null);setScanE('');setScanManual('');}}
              style={{background:'none',border:'none',color:C.muted,fontSize:20,padding:0,
                cursor:'pointer',flexShrink:0}}>✕</button>
          </div>
        </div>
        <label style={ST.lbl}>Menge</label>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input style={{...ST.inp,marginBottom:0,flex:1}} type="number" inputMode="numeric"
            value={qty} onChange={e=>setQty(e.target.value)}/>
          <div style={{display:'flex',border:`1px solid ${C.border}`,borderRadius:8,overflow:'hidden',flexShrink:0}}>
            {['g','ml'].map(u=>(
              <button key={u} onClick={()=>setUnit(u)}
                style={{padding:'0 14px',background:unit===u?`${C.water}20`:'transparent',
                  color:unit===u?C.water:C.muted,border:'none',fontSize:13,
                  fontWeight:unit===u?600:400,cursor:'pointer'}}>{u}</button>
            ))}
          </div>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
          {presets.map(q=>(
            <button key={q} onClick={()=>setQty(String(q))}
              style={{padding:'4px 12px',borderRadius:6,fontSize:12,cursor:'pointer',
                border:`1px solid ${+qty===q?C.water:C.border}`,
                background:+qty===q?`${C.water}18`:'transparent',
                color:+qty===q?C.water:C.muted}}>{q}{unit}</button>
          ))}
        </div>
        {N && <NutriTable n={N}/>}

        {/* ── Ähnliche Produkte (aus derselben Suche) ── */}
        {similarProds.length>0&&(
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:8}}>
              Ähnliche Produkte
            </div>
            <div style={{display:'flex',gap:6,overflowX:'auto',WebkitOverflowScrolling:'touch',
              paddingBottom:6,marginBottom:2}}>
              {similarProds.map(r=>(
                <button key={(r.code||'')+r.name} onClick={()=>pickProduct(r)}
                  style={{flexShrink:0,background:C.card,border:`1px solid ${C.border}`,
                    borderRadius:8,padding:'8px 10px',textAlign:'left',cursor:'pointer',
                    maxWidth:148,minWidth:110}}>
                  <div style={{fontSize:11,fontWeight:500,color:C.text,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                    marginBottom:2}}>{r.name}</div>
                  {r.brand&&<div style={{fontSize:10,color:C.faint,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                    marginBottom:2}}>{r.brand}</div>}
                  {r.kcal>0&&<div style={{fontSize:10,color:C.accent,fontWeight:500}}>
                    {r.kcal} kcal</div>}
                </button>
              ))}
            </div>
          </div>
        )}

        {onClose&&<button style={{...ST.outbtn(C.muted),marginBottom:8}} onClick={onClose}>Abbrechen</button>}
        <button style={ST.btn(C.water)} onClick={saveProduct}>Eintragen</button>
      </>}
    </>}

    {/* ══════════════════════════ VERLAUF ══════════════════════════════════ */}
    {tab==='verlauf'&&<>
      {foodHistory.length===0?(
        <div style={{textAlign:'center',padding:'28px 16px',color:C.faint,lineHeight:1.9}}>
          <div style={{fontSize:28,marginBottom:8}}>🍽️</div>
          <div style={{fontSize:12,color:C.muted}}>Noch keine Einträge gespeichert.</div>
          <div style={{fontSize:11,marginTop:4}}>
            Trage zuerst Produkte über den Suche-Tab ein.
          </div>
        </div>
      ):(
        <>
          <div style={{fontSize:11,color:C.faint,marginBottom:10,lineHeight:1.6,
            padding:'7px 10px',background:C.cardAlt,borderRadius:7,
            border:`1px solid ${C.border}`}}>
            💡 Tippe auf ein Produkt, um es mit gleicher Menge sofort einzutragen.
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {foodHistory.map(e=>{
              const d = e.data;
              const daysAgo = Math.round((Date.now()-e.ts)/(1000*60*60*24));
              const when = daysAgo===0?'Heute':daysAgo===1?'Gestern':`vor ${daysAgo}d`;
              return (
                <button key={e.id} onClick={()=>quickAddHistory(e)}
                  style={{width:'100%',background:C.cardAlt,border:`1px solid ${C.border}`,
                    borderRadius:8,padding:'10px 12px',textAlign:'left',cursor:'pointer',
                    display:'flex',alignItems:'center',gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',
                      textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.productName}</div>
                    <div style={{display:'flex',gap:7,marginTop:3,alignItems:'center',flexWrap:'wrap'}}>
                      <span style={{fontSize:10,color:C.muted,background:`${C.border}60`,
                        borderRadius:4,padding:'1px 5px'}}>
                        {d.quantity}{d.unit}
                      </span>
                      {d.calories>0&&<span style={{fontSize:10,color:C.accent,fontWeight:600}}>
                        {d.calories} kcal</span>}
                      {d.protein>0&&<span style={{fontSize:10,color:C.sport}}>
                        {d.protein}g P</span>}
                      {d.mealTag&&<span style={{fontSize:10,color:C.muted}}>{d.mealTag}</span>}
                      <span style={{fontSize:10,color:C.faint,marginLeft:'auto'}}>{when}</span>
                    </div>
                  </div>
                  <div style={{flexShrink:0,width:30,height:30,borderRadius:7,
                    background:`${C.water}18`,border:`1px solid ${C.water}35`,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:18,color:C.water,fontWeight:300}}>+</div>
                </button>
              );
            })}
          </div>
        </>
      )}
    </>}

    {/* ══════════════════════════ REZEPTE ════════════════════════════════════ */}
    {tab==='rezepte'&&<>
      {rezAddedMsg&&(
        <div style={{background:`${C.success}14`,border:`1px solid ${C.success}35`,
          borderRadius:8,padding:'8px 12px',marginBottom:10,
          display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:15,color:C.success}}>✓</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:C.success,fontWeight:600,
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rezAddedMsg}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:1}}>eingetragen</div>
          </div>
        </div>
      )}
      {rezeptMode===null&&<>
        <button onClick={()=>{setRezeptMode('neu');setRezName('');setRezZutaten([]);setEditRezId(null);}}
          style={{...ST.btn(C.accent,'#0A0806'),marginBottom:14}}>
          + Neues Rezept erstellen
        </button>
        {rezepte.length===0?(
          <div style={{textAlign:'center',padding:'28px 16px',color:C.faint,lineHeight:1.9}}>
            <div style={{fontSize:28,marginBottom:8}}>📋</div>
            <div style={{fontSize:12,color:C.muted}}>Noch keine Rezepte gespeichert.</div>
            <div style={{fontSize:11,marginTop:4}}>Erstelle dein erstes Rezept aus mehreren Zutaten.</div>
          </div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {rezepte.map(rez=>(
              <div key={rez.id} style={{background:C.cardAlt,border:`1px solid ${C.border}`,borderRadius:10,padding:'12px 14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rez.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                      {rez.zutaten.length} Zutaten · {rez.gesamt.kcal} kcal
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6,flexShrink:0,marginLeft:8}}>
                    <button onClick={()=>rezEditStart(rez)}
                      style={{background:`${C.border}60`,border:'none',borderRadius:6,padding:'4px 10px',
                        color:C.muted,fontSize:11,cursor:'pointer'}}>Bearb.</button>
                    <button onClick={()=>rezLoeschen(rez.id)}
                      style={{background:`${C.danger}18`,border:`1px solid ${C.danger}30`,borderRadius:6,
                        padding:'4px 10px',color:C.danger,fontSize:11,cursor:'pointer'}}>✕</button>
                  </div>
                </div>
                <div style={{display:'flex',gap:10,fontSize:11,color:C.muted,marginBottom:10,flexWrap:'wrap'}}>
                  <span style={{color:C.sport}}>{rez.gesamt.protein}g P</span>
                  <span style={{color:C.water}}>{rez.gesamt.carbs}g KH</span>
                  <span style={{color:C.mood}}>{rez.gesamt.fat}g F</span>
                  {rez.gesamt.fiber>0&&<span style={{color:C.success}}>{rez.gesamt.fiber}g Bal.</span>}
                </div>
                <div style={{fontSize:10,color:C.faint,marginBottom:10,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {rez.zutaten.map(z=>z.name).join(', ')}
                </div>
                <button onClick={()=>rezEintragen(rez)}
                  style={{...ST.btn(C.water),padding:'8px 0',fontSize:13}}>
                  Eintragen
                </button>
              </div>
            ))}
          </div>
        )}
      </>}

      {(rezeptMode==='neu'||rezeptMode==='edit')&&<>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
          <button onClick={()=>{setRezeptMode(null);setEditRezId(null);setRezName('');setRezZutaten([]);}}
            style={{background:'none',border:'none',color:C.muted,fontSize:20,padding:0,cursor:'pointer',flexShrink:0}}>←</button>
          <div style={{fontSize:14,fontWeight:600,color:C.text}}>
            {rezeptMode==='edit'?'Rezept bearbeiten':'Neues Rezept'}
          </div>
        </div>
        <label style={ST.lbl}>Rezeptname</label>
        <input style={ST.inp} placeholder="z.B. Fitness-Bowl, Abendessen" value={rezName}
          onChange={e=>setRezName(e.target.value)}/>

        {/* Zutaten-Liste */}
        {rezZutaten.length>0&&<>
          <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:8}}>Zutaten</div>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14}}>
            {rezZutaten.map((z,i)=>(
              <div key={i} style={{background:C.cardAlt,border:`1px solid ${C.border}`,
                borderRadius:8,padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,color:C.text,overflow:'hidden',
                    textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{z.name}</div>
                  <div style={{fontSize:10,color:C.accent,marginTop:2}}>{z.kcal} kcal</div>
                </div>
                <input type="number" inputMode="numeric" value={z.qtyStr !== undefined ? z.qtyStr : z.qty}
                  onChange={e=>rezUpdateQty(i,e.target.value)}
                  style={{width:60,padding:'4px 6px',background:C.card,border:`1px solid ${C.border}`,
                    borderRadius:6,color:C.text,fontSize:12,textAlign:'center'}}/>
                <span style={{fontSize:11,color:C.muted,minWidth:16}}>{z.unit}</span>
                <button onClick={()=>setRezZutaten(prev=>prev.filter((_,idx)=>idx!==i))}
                  style={{background:'none',border:'none',color:C.danger,fontSize:16,
                    cursor:'pointer',padding:0,flexShrink:0}}>✕</button>
              </div>
            ))}
          </div>
          {/* Gesamtnährwerte Live-Vorschau */}
          {(()=>{const g=rezGesamt();return(
            <div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}25`,
              borderRadius:8,padding:'10px 12px',marginBottom:14}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:6}}>Gesamt</div>
              <div style={{display:'flex',gap:12,flexWrap:'wrap',fontSize:12}}>
                <span style={{color:C.accent,fontWeight:700}}>{g.kcal} kcal</span>
                <span style={{color:C.sport}}>{g.protein}g Protein</span>
                <span style={{color:C.water}}>{g.carbs}g KH</span>
                <span style={{color:C.mood}}>{g.fat}g Fett</span>
                {g.fiber>0&&<span style={{color:C.success}}>{g.fiber}g Bal.</span>}
              </div>
            </div>
          );})()}
        </>}

        {/* Zutat suchen */}
        <label style={ST.lbl}>Zutat hinzufügen</label>
        <input style={{...ST.inp,marginBottom:8}} placeholder="Produkt suchen…"
          value={rezSuchQ} autoComplete="off"
          onChange={e=>{setRezSuchQ(e.target.value);rezDoSearch(e.target.value);}}/>
        {rezLoading&&<div style={{fontSize:11,color:C.muted,marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
          <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',
            border:`2px solid ${C.water}`,borderTopColor:'transparent',
            animation:'spin 0.7s linear infinite'}}/>
          Suche…
        </div>}
        <div style={{maxHeight:240,overflowY:'auto',WebkitOverflowScrolling:'touch',marginBottom:12}}>
          {/* Lokale Treffer */}
          {rezLocalRes.length>0&&<>
            <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',
              marginBottom:6,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:C.success,display:'inline-block',flexShrink:0}}/>
              Generische Einträge
            </div>
            {rezLocalRes.map(item=>{
              const portions = getPortionsForProduct({name:item.n, cat:item.cat, liq:item.liq});
              const defP = portions[0];
              return (
                <button key={'rloc_'+item.n} onClick={()=>rezAddLocalZutat(item)}
                  style={{width:'100%',background:`${C.success}08`,border:`1px solid ${C.success}25`,
                    borderRadius:8,padding:'9px 12px',textAlign:'left',marginBottom:4,display:'block',cursor:'pointer'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',
                      textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,paddingRight:8}}>{item.n}</div>
                    <span style={{fontSize:10,color:C.success,flexShrink:0,fontWeight:500,
                      background:`${C.success}15`,borderRadius:4,padding:'1px 5px'}}>lokal</span>
                  </div>
                  <div style={{display:'flex',gap:8,marginTop:3,flexWrap:'wrap',alignItems:'center'}}>
                    {defP&&<span style={{fontSize:10,color:C.muted,background:`${C.border}60`,
                      borderRadius:4,padding:'1px 5px'}}>{defP.label}</span>}
                    <span style={{fontSize:10,color:C.accent,fontWeight:500}}>{item.per100.kcal} kcal/100{item.liq?'ml':'g'}</span>
                    <span style={{fontSize:10,color:C.sport}}>{item.per100.protein}g P</span>
                    <span style={{fontSize:10,color:C.water}}>{item.per100.carbs}g KH</span>
                    <span style={{fontSize:10,color:C.mood}}>{item.per100.fat}g F</span>
                  </div>
                </button>
              );
            })}
            {rezResults.length>0&&<div style={{fontSize:10,color:C.faint,letterSpacing:0.8,
              textTransform:'uppercase',marginBottom:6,marginTop:8,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:C.water,display:'inline-block',flexShrink:0}}/>
              Markenprodukte
            </div>}
          </>}
          {/* OpenFoodFacts */}
          {rezResults.map(r=>(
            <button key={(r.code||'')+r.name} onClick={()=>rezAddZutat(r,100)}
              style={{width:'100%',background:C.cardAlt,border:`1px solid ${C.border}`,
                borderRadius:8,padding:'9px 12px',textAlign:'left',marginBottom:4,display:'block',cursor:'pointer'}}>
              <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:2}}>
                <span style={{fontSize:11,color:C.muted}}>{r.brand||'—'}</span>
                {r.kcal>0&&<span style={{fontSize:11,color:C.accent,fontWeight:500}}>{r.kcal} kcal/100g</span>}
              </div>
            </button>
          ))}
          {rezSuchQ.length>0&&rezResults.length===0&&rezLocalRes.length===0&&!rezLoading&&(
            <div style={{fontSize:12,color:C.muted,textAlign:'center',padding:'10px 0'}}>Keine Treffer</div>
          )}
        </div>

        <div style={{display:'flex',gap:8,marginTop:4}}>
          <button onClick={()=>rezSpeichern(false)}
            disabled={!rezName.trim()||rezZutaten.length===0}
            style={{...ST.outbtn(C.accent),flex:1,
              opacity:(!rezName.trim()||rezZutaten.length===0)?0.4:1}}>
            Speichern
          </button>
          <button onClick={()=>rezSpeichern(true)}
            disabled={!rezName.trim()||rezZutaten.length===0}
            style={{...ST.btn(C.water),flex:1,
              opacity:(!rezName.trim()||rezZutaten.length===0)?0.4:1}}>
            Speichern + Eintragen
          </button>
        </div>
      </>}
    </>}

    {/* ══════════════════════════ WASSER ═══════════════════════════════════ */}
    {tab==='wasser'&&<>
      <label style={ST.lbl}>Wasser (ml)</label>

// ZYKLUS-TRACKING
//
// Datenstruktur je Tages-Eintrag (type: 'zyklus'):
// {
//   phase:       'menstruation'|'follikulaer'|'ovulation'|'luteal'|null
//   blutung:     0–4  (0=keine, 1=leicht, 2=mittel, 3=stark, 4=sehr stark)
//   bbt:         number|null     — Basaltemperatur °C
//   lh_test:     'negativ'|'positiv'|null
//   zervix:      'trocken'|'cremig'|'wässrig'|'spinnbar'|null
//   symptome:    string[]        — aus ZYKLUS_SYMPTOME
//   zyklusTag:   number|null     — berechneter Tag im aktuellen Zyklus
//   note:        string
//   quelle:      'manual'|'apple_health'|'google_fit'|'flo'|'clue'|'import'
// }
//
// Sync-Quellen (Adapter-Architektur):
//   Apple HealthKit → XML Export → parseApple() erweitert
//   Google Health Connect → JSON Export → parseGoogleFit() erweitert
//   Flo Health → CSV Export → parseFlo() (neu)
//   Clue → CSV Export → parseClue() (neu)
//   Manuell → ZyklusForm
// ══════════════════════════════════════════════════════════════════════════════

const ZYKLUS_PHASEN = [
  { id:'menstruation', label:'Menstruation', color:'#C87A9A', icon:'🩸' },
  { id:'follikulaer',  label:'Follikulär',   color:'#D4A86A', icon:'🌱' },
  { id:'ovulation',    label:'Ovulation',    color:'#7AB48A', icon:'⭐' },

];

  'Müdigkeit','Blähungen','Brustschmerzen','Akne',

];

const ZYKLUS_ZERVIX = ['Trocken','Cremig','Wässrig','Spinnbar'];

// Berechnet Zyklustag anhand vergangener Einträge
function berechneZyklusTag(entries, datum) {
  const zyklusEs = entries
    .filter(e => e.type === 'zyklus' && e.data.blutung > 0 && e.date <= datum)
    .sort((a, b) => b.date.localeCompare(a.date));
  if (!zyklusEs.length) return null;
  // Letzter Blutungsbeginn suchen
  let letzterBeginn = null;
  for (let i = 0; i < zyklusEs.length; i++) {
    const e = zyklusEs[i];
    // Ist dies Zyklusstart? → Kein Blutungseintrag am Vortag
    const vortagStr = new Date(new Date(e.date+'T12:00:00').getTime() - 864e5).toISOString().slice(0,10);
    const hatVortag = zyklusEs.some(x => x.date === vortagStr && x.data.blutung > 0);
    if (!hatVortag) { letzterBeginn = e.date; break; }
  }
  if (!letzterBeginn) return null;
  const diff = Math.round((new Date(datum+'T12:00:00') - new Date(letzterBeginn+'T12:00:00')) / 864e5);
  return diff + 1;
}
