}


function preview(e) {
  const d=e.data;
  if(e.type==='gewicht')    return `${d.weight} kg${d.bmi?`  ·  BMI ${d.bmi}`:''}`;
  if(e.type==='sport')      return `${d.sportType}  ·  ${d.duration} min`;
  if(e.type==='stimmung')   return `Stimmung ${d.mood}/10  ·  Energie ${d.energy}/10`;
  if(e.type==='ernaehrung') { const tag=d.mealTag?d.mealTag+' · ':''; if(d.productName) return `${tag}${d.productName}${d.portionLabel?' · '+d.portionLabel:d.calories?' · '+d.calories+' kcal':''}`; return `${tag}${d.water} ml Wasser`; }
  if(e.type==='herz')        return `${d.bpm} bpm${d.context?' · '+d.context:''}  ·  ${d.category||''}`;
  if(e.type==='blutdruck')   return `${d.sys}/${d.dia} mmHg${d.pulse?' · '+d.pulse+' bpm':''}  ·  ${d.classification||''}`;
  if(e.type==='koerpermass') { const parts=[]; if(d.taille)parts.push('Taille '+d.taille+'cm'); if(d.hufte)parts.push('Hüfte '+d.hufte+'cm'); if(d.whr)parts.push('WHR '+d.whr); return parts.join('  ·  ')||'Maße eingetragen'; }
  if(e.type==='schlaf')     return `${d.hours} Std  ·  Qualität ${d.quality}/5`;
  if(e.type==='schritte')   return `${d.steps.toLocaleString('de-DE')} Schritte`;
  if(e.type==='zyklus') {
    const ph=ZYKLUS_PHASEN.find(p=>p.id===d.phase);
    const bl=d.blutung>0?`  ·  Blutung: ${ZYKLUS_BLUTUNG[d.blutung]}`:'';
    const sym=d.symptome?.length?`  ·  ${d.symptome.slice(0,2).join(', ')}`:'';
    return `${ph?ph.icon+' '+ph.label:'Kein Phase'}${bl}${sym}`;
  }
  return '';
}

// ── Universal Health Import ─────────────────────────────────────────────────
// Unterstützt: Apple Health, Google Fit, Samsung Health, Garmin, Fitbit,
//              MyFitnessPal, HealthLog JSON Backup, Generic CSV
// Partial Import: Importiert was geht, meldet was nicht klappt

function HealthImport({ onImport, settings }) {
  const [state,setState]   = useState('idle');
  const [parsed,setParsed] = useState(null);
  const [errMsg,setErr]    = useState('');
  const [appTab,setApp]    = useState('auto'); // auto|apple|google|samsung|garmin|fitbit|mfp|csv|json

  // ── Format-Detektierung ────────────────────────────────────────────────────
  const detectFormat = (zipFiles, rawText) => {
    const names = Object.keys(zipFiles||{}).map(n=>n.toLowerCase());
    if (names.some(n=>n.includes('export.xml'))) return 'apple';
    if (names.some(n=>n.includes('workout-') || n.includes('sleep-') || n.includes('body_weight'))) return 'fitbit';
    if (names.some(n=>n.includes('com.samsung.shealth'))) return 'samsung';
    if (names.some(n=>n.includes('activities') && n.endsWith('.json'))) return 'garmin';
    if (names.some(n=>n.includes('daily_activity_metrics'))) return 'google';
    if (rawText) {
      if (rawText.includes('<HealthData') || rawText.includes('HKQuantityTypeIdentifier')) return 'apple';
      try { const j=JSON.parse(rawText); if (j.entries) return 'healthlog'; if (j.bucket||j.session) return 'google'; } catch{}
      if (rawText.trim().startsWith('{')) { try { const j=JSON.parse(rawText); if (j.date&&j.weight) return 'fitbit-weight'; } catch{} }
      if (rawText.includes('Date,Calories') || rawText.includes('Food Name,Calories')) return 'mfp';
      if (rawText.includes('Date,Steps') || rawText.includes('date,steps')) return 'csv-steps';
      // Flo: hat "Menstruation" oder "Cycle_phase" Spalte
      if (rawText.toLowerCase().includes('menstruation') && rawText.toLowerCase().includes('cramps')) return 'flo';
      // Clue: hat "Bleeding" oder "Tender_breasts" Spalte
      if (rawText.toLowerCase().includes('bleeding') && (rawText.toLowerCase().includes('tender') || rawText.toLowerCase().includes('fluid'))) return 'clue';
    }
    return 'unknown';
  };

  // ── Apple Health Parser ────────────────────────────────────────────────────
  const parseApple = (doc, entries, errors) => {
    let gw=0,sp=0,sl=0,sc=0,fat=0;
    // Gewicht
    doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierBodyMass"]').forEach(r=>{
      try {
        const date=r.getAttribute('startDate')?.slice(0,10);
        const val=parseFloat(r.getAttribute('value'));
        const unit=r.getAttribute('unit');
        if(!date||isNaN(val)) return;
        const kg=unit==='lb'?+(val*0.453592).toFixed(1):val;
        entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'gewicht',
          data:{weight:kg,fat:null,bmi:calcBMI(kg,settings.height),note:'Apple Health'}});
        gw++;
      } catch(e){ errors.push('Gewichtseintrag: '+e.message); }
    });
    // Körperfett
    const fatMap={};
    doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierBodyFatPercentage"]').forEach(r=>{
      const date=r.getAttribute('startDate')?.slice(0,10);
      const val=parseFloat(r.getAttribute('value'));
      if(date&&!isNaN(val)) fatMap[date]=+(val*100).toFixed(1);
    });
    entries.forEach(e=>{ if(e.type==='gewicht'&&fatMap[e.date]) { e.data.fat=fatMap[e.date]; fat++; }});
    // Workouts
    doc.querySelectorAll('Workout').forEach(w=>{
      try {
        const date=w.getAttribute('startDate')?.slice(0,10);
        const dur=parseFloat(w.getAttribute('duration'));
        if(!date||isNaN(dur)||dur<1) return;
        const actType=w.getAttribute('workoutActivityType');
        const cal=w.getAttribute('totalEnergyBurned');
        entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'sport',
          data:{sportType:ACTIVITY_MAP[actType]||'Sonstiges',duration:Math.round(dur),
                intensity:3,calories:cal?Math.round(parseFloat(cal)):null,note:'Apple Health'}});
        sp++;
      } catch(e){ errors.push('Sport-Eintrag: '+e.message); }
    });
    // Schlaf
    const sleepMap={};
    doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierSleepAnalysis"]').forEach(r=>{
      const val=r.getAttribute('value')||'';
      if(!val.includes('Asleep')&&val!=='HKCategoryValueSleepAnalysisAsleep') return;
      const date=r.getAttribute('startDate')?.slice(0,10);
      const mins=(new Date(r.getAttribute('endDate'))-new Date(r.getAttribute('startDate')))/60000;
      if(date&&mins>0) sleepMap[date]=(sleepMap[date]||0)+mins;
    });
    Object.entries(sleepMap).forEach(([date,mins])=>{
      entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schlaf',
        data:{hours:+(mins/60).toFixed(1),quality:3,note:'Apple Health'}});
      sl++;
    });
    // Schritte
    const stepsMap={};
    doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierStepCount"]').forEach(r=>{
      const date=r.getAttribute('startDate')?.slice(0,10);
      const val=parseInt(r.getAttribute('value'));
      if(date&&!isNaN(val)) stepsMap[date]=(stepsMap[date]||0)+val;
    });
    Object.entries(stepsMap).forEach(([date,steps])=>{
      entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schritte',
        data:{steps,note:'Apple Health'}});
      sc++;
    });

    // ── Zyklus-Daten aus Apple HealthKit ─────────────────────────────────────
    // Apple HealthKit Mapping:
    //   HKCategoryTypeIdentifierMenstrualFlow    → blutung (1=unspec, 2=leicht, 3=mittel, 4=stark)
    //   HKCategoryTypeIdentifierOvulationTestResult → lh_test
    //   HKCategoryTypeIdentifierCervicalMucusQuality → zervix
    //   HKQuantityTypeIdentifierBasalBodyTemperature → bbt (°C)
    //   HKCategoryTypeIdentifierIntermenstrualBleeding → Zwischenblutung (phase=luteal,blutung=1)
    let zk=0;
    const zyklusMap = {}; // date → partial entry data
    const ensureZyklus = (date) => {
      if (!zyklusMap[date]) zyklusMap[date] = {
        phase:null, blutung:0, bbt:null, lh_test:null,
        zervix:null, symptome:[], zyklusTag:null, note:'Apple Health', quelle:'apple_health',
      };
      return zyklusMap[date];
    };
    // Menstruationsfluss
    const hkFlowMap={1:0,2:1,3:2,4:3}; // HK value (1=unspec,2=leicht,3=mittel,4=stark) → blutung (0-4)
    doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierMenstrualFlow"]').forEach(r=>{
      try {
        const date=r.getAttribute('startDate')?.slice(0,10); if(!date) return;
        const val=parseInt(r.getAttribute('value')||'1');
        const z=ensureZyklus(date);
        z.blutung = hkFlowMap[val] ?? 1;
        z.phase   = 'menstruation';
      } catch(e){ errors.push('Zyklus Menstruation: '+e.message); }
    });
    // Ovulationstest
    doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierOvulationTestResult"]').forEach(r=>{
      try {
        const date=r.getAttribute('startDate')?.slice(0,10); if(!date) return;
        const val=r.getAttribute('value')||'';
        ensureZyklus(date).lh_test = val.includes('Positive')||val==='2' ? 'positiv' : 'negativ';
      } catch(e){ errors.push('Zyklus LH-Test: '+e.message); }
    });
    // Zervixschleim
    const hkZervixMap={'1':'Trocken','2':'Cremig','3':'Wässrig','4':'Spinnbar'};
    doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierCervicalMucusQuality"]').forEach(r=>{
      try {
        const date=r.getAttribute('startDate')?.slice(0,10); if(!date) return;
        const val=r.getAttribute('value')||'';
        ensureZyklus(date).zervix = hkZervixMap[val] || null;
      } catch(e){ errors.push('Zyklus Zervix: '+e.message); }
    });
    // Basaltemperatur
    doc.querySelectorAll('Record[type="HKQuantityTypeIdentifierBasalBodyTemperature"]').forEach(r=>{
      try {
        const date=r.getAttribute('startDate')?.slice(0,10); if(!date) return;
        const val=parseFloat(r.getAttribute('value'));
        if(!isNaN(val)) ensureZyklus(date).bbt = +val.toFixed(2);
      } catch(e){ errors.push('Zyklus BBT: '+e.message); }
    });
    // Zwischenblutungen
    doc.querySelectorAll('Record[type="HKCategoryTypeIdentifierIntermenstrualBleeding"]').forEach(r=>{
      try {
        const date=r.getAttribute('startDate')?.slice(0,10); if(!date) return;
        const z=ensureZyklus(date);
        if(!z.blutung) { z.blutung=1; z.phase='luteal'; }
      } catch(e){}
    });
    // Alle Zyklus-Tage als Einträge pushen
    Object.entries(zyklusMap).forEach(([date,data])=>{
      entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'zyklus',data});
      zk++;
    });

    return {source:'Apple Health',gw,sp,sl,sc,fat,zk};
  };

  // ── Google Fit JSON Parser ────────────────────────────────────────────────
  const parseGoogleFit = (zipFiles, entries, errors) => {
    let gw=0,sp=0,sl=0,sc=0;
    const tryParse = s => { try{return JSON.parse(s);}catch{return null;} };
    Object.entries(zipFiles).forEach(([name,content])=>{
      const ln = name.toLowerCase();
      // Gewicht / BMI
      if(ln.includes('body weight') || ln.includes('weight.json') || ln.includes('bmi.json')) {
        const d=tryParse(content); if(!d||!d.Data) return;
        d.Data.forEach(r=>{ try{
          const date=new Date(parseInt(r['Start time']||r.startTime)).toISOString().slice(0,10);
          const kg=parseFloat(r['Weight (kg)']||r.value||0);
          if(!isNaN(kg)&&kg>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'gewicht',data:{weight:+(kg.toFixed(1)),fat:null,bmi:calcBMI(kg,settings.height),note:'Google Fit'}});gw++;}
        }catch(e){errors.push('Google Gewicht: '+e.message);}});
      }
      // Schritte (daily activity)
      else if(ln.includes('daily activity') || ln.includes('step count')) {
        const d=tryParse(content); if(!d) return;
        (d.bucket||d.Data||[]).forEach(r=>{ try{
          const date=new Date(parseInt(r.startTimeMillis||r['Start time']||0)).toISOString().slice(0,10);
          let steps=0;
          (r.dataset||[]).forEach(ds=>(ds.point||[]).forEach(p=>(p.value||[]).forEach(v=>{steps+=v.intVal||0;})));
          if(!steps) steps=parseInt(r['Step count']||r.steps||0);
          if(date&&steps>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schritte',data:{steps,note:'Google Fit'}});sc++;}
        }catch(e){errors.push('Google Schritte: '+e.message);}});
      }
      // Aktivitäten / Workouts  
      else if(ln.includes('activity') && !ln.includes('daily')) {
        const d=tryParse(content); if(!d) return;
        (d.session||d.Data||[]).forEach(r=>{ try{
          const date=new Date(parseInt(r.startTimeMillis||r['Start time']||0)).toISOString().slice(0,10);
          const dur=Math.round((parseInt(r.endTimeMillis||r['End time']||0)-parseInt(r.startTimeMillis||r['Start time']||0))/60000);
          if(date&&dur>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'sport',data:{sportType:'Sonstiges',duration:dur,intensity:3,calories:null,note:'Google Fit'}});sp++;}
        }catch(e){errors.push('Google Sport: '+e.message);}});
      }
      // Schlaf
      else if(ln.includes('sleep')) {
        const d=tryParse(content); if(!d) return;
        (d.session||d.Data||[]).forEach(r=>{ try{
          const date=new Date(parseInt(r.startTimeMillis||r['Start time']||0)).toISOString().slice(0,10);
          const dur=(parseInt(r.endTimeMillis||r['End time']||0)-parseInt(r.startTimeMillis||r['Start time']||0))/3600000;
          if(date&&dur>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schlaf',data:{hours:+(dur.toFixed(1)),quality:3,note:'Google Fit'}});sl++;}
        }catch(e){errors.push('Google Schlaf: '+e.message);}});
      }
    });
    return {source:'Google Fit',gw,sp,sl,sc};
  };

  // ── Samsung Health CSV Parser ──────────────────────────────────────────────
  const parseSamsung = (zipFiles, entries, errors) => {
    let gw=0,sp=0,sl=0,sc=0;
    const parseCSV = (text) => {
      const lines = text.split('\n').filter(l=>l.trim()&&!l.startsWith('#'));
      if(lines.length<2) return [];
      const hdr = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
      return lines.slice(1).map(l=>{ const v=l.split(','); const o={}; hdr.forEach((h,i)=>o[h]=v[i]?.trim().replace(/"/g,'')||''); return o; });
    };
    Object.entries(zipFiles).forEach(([name,content])=>{
      const ln=name.toLowerCase();
      try {
        if(ln.includes('weight')){
          parseCSV(content).forEach(r=>{
            const date=(r.start_time||r.create_time||'').slice(0,10);
            const kg=parseFloat(r.weight||0);
            if(date&&kg>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'gewicht',data:{weight:+(kg.toFixed(1)),fat:r.body_fat?+parseFloat(r.body_fat).toFixed(1):null,bmi:calcBMI(kg,settings.height),note:'Samsung Health'}});gw++;}
          });
        } else if(ln.includes('exercise')||ln.includes('activity')){
          parseCSV(content).forEach(r=>{
            const date=(r.start_time||'').slice(0,10);
            const dur=Math.round(parseFloat(r.duration||0)/60000)||parseInt(r.active_time||0);
            if(date&&dur>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'sport',data:{sportType:'Sonstiges',duration:dur,intensity:3,calories:r.calorie?Math.round(parseFloat(r.calorie)):null,note:'Samsung Health'}});sp++;}
          });
        } else if(ln.includes('sleep')){
          parseCSV(content).forEach(r=>{
            const date=(r.start_time||'').slice(0,10);
            const dur=(parseFloat(r.total_sleep_time||r.duration||0)/3600000)||parseFloat(r.sleep_duration||0)/60;
            if(date&&dur>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schlaf',data:{hours:+(dur.toFixed(1)),quality:3,note:'Samsung Health'}});sl++;}
          });
        } else if(ln.includes('step')){
          parseCSV(content).forEach(r=>{
            const date=(r.day_time||r.start_time||'').slice(0,10);
            const steps=parseInt(r.count||r.step_count||0);
            if(date&&steps>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schritte',data:{steps,note:'Samsung Health'}});sc++;}
          });
        }
      } catch(e){errors.push('Samsung '+name+': '+e.message);}
    });
    return {source:'Samsung Health',gw,sp,sl,sc};
  };

  // ── Fitbit JSON Parser ────────────────────────────────────────────────────
  const parseFitbit = (zipFiles, rawText, entries, errors) => {
    let gw=0,sp=0,sl=0,sc=0;
    const tryParse=s=>{try{return JSON.parse(s);}catch{return null;}};
    const allFiles = zipFiles ? Object.entries(zipFiles) : [['_raw',rawText||'']];
    allFiles.forEach(([name,content])=>{
      const ln=name.toLowerCase();
      try{
        // Gewicht
        if(ln.includes('weight')){
          const d=tryParse(content); if(!Array.isArray(d)) return;
          d.forEach(r=>{
            const date=(r.date||r.logId||'').toString().slice(0,10);
            const kg=parseFloat(r.weight||0);
            if(date.match(/\d{4}-\d{2}-\d{2}/)&&kg>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'gewicht',data:{weight:+(kg.toFixed(1)),fat:r.fat?+parseFloat(r.fat).toFixed(1):null,bmi:calcBMI(kg,settings.height),note:'Fitbit'}});gw++;}
          });
        }
        // Schlaf
        else if(ln.includes('sleep')){
          const d=tryParse(content); if(!d) return;
          (Array.isArray(d)?d:(d.sleep||[])).forEach(r=>{
            const date=(r.dateOfSleep||r.startTime||'').slice(0,10);
            const dur=parseFloat(r.minutesAsleep||0)/60||parseFloat(r.duration||0)/3600000;
            if(date&&dur>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schlaf',data:{hours:+(dur.toFixed(1)),quality:3,note:'Fitbit'}});sl++;}
          });
        }
        // Aktivitäten
        else if(ln.includes('exercise')||ln.includes('activities-exercise')){
          const d=tryParse(content); if(!Array.isArray(d)) return;
          d.forEach(r=>{
            const date=(r.startTime||r.originalStartTime||'').slice(0,10);
            const dur=parseInt(r.activeDuration||r.duration||0)/60000||parseInt(r.activeDuration||0);
            if(date&&dur>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'sport',data:{sportType:r.activityName||'Sonstiges',duration:Math.round(dur),intensity:3,calories:r.calories?parseInt(r.calories):null,note:'Fitbit'}});sp++;}
          });
        }
        // Schritte
        else if(ln.includes('steps')||(ln.includes('activities-')&&ln.includes('steps'))){
          const d=tryParse(content); if(!Array.isArray(d)) return;
          d.forEach(r=>{
            const date=(r.dateTime||r.date||'').slice(0,10);
            const steps=parseInt(r.value||r.steps||0);
            if(date&&steps>0){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schritte',data:{steps,note:'Fitbit'}});sc++;}
          });
        }
      }catch(e){errors.push('Fitbit '+name+': '+e.message);}
    });
    return {source:'Fitbit',gw,sp,sl,sc};
  };

  // ── Flo Health CSV Parser ─────────────────────────────────────────────────
  // Flo Export: Einstellungen → Daten verwalten → Daten exportieren → CSV
  // Spalten: Date, Menstruation, Cramps_intensity, Mood, Headache, Water_retention, ...
  // ─────────────────────────────────────────────────────────────────────────
  // Adapter-Mapping: Flo CSV → HealthLog ZyklusEntry
  // ─────────────────────────────────────────────────────────────────────────
  const parseFlo = (rawText, entries, errors) => {
    let zk=0;
    const csvParse = (text) => {
      const lines=text.split('\n').filter(l=>l.trim());
      if(lines.length<2) return [];
      // Flo nutzt Semicolon oder Komma als Trennzeichen
      const sep=lines[0].includes(';')?';':',';
      const hdr=lines[0].split(sep).map(h=>h.trim().replace(/"/g,'').toLowerCase().replace(/\s+/g,'_'));
      return lines.slice(1).map(l=>{ const v=l.split(sep);const o={};hdr.forEach((h,i)=>o[h]=(v[i]||'').trim().replace(/"/g,''));return o; });
    };

    // Flo Menstruation-Werte → blutung-Index
    const floBlutungMap={'no_bleeding':0,'light':1,'medium':2,'heavy':3,'spotting':1,'very_heavy':4};
    // Flo Phase-Werte → phase
    const floPhaseMap={
      'menstruation':'menstruation','period':'menstruation',
      'follicular':'follikulaer','ovulation':'ovulation',
      'luteal':'luteal','pms':'luteal',
    };

    const rows=csvParse(rawText);
    rows.forEach(row=>{
      try{
        // Datum-Spalten: "date", "day", "start_date"
        const rawDate=row.date||row.day||row.start_date||'';
        const date=rawDate.slice(0,10);
        if(!date.match(/^\d{4}-\d{2}-\d{2}$/)) return;

        const blutungRaw=(row.menstruation||row.bleeding||row.period||'').toLowerCase().trim();
        const phaseRaw  =(row.phase||row.cycle_phase||'').toLowerCase().trim();

        const blutung = floBlutungMap[blutungRaw] ?? 0;
        const phase   = floPhaseMap[phaseRaw]     || (blutung>0?'menstruation':null);

        // Symptome extrahieren
        const symptome=[];
        if(row.cramps_intensity&&row.cramps_intensity!=='0'&&row.cramps_intensity.toLowerCase()!=='none') symptome.push('Krämpfe');
        if(row.headache&&row.headache.toLowerCase()!=='no')    symptome.push('Kopfschmerzen');
        if(row.backache&&row.backache.toLowerCase()!=='no')    symptome.push('Rückenschmerzen');
        if(row.nausea&&row.nausea.toLowerCase()!=='no')        symptome.push('Übelkeit');
        if(row.fatigue&&row.fatigue.toLowerCase()!=='no')      symptome.push('Müdigkeit');
        if(row.bloating&&row.bloating.toLowerCase()!=='no')    symptome.push('Blähungen');
        if(row.breast_tenderness&&row.breast_tenderness.toLowerCase()!=='no') symptome.push('Brustschmerzen');
        if(row.acne&&row.acne.toLowerCase()!=='no')            symptome.push('Akne');
        if(row.mood_swings&&row.mood_swings.toLowerCase()!=='no') symptome.push('Stimmungsschwankungen');
        if(row.cravings&&row.cravings.toLowerCase()!=='no')    symptome.push('Heißhunger');

        // Basaltemperatur
        const bbtRaw=parseFloat(row.bbt||row.basal_temperature||row.temperature||'');
        const bbt=!isNaN(bbtRaw)&&bbtRaw>30?+bbtRaw.toFixed(2):null;

        // LH-Test
        const lhRaw=(row.ovulation_test||row.lh_test||'').toLowerCase();
        const lh_test=lhRaw.includes('posit')?'positiv':lhRaw.includes('negat')?'negativ':null;

        // Nur speichern wenn irgendwas vorhanden
        if(!blutung&&!phase&&!bbt&&!lh_test&&!symptome.length) return;

        entries.push({
          id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'zyklus',
          data:{phase,blutung,bbt,lh_test,zervix:null,symptome,zyklusTag:null,
            note:'Flo Import',quelle:'flo'},
        });
        zk++;
      }catch(e){errors.push('Flo Zeile: '+e.message);}
    });
    return {source:'Flo Health',zk};
  };

  // ── Clue CSV Parser ───────────────────────────────────────────────────────
  // Clue Export: Konto → Daten exportieren → CSV (pro Kategorie eine Datei)
  // Typische Clue-Spalten: Date, Bleeding, Pain (Cramps), Mood, Energy, Sleep, ...
  // ─────────────────────────────────────────────────────────────────────────
  // Adapter-Mapping: Clue CSV → HealthLog ZyklusEntry
  // ─────────────────────────────────────────────────────────────────────────
  const parseClue = (rawText, entries, errors) => {
    let zk=0;
    const sep=rawText.includes(';')?';':',';
    const lines=rawText.split('\n').filter(l=>l.trim());
    if(lines.length<2) return {source:'Clue',zk:0};
    const hdr=lines[0].split(sep).map(h=>h.trim().replace(/"/g,'').toLowerCase().replace(/\s+/g,'_'));

    // Clue Blutungs-Mapping (value: light/medium/heavy/spotting)
    const clueBlutung={'light':1,'spotting':1,'medium':2,'heavy':3,'very_heavy':4};
    // Clue Phase-Mapping
    const cluePhase={'menstruation':'menstruation','fertile_window':'follikulaer',
      'ovulation':'ovulation','luteal':'luteal','pms':'luteal','period':'menstruation'};

    lines.slice(1).forEach(line=>{
      try{
        const v=line.split(sep);
        const row={};hdr.forEach((h,i)=>row[h]=(v[i]||'').trim().replace(/"/g,''));

        const date=(row.date||row.day||'').slice(0,10);
        if(!date.match(/^\d{4}-\d{2}-\d{2}$/)) return;

        const blutungRaw=(row.bleeding||row.period||row.menstruation||'').toLowerCase().trim();
        const blutung=clueBlutung[blutungRaw]??0;
        const phaseRaw=(row.phase||row.cycle_phase||row.fertile||'').toLowerCase().trim();
        const phase=cluePhase[phaseRaw]||(blutung>0?'menstruation':null);

        // Symptome
        const symptome=[];
        const pain=row.pain||row.cramps||'';
        if(pain&&pain.toLowerCase()!=='none'&&pain!=='0') symptome.push('Krämpfe');
        if(row.headache&&row.headache.toLowerCase()!=='none') symptome.push('Kopfschmerzen');
        if(row.backache&&row.backache.toLowerCase()!=='none') symptome.push('Rückenschmerzen');
        if(row.nausea&&row.nausea.toLowerCase()!=='none')     symptome.push('Übelkeit');
        if(row.fatigue&&row.fatigue.toLowerCase()!=='none')   symptome.push('Müdigkeit');
        if(row.bloating&&row.bloating.toLowerCase()!=='none') symptome.push('Blähungen');
        if(row.tender_breasts&&row.tender_breasts.toLowerCase()!=='none') symptome.push('Brustschmerzen');

        // BBT
        const bbtRaw=parseFloat(row.temperature||row.bbt||'');
        const bbt=!isNaN(bbtRaw)&&bbtRaw>30?+bbtRaw.toFixed(2):null;
        // LH
        const lhRaw=(row.ovulation_test||row.lh||'').toLowerCase();
        const lh_test=lhRaw.includes('pos')?'positiv':lhRaw.includes('neg')?'negativ':null;
        // Zervix
        const zervixRaw=(row.fluid||row.cervical_mucus||'').toLowerCase();
        const zervixMap={'dry':'Trocken','creamy':'Cremig','watery':'Wässrig','egg_white':'Spinnbar','stretchy':'Spinnbar'};
        const zervix=zervixMap[zervixRaw]||null;

        if(!blutung&&!phase&&!bbt&&!lh_test&&!zervix&&!symptome.length) return;

        entries.push({
          id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'zyklus',
          data:{phase,blutung,bbt,lh_test,zervix,symptome,zyklusTag:null,
            note:'Clue Import',quelle:'clue'},
        });
        zk++;
      }catch(e){errors.push('Clue Zeile: '+e.message);}
    });
    return {source:'Clue',zk};
  };

  // ── MyFitnessPal CSV Parser ───────────────────────────────────────────────
  const parseMFP = (rawText, entries, errors) => {
    let food=0;
    const lines = rawText.split('\n').filter(l=>l.trim());
    const hdr = lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
    lines.slice(1).forEach(line=>{
      try {
        const v=line.split(',');
        const row={}; hdr.forEach((h,i)=>row[h]=(v[i]||'').trim().replace(/"/g,''));
        const date=(row.date||'').slice(0,10);
        const kcal=parseFloat(row.calories||row.energy||0);
        const water=parseFloat(row.water||0);
        if(!date.match(/\d{4}-\d{2}-\d{2}/)) return;
        if(kcal>0||water>0){
          entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'ernaehrung',
            data:{water:Math.round(water),mealQ:3,calories:kcal>0?Math.round(kcal):null,
              note:(row.meal_name||row.meal||row['food name']||'MyFitnessPal').slice(0,50),
              productName:row['food name']||'MyFitnessPal Import',brand:'',quantity:parseFloat(row.quantity||100)||100,unit:'g',
              per100:{kcal:kcal,protein:parseFloat(row.protein||0),carbs:parseFloat(row.carbohydrates||row.carbs||0),fat:parseFloat(row.fat||0),sugar:parseFloat(row.sugar||0),fiber:parseFloat(row.fiber||0)}}});
          food++;
        }
      }catch(e){errors.push('MFP Zeile: '+e.message);}
    });
    return {source:'MyFitnessPal',food};
  };

  // ── Generic CSV (Schritte / Gewicht) ──────────────────────────────────────
  const parseGenericCSV = (rawText, entries, errors) => {
    let count=0;
    const lines=rawText.split('\n').filter(l=>l.trim());
    const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,'').toLowerCase());
    const hasDate=hdr.some(h=>h.includes('date'));
    if(!hasDate){errors.push('CSV: Keine Datumsspalte gefunden'); return {source:'CSV',count:0};}
    lines.slice(1).forEach(l=>{
      try{
        const v=l.split(',');const row={};hdr.forEach((h,i)=>row[h]=(v[i]||'').trim().replace(/"/g,''));
        const date=(row.date||row.datum||'').slice(0,10);
        if(!date.match(/\d{4}-\d{2}-\d{2}/)) return;
        if(row.steps||row.schritte){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'schritte',data:{steps:parseInt(row.steps||row.schritte||0),note:'CSV Import'}});count++;}
        else if(row.weight||row.gewicht||row.kg){entries.push({id:uid(),date,ts:new Date(date+'T12:00:00').getTime(),type:'gewicht',data:{weight:+parseFloat(row.weight||row.gewicht||row.kg||0).toFixed(1),fat:null,bmi:null,note:'CSV Import'}});count++;}
      }catch(e){errors.push('CSV: '+e.message);}
    });
    return {source:'CSV',count};
  };

  // ── HealthLog JSON Backup Parser ──────────────────────────────────────────
  const parseHealthLogJSON = (rawText, entries, errors) => {
    try{
      const j=JSON.parse(rawText);
      const imported=(j.entries||[]).filter(e=>e.id&&e.date&&e.type&&e.data);
      imported.forEach(e=>entries.push({...e,id:uid(),note:(e.data?.note||'')+' (importiert)'}));
      return {source:'HealthLog Backup',count:imported.length};
    }catch(e){errors.push('JSON: '+e.message);return {source:'HealthLog Backup',count:0};}
  };

  // ── Haupt-Parser ──────────────────────────────────────────────────────────
  const readFile = async e => {
    const file = e.target.files[0];
    if (!file) return;
    setState('loading'); setParsed(null); setErr('');
    e.target.value='';
    const entries=[]; const errors=[];
    try {
      let format='unknown', stats={}, zipFiles=null, rawText=null;
      if(file.name.toLowerCase().endsWith('.zip')){
        if(typeof JSZip==='undefined') throw new Error('ZIP-Unterstützung lädt — kurz warten');
        const zip = await JSZip.loadAsync(file);
        zipFiles={};
        for(const [name,entry] of Object.entries(zip.files)){
          if(!entry.dir) {
            try{zipFiles[name]=await entry.async('string');}
            catch{errors.push('Konnte nicht lesen: '+name);}
          }
        }
        format = appTab==='auto' ? detectFormat(zipFiles,null) : appTab;
      } else {
        rawText = await file.text();
        format = appTab==='auto' ? detectFormat(null,rawText) : appTab;
      }

      if(format==='apple'||format==='apple_xml'){
        const xmlStr = zipFiles
          ? Object.entries(zipFiles).find(([n])=>n.toLowerCase().includes('export.xml')&&!n.includes('cda'))?.[1]
          : rawText;
        if(!xmlStr) throw new Error('export.xml nicht gefunden');
        const doc=new DOMParser().parseFromString(xmlStr,'text/xml');
        if(doc.querySelector('parsererror')) throw new Error('XML konnte nicht gelesen werden');
        stats=parseApple(doc,entries,errors);
      } else if(format==='google'){
        stats=parseGoogleFit(zipFiles||{},entries,errors);
      } else if(format==='samsung'){
        stats=parseSamsung(zipFiles||{},entries,errors);
      } else if(format==='fitbit'){
        stats=parseFitbit(zipFiles,rawText,entries,errors);
      } else if(format==='mfp'){
        stats=parseMFP(rawText||'',entries,errors);
      } else if(format==='flo'){
        stats=parseFlo(rawText||'',entries,errors);
      } else if(format==='clue'){
        stats=parseClue(rawText||'',entries,errors);
      } else if(format==='healthlog'||format==='json'){
        stats=parseHealthLogJSON(rawText||'',entries,errors);
      } else if(format==='csv-steps'||format==='csv'){
        stats=parseGenericCSV(rawText||'',entries,errors);
      } else {
        // Blindes Parsen — alle bekannten Formate probieren
        errors.push('Format nicht erkannt — versuche automatische Erkennung…');
        if(zipFiles){
          // Apple?
          const xmlEntry=Object.entries(zipFiles).find(([n])=>n.toLowerCase().includes('export.xml')&&!n.includes('cda'));
          if(xmlEntry){
            const doc=new DOMParser().parseFromString(xmlEntry[1],'text/xml');
            if(!doc.querySelector('parsererror')){stats=parseApple(doc,entries,errors);}
          }
          if(!entries.length) stats=parseSamsung(zipFiles,entries,errors);
          if(!entries.length) stats=parseGoogleFit(zipFiles,entries,errors);
          if(!entries.length) stats=parseFitbit(zipFiles,null,entries,errors);
        } else if(rawText){
          if(rawText.includes('<HealthData')){
            const doc=new DOMParser().parseFromString(rawText,'text/xml');
            if(!doc.querySelector('parsererror')) stats=parseApple(doc,entries,errors);
          } else if(rawText.trim().startsWith('[')&&rawText.includes('weight')){
            stats=parseFitbit(null,rawText,entries,errors);
          } else if(rawText.includes('{')&&rawText.includes('entries')){
            stats=parseHealthLogJSON(rawText,entries,errors);
          } else if(rawText.includes(',')&&rawText.split('\n')[0].includes('ate')){
            stats=parseGenericCSV(rawText,entries,errors);
          }
        }
      }

      if(entries.length===0&&errors.length===0)
        throw new Error('Keine importierbaren Daten gefunden');

      const dates=entries.length?entries.map(e=>e.date).sort():['—','—'];
      setParsed({entries,stats,errors,from:dates[0],to:dates[dates.length-1]});
      setState('preview');
    } catch(err){
      setErr(err.message||'Unbekannter Fehler');
      setState('error');
    }
  };

  const confirm = () => { onImport(parsed.entries); setState('done'); };
  const reset   = () => { setState('idle'); setParsed(null); setErr(''); };

  const APPS=[
    {id:'auto',     l:'Automatisch'},
    {id:'apple',    l:'Apple Health'},
    {id:'google',   l:'Google Fit'},
    {id:'samsung',  l:'Samsung Health'},
    {id:'fitbit',   l:'Fitbit'},
    {id:'mfp',      l:'MyFitnessPal'},
    {id:'json',     l:'HealthLog JSON'},
    {id:'csv',      l:'Eigene CSV'},
    {id:'flo',      l:'Flo'},
    {id:'clue',     l:'Clue'},
  ];

  const HINTS={
    auto:'Format wird automatisch erkannt',
    apple:'Health App → Profil-Bild → Alle Gesundheitsdaten exportieren → ZIP auswählen',
    google:'Google Takeout → Fit → ZIP auswählen',
    samsung:'Samsung Health App → Profil → Daten herunterladen → ZIP auswählen',
    fitbit:'Fitbit → Einstellungen → Daten exportieren → ZIP oder einzelne JSON',
    mfp:'MyFitnessPal → Daten exportieren → diary.csv auswählen',
    json:'HealthLog → Daten → JSON Backup → Datei auswählen',
    csv:'CSV mit Spalten: date,steps oder date,weight',
    flo:'Flo → Profil → Kontoeinstellungen → Daten exportieren → CSV auswählen',
    clue:'Clue → Einstellungen → Daten exportieren → CSV-Datei auswählen',
  };

  const ACCEPT={auto:'.zip,.xml,.json,.csv',apple:'.zip,.xml',google:'.zip,.json',
    samsung:'.zip',fitbit:'.zip,.json',mfp:'.csv',json:'.json',csv:'.csv',
    flo:'.csv',clue:'.csv'};

  return (
    <div style={ST.card}>
      <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>Health-Daten importieren</div>

      {/* App-Auswahl */}
      <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
        {APPS.map(a=>(
          <button key={a.id} onClick={()=>setApp(a.id)}
            style={{padding:'5px 11px',borderRadius:6,fontSize:11,fontWeight:appTab===a.id?600:400,
              border:`1px solid ${appTab===a.id?C.accent:C.border}`,
              background:appTab===a.id?`${C.accent}18`:'transparent',
              color:appTab===a.id?C.accent:C.muted}}>
            {a.l}
          </button>
        ))}
      </div>

      {state==='idle'&&<>
        <div style={{fontSize:12,color:C.muted,marginBottom:14,padding:'8px 12px',
          background:`${C.border}44`,borderRadius:8,lineHeight:1.7}}>
          {HINTS[appTab]}
        </div>
        <label style={{...ST.btn(C.accent),display:'block',textAlign:'center',cursor:'pointer'}}>
          Datei auswählen
          <input type="file" accept={ACCEPT[appTab]||'.zip,.xml,.json,.csv'} onChange={readFile} style={{display:'none'}}/>
        </label>
      </>}

      {state==='loading'&&(
        <div style={{textAlign:'center',padding:'20px 0',color:C.muted,fontSize:13}}>Wird verarbeitet…</div>
      )}

      {state==='preview'&&parsed&&<>
        <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:C.accent}}>
          {parsed.stats?.source||'Import'} — {parsed.entries.length.toLocaleString('de-DE')} Einträge
        </div>
        <div style={{fontSize:12,color:C.muted,marginBottom:10}}>
          Zeitraum: {fmtD(parsed.from)} — {fmtD(parsed.to)}
        </div>
        {/* Statistik */}
        <div style={{marginBottom:10}}>
          {[['Gewicht',parsed.stats?.gw,C.accent],['Sport',parsed.stats?.sp,C.sport],
            ['Schlaf',parsed.stats?.sl,C.sleep],['Schritte',parsed.stats?.sc,C.steps],
            ['Ernährung',parsed.stats?.food,C.water],['Sonstige',parsed.stats?.count,C.muted]
          ].filter(([,v])=>v>0).map(([l,v,c])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${C.border}44`,fontSize:12}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:3,height:10,background:c,borderRadius:1}}/><span style={{color:C.muted}}>{l}</span></div>
              <span style={{color:c,fontWeight:600}}>{v?.toLocaleString('de-DE')}</span>
            </div>
          ))}
        </div>
        {/* Warnungen / Fehler */}
        {parsed.errors.length>0&&(
          <div style={{marginBottom:12,padding:'8px 12px',background:`${C.danger}14`,borderRadius:8}}>
            <div style={{fontSize:11,fontWeight:600,color:C.danger,marginBottom:6}}>
              {parsed.entries.length>0?'Teilweise nicht importierbar:':'Fehler beim Import:'}
            </div>
            {parsed.errors.slice(0,5).map((e,i)=>(
              <div key={i} style={{fontSize:11,color:C.danger,lineHeight:1.6}}>• {e}</div>
            ))}
            {parsed.errors.length>5&&<div style={{fontSize:11,color:C.muted}}>…und {parsed.errors.length-5} weitere</div>}
          </div>
        )}
        {parsed.entries.length>0&&<>
          <button style={{...ST.btn(C.accent),marginBottom:8}} onClick={confirm}>Importieren</button>
          <button style={ST.outbtn(C.muted)} onClick={reset}>Abbrechen</button>
        </>}
        {parsed.entries.length===0&&<button style={ST.outbtn(C.muted)} onClick={reset}>Zurück</button>}
      </>}

      {state==='done'&&<>
        <div style={{fontSize:12,color:C.success,marginBottom:14,padding:'10px 14px',background:`${C.success}14`,borderRadius:8}}>
          Import abgeschlossen.
        </div>
        <button style={ST.outbtn(C.muted)} onClick={reset}>Weiteren Import</button>
      </>}

      {state==='error'&&<>
        <div style={{fontSize:12,color:C.danger,marginBottom:14,padding:'10px 14px',background:`${C.danger}14`,borderRadius:8,lineHeight:1.6}}>
          <b>Fehler:</b> {errMsg}
        </div>
        <button style={ST.outbtn(C.muted)} onClick={reset}>Nochmal</button>
      </>}
    </div>
  );
}


// ── Kalorienziel-Rechner (Mifflin-St Jeor) ───────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
// MAKRONÄHRSTOFF-RECHNER
//
// Berechnungslogik — alle Quellen: DGE, WHO, ISSN Position Stand 2017
//
// Pipeline: kcal → Protein → Fett → Kohlenhydrate (Restkalorien) → Ballaststoffe
//
// 1. PROTEIN (höchste Priorität — Muskelmasse & Sättigung)
//    Quelle: ISSN Position Stand 2017, Morton et al. 2018
//    • Defizit  (goal < -200 kcal): 2.2 g/kg  — Muskelerhalt im Kaloriendefizit
//    • Surplus  (goal > 0 kcal):    2.0 g/kg  — Muskelaufbau
//    • Maintenance:                 1.8 g/kg  — allgemeines Wohlbefinden
//    Energiewert: 4 kcal/g
//
// 2. FETT (zweite Priorität — Hormonsystem & fettlösliche Vitamine)
//    Quelle: DGE 2019, EFSA
//    • Minimum:  0.8 g/kg Körpergewicht (Hormonproduktion)
//    • Optimum:  27% der Gesamtkalorien (Mitte des DGE-Zielbereichs 25-30%)
//    • Ergebnis: max(minimum_by_weight, target_by_pct)
//    Energiewert: 9 kcal/g
//
// 3. KOHLENHYDRATE (Restkalorien nach Protein + Fett)
//    Quelle: DGE — kein absolutes Minimum (außer Gehirnfunktion ~130g/Tag)
//    • Restkalorien / 4 kcal/g
//    • Mindest-Floor: 100g/Tag (Gehirnfunktion, Sportleistung)
//    • Wenn Budget zu knapp: Fett wird leicht reduziert, nie Protein
//    Energiewert: 4 kcal/g
//
// 4. BALLASTSTOFFE (separat — zählen als Teil der Kohlenhydrate)
//    Quelle: DGE: mind. 30g/Tag; WHO: 14g/1000 kcal
//    • fiber = max(30g, round(kcal/1000 × 14))
//
// WASSER (Bonus-Berechnung)
//    Quelle: DGE: 35ml/kg/Tag als Grundregel
//    • water_ml = weight × 35 (adjustiert für Aktivitätsniveau)
// ══════════════════════════════════════════════════════════════════════════════

function berechneMakros(kcal, weight, goalDelta) {
  if (!kcal || !weight || kcal < 1 || weight < 1) return null;

  // ── 1. Protein ────────────────────────────────────────────────────────────
  const pFaktor  = goalDelta < -200 ? 2.2 : goalDelta > 0 ? 2.0 : 1.8;
  const protein  = Math.round(weight * pFaktor);
  const pKcal    = protein * 4;

  // ── 2. Fett ───────────────────────────────────────────────────────────────
  const fatMin   = Math.round(weight * 0.8);               // Minimum nach Gewicht
  const fatOpt   = Math.round((kcal * 0.27) / 9);          // 27% der Gesamtkalorien
  let   fat      = Math.max(fatMin, fatOpt);
  let   fKcal    = fat * 9;

  // ── 3. Kohlenhydrate ──────────────────────────────────────────────────────
  let restKcal = kcal - pKcal - fKcal;
  // Wenn Budget zu knapp → Fett auf Minimum reduzieren
  if (restKcal < fatMin * 4) {                              // weniger als Mindest-Carb-Budget
    fat    = fatMin;
    fKcal  = fat * 9;
    restKcal = kcal - pKcal - fKcal;
  }
  const carbs = Math.max(100, Math.round(restKcal / 4));    // mind. 100g/Tag

  // ── 4. Ballaststoffe ──────────────────────────────────────────────────────
  const fiber = Math.max(30, Math.round(kcal / 1000 * 14));

  // ── 5. Wasser (Bonus) ─────────────────────────────────────────────────────
  const water = Math.round(weight * 35 / 100) * 100;        // auf 100ml gerundet

  return { protein, carbs, fat, fiber, water };
}

// Makro-Verteilung in % der Kalorien berechnen
function makroVerteilung(macros) {
  const total = macros.protein * 4 + macros.carbs * 4 + macros.fat * 9;
  if (!total) return { p:0, c:0, f:0 };
  return {
    p: Math.round(macros.protein * 4 / total * 100),
    c: Math.round(macros.carbs   * 4 / total * 100),
    f: Math.round(macros.fat     * 9 / total * 100),
  };
}

function KalorienRechner({ settings, onSave, lastWeight, onUpdateSettings }) {
  // Daten aus Einstellungen & Einträgen vorausfüllen
  const [step, setStep] = useState(0);
  const [sex,  setSex]  = useState(settings.sex||'m');
  const [age,  setAge]  = useState(settings.alter ? String(settings.alter) : '');
  const [kg,   setKg]   = useState(lastWeight ? String(Math.round(lastWeight)) : '');
  const [cm,   setCm]   = useState(String(settings.height||175));
  const [act,  setAct]  = useState(settings.lastAct||1.55);
  const [goal, setGoal] = useState(settings.lastGoal??0);

  // ── Makro-Override-State ──────────────────────────────────────────────────
  // null = auto-berechnet, number = manuell überschrieben
  const [mo, setMO] = useState({protein:null, carbs:null, fat:null, fiber:null});
  const [editMacro, setEM] = useState(null);  // welches Makro wird gerade editiert
  const [editVal,   setEV] = useState('');

  const ACT_LEVELS = [
    { val:1.2,   label:'Kaum aktiv',    sub:'Bürojob, kein Sport' },
    { val:1.375, label:'Leicht aktiv',  sub:'1–3× Sport / Woche' },
    { val:1.55,  label:'Mäßig aktiv',   sub:'3–5× Sport / Woche' },
    { val:1.725, label:'Sehr aktiv',    sub:'6–7× Sport / Woche' },
    { val:1.9,   label:'Extrem aktiv',  sub:'Leistungssport / Schwerstarbeit' },
  ];
  const GOALS = [
    { val:-700, label:'Stark abnehmen',   sub:'~700 kcal Defizit / Tag' },
    { val:-400, label:'Moderat abnehmen', sub:'~400 kcal Defizit / Tag' },
    { val:0,    label:'Gewicht halten',   sub:'Kalorienbedarf exakt' },
    { val:250,  label:'Muskeln aufbauen', sub:'~250 kcal Überschuss / Tag' },
  ];

  const calc = () => {
    const w=+kg, h=+cm, a=+age;
    if(!w||!h||!a) return null;
    const bmr = sex==='m' ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161;
    return Math.round(bmr * act + goal);
  };

  const goTo = (s) => setStep(s); // Kein onUpdateSettings hier! Würde App re-rendern → State-Reset

  const STEP_LABELS = ['Körper', 'Aktivität', 'Ziel', 'Ergebnis'];
  const result = step===3 ? calc() : null;

  // Quell-Hinweis für vorausgefüllte Felder
  const Hint = ({text}) => (
    <div style={{fontSize:10,color:C.success,marginTop:-10,marginBottom:10,display:'flex',alignItems:'center',gap:4}}>
      <span>✓</span><span>{text}</span>
    </div>
  );

  return (
    <div>
      {/* Klickbare Schritt-Tabs — alle direkt anwählbar */}
      <div style={{display:'flex',gap:4,marginBottom:16}}>
        {STEP_LABELS.map((l,i)=>(
          <button key={i}
            onClick={()=>setStep(i)}
            style={{flex:1,textAlign:'center',padding:'5px 0',
              fontSize:10,borderRadius:4,letterSpacing:0.4,
              cursor:'pointer',border:'none',
              background:i===step?`${C.accent}20`:i<step?`${C.success}14`:'transparent',
              color:i===step?C.accent:i<step?C.success:C.faint,
              outline:`1px solid ${i===step?C.accent:i<step?C.success:C.border}`}}>
            {i<step?'✓ ':''}{l}
          </button>
        ))}
      </div>

      {/* ── Schritt 0: Körperdaten ── */}
      {step===0&&<>
        <label style={ST.lbl}>Geschlecht</label>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          {[['m','Männlich'],['f','Weiblich']].map(([v,l])=>(
            <button key={v} onClick={()=>setSex(v)}
              style={{flex:1,padding:'10px',borderRadius:8,fontSize:13,
                fontWeight:sex===v?600:400,cursor:'pointer',
                border:`1px solid ${sex===v?C.accent:C.border}`,
                background:sex===v?`${C.accent}18`:'transparent',
                color:sex===v?C.accent:C.muted}}>{l}</button>
          ))}
        </div>

        <label style={ST.lbl}>Alter (Jahre)</label>
        <input style={ST.inp} type="number" inputMode="numeric" placeholder="25"
          value={age} onChange={e=>setAge(e.target.value)}/>

        <label style={ST.lbl}>Gewicht (kg)</label>
        <input style={ST.inp} type="number" step="0.1" inputMode="decimal" placeholder="75"
          value={kg} onChange={e=>setKg(e.target.value)}/>
        {lastWeight&&<Hint text={`Aus letztem Eintrag: ${Math.round(lastWeight)} kg`}/>}

        <label style={ST.lbl}>Körpergröße (cm)</label>
        <input style={ST.inp} type="number" inputMode="numeric" placeholder="175"
          value={cm} onChange={e=>setCm(e.target.value)}/>
        {settings.height&&<Hint text={`Aus Einstellungen: ${settings.height} cm`}/>}
      </>}

      {/* ── Schritt 1: Aktivitätslevel ── */}
      {step===1&&<>
        <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6}}>
          Wie aktiv bist du im Alltag — Sport und Beruf zusammen?
        </div>
        {ACT_LEVELS.map(a=>(
          <button key={a.val} onClick={()=>setAct(a.val)}
            style={{width:'100%',textAlign:'left',padding:'12px 14px',marginBottom:6,
              borderRadius:10,cursor:'pointer',display:'block',
              border:`1px solid ${act===a.val?C.accent:C.border}`,
              background:act===a.val?`${C.accent}14`:'transparent'}}>
            <div style={{fontSize:13,fontWeight:act===a.val?600:400,
              color:act===a.val?C.accent:C.text}}>{a.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{a.sub}</div>
          </button>
        ))}
      </>}

      {/* ── Schritt 2: Ziel ── */}
      {step===2&&<>
        <div style={{fontSize:12,color:C.muted,marginBottom:12,lineHeight:1.6}}>
          Was ist dein aktuelles Ziel?
        </div>
        {GOALS.map(g=>(
          <button key={g.val} onClick={()=>setGoal(g.val)}
            style={{width:'100%',textAlign:'left',padding:'12px 14px',marginBottom:6,
              borderRadius:10,cursor:'pointer',display:'block',
              border:`1px solid ${goal===g.val?C.accent:C.border}`,
              background:goal===g.val?`${C.accent}14`:'transparent'}}>
            <div style={{fontSize:13,fontWeight:goal===g.val?600:400,
              color:goal===g.val?C.accent:C.text}}>{g.label}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{g.sub}</div>
          </button>
        ))}
      </>}

      {/* ── Schritt 3: Ergebnis + Makros ── */}
      {step===3&&<>
        {result ? (()=>{
          // ── Makros berechnen ──────────────────────────────────────────────
          const computed = berechneMakros(result, +kg, goal);
          // Finale Werte: Override hat Vorrang, sonst berechneter Wert
          const final = computed ? {
            protein: mo.protein ?? computed.protein,
            carbs:   mo.carbs   ?? computed.carbs,
            fat:     mo.fat     ?? computed.fat,
            fiber:   mo.fiber   ?? computed.fiber,
            water:   computed.water,
          } : null;

          const vert = final ? makroVerteilung(final) : null;

          // ── Makro-Karte ───────────────────────────────────────────────────
          const MACRO_DEF = [
            { key:'protein', label:'Eiweiß',        unit:'g',  color:C.sport,   hint:`${(+kg*1.8).toFixed(0)}–${(+kg*2.2).toFixed(0)}g empfohlen` },
            { key:'carbs',   label:'Kohlenhydrate',  unit:'g',  color:C.water,   hint:'Rest-Kalorien nach Protein + Fett' },
            { key:'fat',     label:'Fett',           unit:'g',  color:C.mood,    hint:`Min. ${Math.round(+kg*0.8)}g (0.8g/kg KG)` },
            { key:'fiber',   label:'Ballaststoffe',  unit:'g',  color:C.success, hint:'DGE: min. 30g/Tag' },
          ];

          const commitEdit = () => {
            const v = parseFloat(editVal);
            if (!isNaN(v) && v > 0) setMO(prev=>({...prev,[editMacro]:Math.round(v)}));
            setEM(null); setEV('');
          };

          return <>
            {/* ── Kalorien-Hero ── */}
            <div style={{textAlign:'center',padding:'14px 0 10px'}}>
              <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',marginBottom:6}}>
                Täglicher Kalorienbedarf
              </div>
              <div style={{fontSize:48,fontWeight:700,color:C.accent,lineHeight:1}}>
                {result.toLocaleString('de-DE')}
              </div>
              <div style={{fontSize:13,color:C.muted,marginTop:3}}>kcal / Tag</div>
            </div>

            {/* ── Eingaben-Summary (kompakt) ── */}
            <div style={{...ST.card,background:C.cardAlt,marginBottom:14,padding:'10px 14px'}}>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {[
                  [sex==='m'?'♂':'♀', ''],
                  [age, 'J.'],
                  [Math.round(+kg), 'kg'],
                  [cm, 'cm'],
                  [ACT_LEVELS.find(a=>a.val===act)?.label, ''],
                  [GOALS.find(g=>g.val===goal)?.label, ''],
                  ['BMR: '+Math.round(sex==='m'?10*+kg+6.25*+cm-5*+age+5:10*+kg+6.25*+cm-5*+age-161), 'kcal'],
                ].map(([v,u],i)=> v ? (
                  <span key={i} style={{fontSize:11,padding:'2px 8px',borderRadius:6,
                    background:`${C.accent}14`,color:C.muted}}>
                    {v}{u?' '+u:''}
                  </span>
                ) : null)}
              </div>
            </div>

            {/* ══ Makronährstoff-Ziele ══ */}
            {computed && final && <>
              <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:'uppercase',
                marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span>Makronährstoff-Ziele</span>
                {Object.values(mo).some(v=>v!==null) && (
                  <button onClick={()=>setMO({protein:null,carbs:null,fat:null,fiber:null})}
                    style={{fontSize:10,color:C.muted,background:'none',border:`1px solid ${C.border}`,
                      borderRadius:5,padding:'2px 8px',cursor:'pointer',fontFamily:'inherit'}}>
                    Reset alle
                  </button>
                )}
              </div>

              {/* Makro-Karten Grid */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
                {MACRO_DEF.map(m => {
                  const val     = final[m.key];
                  const calcVal = computed[m.key];
                  const isOverride = mo[m.key] !== null;
                  const isEditing  = editMacro === m.key;
                  const pctOfKcal  = m.key!=='fiber'
                    ? Math.round((val * (m.key==='fat'?9:4)) / result * 100)
                    : null;

                  return (
                    <div key={m.key} style={{
                      ...ST.card, padding:'12px',
                      border:`1px solid ${isOverride?m.color+'60':C.border}`,
                      background: isOverride?`${m.color}08`:C.card,
                    }}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <span style={{fontSize:10,color:m.color,letterSpacing:0.6,textTransform:'uppercase',fontWeight:600}}>
                          {m.label}
                        </span>
                        {isOverride && (
                          <button onClick={()=>setMO(prev=>({...prev,[m.key]:null}))}
                            style={{fontSize:9,color:C.faint,background:'none',border:'none',
                              cursor:'pointer',padding:'0 2px',fontFamily:'inherit'}}>
                            ↺
                          </button>
                        )}
                      </div>

                      {isEditing ? (
                        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:4}}>
                          <input
                            autoFocus
                            type="number" inputMode="numeric"
                            value={editVal}
                            onChange={e=>setEV(e.target.value)}
                            onKeyDown={e=>{ if(e.key==='Enter') commitEdit(); if(e.key==='Escape'){setEM(null);setEV('');} }}
                            style={{...ST.inp,marginBottom:0,padding:'6px 8px',fontSize:14,
                              flex:1,borderColor:m.color}}
                            placeholder={String(val)}/>
                          <button onClick={commitEdit}
                            style={{padding:'6px 10px',borderRadius:6,fontSize:11,fontWeight:600,
                              background:m.color,color:C.bg,border:'none',cursor:'pointer',flexShrink:0}}>
                            ✓
                          </button>
                        </div>
                      ) : (
                        <div style={{display:'flex',alignItems:'baseline',gap:3,marginBottom:4}}>
                          <span style={{fontSize:26,fontWeight:700,
                            color:isOverride?m.color:C.text,lineHeight:1}}>
                            {val}
                          </span>
                          <span style={{fontSize:11,color:C.muted}}>{m.unit}</span>
                          {isOverride && (
                            <span style={{fontSize:9,color:m.color,marginLeft:2}}>✎</span>
                          )}
                        </div>
                      )}

                      {/* Kcal-Anteil */}
                      {pctOfKcal !== null && (
                        <div style={{marginBottom:6}}>
                          <div style={{display:'flex',justifyContent:'space-between',
                            fontSize:9,color:C.faint,marginBottom:2}}>
                            <span>{m.key==='fat'?val*9:val*4} kcal</span>
                            <span>{pctOfKcal}%</span>
                          </div>
                          <div style={{height:2,borderRadius:1,background:C.faint}}>
                            <div style={{width:`${Math.min(100,pctOfKcal)}%`,height:'100%',
                              borderRadius:1,background:m.color}}/>
                          </div>
                        </div>
                      )}

                      {/* Bearbeiten-Button / Hint */}
                      {!isEditing && (
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <span style={{fontSize:9,color:C.faint,lineHeight:1.4,flex:1,paddingRight:4}}>
                            {isOverride
                              ? <span style={{color:m.color+'AA'}}>Manuell · berechnet: {calcVal}g</span>
                              : m.hint}
                          </span>
                          <button
                            onClick={()=>{ setEM(m.key); setEV(String(val)); }}
                            style={{fontSize:10,color:C.faint,background:`${C.faint}18`,
                              border:`1px solid ${C.faint}30`,borderRadius:5,
                              padding:'3px 7px',cursor:'pointer',flexShrink:0,fontFamily:'inherit'}}>
                            ✎
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* ── Makro-Verteilungs-Balken ── */}
              <div style={{...ST.card,padding:'12px 14px',marginBottom:14}}>
                <div style={{fontSize:10,color:C.muted,letterSpacing:0.6,marginBottom:8}}>
                  Kalorienverteilung
                </div>
                {/* Stacked Bar */}
                <div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden',marginBottom:8}}>
                  <div style={{width:`${vert.p}%`,background:C.sport,transition:'width 0.3s'}}/>
                  <div style={{width:`${vert.c}%`,background:C.water,transition:'width 0.3s'}}/>
                  <div style={{width:`${vert.f}%`,background:C.mood,  transition:'width 0.3s'}}/>
                </div>
                <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                  {[
                    [C.sport, `Eiweiß ${vert.p}%`,         `${final.protein}g`],
                    [C.water, `Kohlenhydrate ${vert.c}%`,  `${final.carbs}g`],
                    [C.mood,  `Fett ${vert.f}%`,           `${final.fat}g`],
                  ].map(([col,lbl,val2])=>(
                    <div key={lbl} style={{display:'flex',alignItems:'center',gap:5}}>
                      <div style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0}}/>
                      <span style={{fontSize:10,color:C.muted}}>{lbl}</span>
                      <span style={{fontSize:10,color:C.text,fontWeight:600}}>{val2}</span>
                    </div>
                  ))}
                </div>
                {/* Wasser-Empfehlung */}
                <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${C.border}33`,
                  display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontSize:10,color:C.water}}>💧 Wasserempfehlung</span>
                  <span style={{fontSize:11,fontWeight:600,color:C.water}}>{final.water} ml/Tag</span>
                </div>
              </div>

              {/* ── Wissen kompakt ── */}
              <div style={{fontSize:10,color:C.faint,lineHeight:1.7,marginBottom:14,
                padding:'8px 12px',background:C.cardAlt,borderRadius:8,border:`1px solid ${C.border}`}}>
                <strong style={{color:C.muted}}>Methode:</strong> Mifflin-St-Jeor BMR × PAL (Aktivitätsfaktor).<br/>
                <strong style={{color:C.muted}}>Protein:</strong> ISSN 2017 — {goal<-200?'2.2':'goal'>0?'2.0':'1.8'}g/kg für dein Ziel.<br/>
                <strong style={{color:C.muted}}>Fett:</strong> DGE — min. 0.8g/kg, Ziel 27% der Kalorien.<br/>
                <strong style={{color:C.muted}}>Carbs:</strong> Restkalorien · <strong style={{color:C.muted}}>Ballaststoffe:</strong> DGE min. 30g/Tag.
              </div>
            </>}

            {/* ── Ziele übernehmen ── */}
            <button style={{...ST.btn(C.accent),marginBottom:8}}
              onClick={()=>{
                const f = final || {};
                onUpdateSettings({
                  sex, alter:+age||null, lastAct:act, lastGoal:goal,
                  ...(f.protein ? {proteinZiel:        f.protein}  : {}),
                  ...(f.carbs   ? {kohlenhydrateZiel:  f.carbs}    : {}),
                  ...(f.fat     ? {fettZiel:            f.fat}      : {}),
                  ...(f.fiber   ? {ballaststoffeZiel:   f.fiber}    : {}),
                  ...(f.water   ? {wasserZiel:          f.water}    : {}),
                });
                onSave(result);
              }}>
              {result.toLocaleString('de-DE')} kcal + Makros als Ziele setzen
            </button>
            <button style={{...ST.outbtn(C.muted)}}
              onClick={()=>{
                onUpdateSettings({sex,alter:+age||null,lastAct:act,lastGoal:goal});
                onSave(result);
              }}>
              Nur Kalorien übernehmen
            </button>
          </>;
        })() : (
          <div style={{textAlign:'center',padding:'20px',color:C.danger,fontSize:13,lineHeight:1.6}}>
            Bitte Alter in Schritt 1 eingeben —<br/>ohne Alter kann der Grundumsatz nicht berechnet werden.
          </div>
        )}
      </>}

      {/* ── Navigation ── */}
      <div style={{display:'flex',gap:8,marginTop:12}}>
        {step>0&&(
          <button style={{...ST.outbtn(C.muted),flex:1}}
            onClick={()=>goTo(step-1)}>
            ← Zurück
          </button>
        )}
        {step<3&&(
          <button style={{...ST.btn(C.accent),flex:2}}
            onClick={()=>goTo(step+1)}>
            {step===2?'Berechnen →':'Weiter →'}
          </button>
        )}
      </div>
    </div>
  );
}


// ── Sortierbare Chart-Liste (Drag & Drop + ▲/▼) ──────────────────────────────
function SortableChartList({ initialOrder, defs, onSave, onCancel }) {
  const [localOrder, setLocalOrder] = useState([...initialOrder]);
  const [dragIdx,    setDragIdx]    = useState(null);
  const [overIdx,    setOverIdx]    = useState(null);
  const defMap   = Object.fromEntries(defs.map(d=>[d.id,d]));
  const itemRefs = useRef({});

  const move = (idx, dir) => {
    const target = idx + dir;
    if (target < 0 || target >= localOrder.length) return;
    setLocalOrder(prev => {
      const next = [...prev];
      [next[idx], next[target]] = [next[target], next[idx]];
      return next;
    });
  };

  const applyDrop = (from, to) => {
    if (from === to || to === null) return;
    setLocalOrder(prev => {
      const next = [...prev];
      const [removed] = next.splice(from, 1);
      next.splice(to, 0, removed);
      return next;
    });
  };

  // ── Touch Drag ───────────────────────────────────────────────────────────
  const touchState = useRef({ active: false, startY: 0 });

  const onTouchStart = (e, idx) => {
    touchState.current = { active: true, startY: e.touches[0].clientY };
    setDragIdx(idx);
    setOverIdx(idx);
  };

  const onTouchMove = (e, idx) => {
    if (!touchState.current.active) return;
    // Scroll des Seiten-Body verhindern während Drag
    const touch = e.touches[0];
    let hit = null;
    for (const [id, el] of Object.entries(itemRefs.current)) {
      if (!el) continue;
      const r = el.getBoundingClientRect();
      if (touch.clientY >= r.top && touch.clientY <= r.bottom) {
        hit = localOrder.indexOf(id);
        break;
      }
    }
    if (hit !== null && hit !== overIdx) setOverIdx(hit);
  };

  const onTouchEnd = (e, idx) => {
    if (!touchState.current.active) return;
    touchState.current.active = false;
    applyDrop(dragIdx, overIdx);
    setDragIdx(null);
    setOverIdx(null);
  };

  return (
    <div>
      <div style={{fontSize:10,color:C.muted,letterSpacing:0.8,textTransform:'uppercase',marginBottom:10}}>
        Ziehen oder ▲/▼ tippen
      </div>

      {localOrder.map((id, idx) => {
        const def = defMap[id];
        if (!def) return null;
        const isFirst    = idx === 0;
        const isLast     = idx === localOrder.length - 1;
        const isDragging = dragIdx === idx;
        const dropAbove  = overIdx === idx && dragIdx !== null && dragIdx > idx;
        const dropBelow  = overIdx === idx && dragIdx !== null && dragIdx < idx;

        return (
          <div
            key={id}
            ref={el => { itemRefs.current[id] = el; }}
            onTouchStart={e => onTouchStart(e, idx)}
            onTouchMove={e => onTouchMove(e, idx)}
            onTouchEnd={e => onTouchEnd(e, idx)}
            style={{
              display:'flex', alignItems:'center', gap:8,
              padding:'8px 2px',
              marginTop:  dropAbove ? 0 : 0,
              borderTop:  dropAbove ? `2px solid ${C.accent}` : '2px solid transparent',
              borderBottom: dropBelow ? `2px solid ${C.accent}` : `1px solid ${C.border}`,
              background: isDragging ? `${def.color}18` : 'transparent',
              opacity: isDragging ? 0.55 : 1,
              transition: 'border-color 0.1s, background 0.1s, opacity 0.1s',
              touchAction: 'none',
              userSelect: 'none', WebkitUserSelect: 'none',
            }}>

            {/* Drag handle */}
            <span style={{
              fontSize:18, color:C.faint, flexShrink:0, lineHeight:1,
              padding:'0 2px', cursor:'grab', touchAction:'none',
            }}>⠿</span>

            <div style={{width:3,height:12,background:def.color,borderRadius:1,flexShrink:0}}/>

            <span style={{flex:1,fontSize:13,color:C.text,lineHeight:1.2,pointerEvents:'none'}}>
              {def.title.split(' (')[0]}
            </span>

            <button onClick={e=>{e.stopPropagation();move(idx,-1);}}
              style={{background:'none',border:'none',padding:'6px 8px',
                color:isFirst?C.faint:C.muted,fontSize:14,lineHeight:1,
                cursor:isFirst?'default':'pointer',opacity:isFirst?0.25:1,
                touchAction:'auto',WebkitTapHighlightColor:'transparent'}}>▲</button>

            <button onClick={e=>{e.stopPropagation();move(idx,1);}}
              style={{background:'none',border:'none',padding:'6px 8px',
                color:isLast?C.faint:C.muted,fontSize:14,lineHeight:1,
                cursor:isLast?'default':'pointer',opacity:isLast?0.25:1,
                touchAction:'auto',WebkitTapHighlightColor:'transparent'}}>▼</button>
          </div>
        );
      })}

      <div style={{display:'flex',gap:8,marginTop:14}}>
        <button style={{...ST.outbtn(C.muted),flex:1,padding:10,fontSize:13}} onClick={onCancel}>
          Abbrechen
        </button>
        <button style={{...ST.btn(C.accent),flex:2,padding:10,fontSize:13}} onClick={()=>onSave(localOrder)}>
          ✓ Speichern
        </button>
      </div>
    </div>
  );
}

// PROFIL-PANEL — Zweistufige Architektur
//
//  Ebene 1 (Übersicht):  Kategorien-Karten — zeigen nur Titel + Kurzzusammenfassung
//  Ebene 2 (Detailansicht): Klick → Karte expandiert, zeigt Werte als Read-only
//  Bearbeitungsmodus:    „Bearbeiten"-Button → Felder werden editierbar
//                        „Speichern" → Änderungen werden in settings persistiert
//                        „Abbrechen" → Draft wird verworfen, Ansicht bleibt offen
//
//  Datenstruktur je Kategorie:
//  {
//    id:       string            — eindeutiger Schlüssel
//    icon:     SVG-Element       — Icon für die Kategoriekarte
//    title:    string            — Anzeigename
//    color:    string            — Akzentfarbe
//    summary:  (settings) => string  — Kurzzusammenfassung für Ebene 1
//    viewRows: (settings) => [{label, value, unit?}]  — Read-only Detailzeilen
//    editFields: Array<FieldDef>  — Felder im Bearbeitungsmodus
//    readOnly?: bool             — keine Bearbeitung (Info-Karten)
//  }
// ══════════════════════════════════════════════════════════════════════════════

function ProfilePanel({ settings, setSettings, onClose, top, entries }) {
  // ── State ──────────────────────────────────────────────────────────────────
  const [openSec,  setOpenSec]  = useState(null);   // Ebene 2: welche Sektion ist auf?
  const [editSec,  setEditSec]  = useState(null);   // Bearbeitungsmodus: welche Sektion?
  const [draft,    setDraft]    = useState({});      // Temporäre Änderungen (nicht persistiert)
  const [saved,    setSaved]    = useState(null);    // Speichern-Feedback: id der Sektion
  const [showKcalCalc, setShowKcalCalc] = useState(false); // Kalorienrechner-Panel

  // Sektion öffnen/schließen; beim Öffnen editSec zurücksetzen
  const toggleSec = (id) => {
    if (openSec === id) {
      setOpenSec(null);
      setEditSec(null);
      setDraft({});
      setShowKcalCalc(false);
    } else {
      setOpenSec(id);
      setEditSec(null);
      setDraft({});
      setShowKcalCalc(false);
    }
  };

  // Bearbeitungsmodus öffnen → Draft mit aktuellen Werten befüllen
  const startEdit = (id) => {
    setEditSec(id);
    setDraft({...settings}); // shallow copy als Startpunkt
  };

  // Speichern → Draft in settings schreiben, kurzes Feedback zeigen
  const commitEdit = (id) => {
    setSettings(s => ({...s, ...draft}));
    setEditSec(null);
    setDraft({});
    setSaved(id);
    setTimeout(() => setSaved(null), 1800);
  };

  // Abbrechen → Draft verwerfen
  const cancelEdit = () => {
    setEditSec(null);
    setDraft({});
  };

  const d = (key, fallback='') => editSec ? (draft[key] ?? settings[key] ?? fallback) : (settings[key] ?? fallback);

  // ── Kategorie-Definitionen ─────────────────────────────────────────────────
  const lastWeight = entries.filter(e=>e.type==='gewicht').at(0)?.data.weight;
  const totalEntries = entries.length;
  const trackingDays = new Set(entries.map(e=>e.date)).size;

      const w    = lastWeight || settings.startWeight;
      const goalD= settings.lastGoal ?? 0;
      const autoM = kcal && w ? berechneMakros(kcal, w, goalD) : null;
      if (!autoM) return (
        <div key={field.key} style={{fontSize:10,color:C.faint,marginBottom:14,lineHeight:1.5,
          padding:'8px 10px',background:C.cardAlt,borderRadius:6}}>
          Für automatische Makro-Berechnung: Körperdaten (Gewicht) und Kalorien eintragen.
        </div>
      );
      return (
        <div key={field.key} style={{marginBottom:14}}>
          <div style={{fontSize:10,color:C.muted,letterSpacing:0.6,marginBottom:8}}>
            Automatisch berechnet für {kcal} kcal · {w} kg
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
            {[
              ['Eiweiß',        autoM.protein, 'proteinZiel',        C.sport],
              ['Kohlenhydrate', autoM.carbs,   'kohlenhydrateZiel',  C.water],
              ['Fett',          autoM.fat,     'fettZiel',           C.mood],
              ['Ballaststoffe', autoM.fiber,   'ballaststoffeZiel',  C.success],
            ].map(([label, val, key, col]) => (
              <div key={key} style={{padding:'8px 10px',borderRadius:8,
                background:`${col}10`,border:`1px solid ${col}30`,
                display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:9,color:col,letterSpacing:0.4,textTransform:'uppercase',marginBottom:1}}>{label}</div>
                  <div style={{fontSize:16,fontWeight:700,color:C.text}}>{val}<span style={{fontSize:10,color:C.muted,marginLeft:2}}>g</span></div>
                </div>
                <button onClick={()=>setDraft(dr=>({...dr,[key]:val}))}
                  style={{fontSize:9,padding:'3px 6px',borderRadius:5,border:`1px solid ${col}50`,
                    background:`${col}20`,color:col,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
                  ↓
                </button>
              </div>
            ))}
          </div>
          <button onClick={()=>setDraft(dr=>({...dr,
            proteinZiel:autoM.protein, kohlenhydrateZiel:autoM.carbs,
            fettZiel:autoM.fat, ballaststoffeZiel:autoM.fiber, wasserZiel:autoM.water}))}
            style={{...ST.outbtn(C.water),padding:'8px 0',fontSize:12,width:'100%'}}>
            ✦ Alle automatisch übernehmen
          </button>
        </div>
      );
    }

    // Standard: number / text
    return (
      <div key={field.key} style={{marginBottom:14}}>
        <label style={ST.lbl}>{field.label}</label>
        <input
          style={{...ST.inp,marginBottom:0}}
          type={field.type}
          inputMode={field.mode||undefined}
          step={field.step||undefined}
          placeholder={field.placeholder||''}
          value={draft[field.key] != null ? draft[field.key] : (settings[field.key] ?? '')}
          onChange={e=>{
            const raw = e.target.value;
            const val = field.type==='number' ? (raw===''?null:(+raw||0)) : raw;
            setDraft(dr=>({...dr,[field.key]:val}));
          }}
        />
      </div>
    );
  };

  // ── Render-Helfer: View-Zeile ─────────────────────────────────────────────
  const ViewRow = ({ label, value, unit, highlight, colorDot }) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
      padding:'8px 0',borderBottom:`1px solid ${C.border}33`}}>
      <span style={{fontSize:12,color:C.muted}}>{label}</span>
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        {colorDot && <div style={{width:14,height:14,borderRadius:4,background:colorDot,flexShrink:0}}/>}
        <span style={{fontSize:13,fontWeight:500,color:highlight||C.text}}>
          {value}{unit ? <span style={{fontSize:11,color:C.muted,marginLeft:3}}>{unit}</span> : null}
        </span>
      </div>
    </div>
  );

  // ── Profil-Header-Karte ────────────────────────────────────────────────────
  const ProfileHero = () => {
    const isEditing = editSec === 'hero';
    const nameVal = isEditing ? (draft.userName ?? settings.userName ?? '') : (settings.userName || '');
    return (
      <div style={{...ST.card, padding:'20px 16px', marginBottom:12, textAlign:'center'}}>
        <div style={{width:64,height:64,borderRadius:'50%',
          background:`${C.accent}20`,border:`2px solid ${C.accent}40`,
          display:'flex',alignItems:'center',justifyContent:'center',
          margin:'0 auto 12px'}}>
          {settings.userName
            ? <span style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:22,color:C.accent}}>{initials}</span>
            : <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          }
        </div>
        {isEditing
          ? <input style={{...ST.inp,textAlign:'center',marginBottom:0,fontSize:16,fontWeight:500}}
              placeholder="Dein Name" autoFocus
              value={nameVal}
              onChange={e=>setDraft(dr=>({...dr,userName:e.target.value}))}/>
          : <div style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:2,fontFamily:"'DM Serif Display',Georgia,serif"}}>
              {settings.userName || 'Kein Name'}
            </div>
        }
        <div style={{fontSize:11,color:C.faint,marginTop:isEditing?8:4}}>
          {totalEntries} Einträge · {trackingDays} Tage getrackt
        </div>
        {isEditing
          ? <div style={{display:'flex',gap:8,marginTop:12}}>
              <button onClick={cancelEdit}
                style={{flex:1,...ST.outbtn(C.muted),padding:'8px 0',fontSize:13}}>
                Abbrechen
              </button>
              <button onClick={()=>commitEdit('hero')}
                style={{flex:2,...ST.btn(C.accent),padding:'8px 0',fontSize:13}}>
                ✓ Speichern
              </button>
            </div>
          : <button onClick={()=>{ startEdit('hero'); }}
              style={{marginTop:10,background:`${C.accent}14`,border:`1px solid ${C.accent}40`,
                borderRadius:8,padding:'6px 18px',fontSize:12,color:C.accent,cursor:'pointer',fontFamily:'inherit'}}>
              ✎ Namen bearbeiten
            </button>
        }
      </div>
    );
  };

  // ── Haupt-Render ──────────────────────────────────────────────────────────
  return (
    <div style={{position:'fixed',inset:0,zIndex:400,background:C.bg,
      display:'flex',flexDirection:'column',overflow:'hidden'}}>

      {/* ── Panel-Header ── */}
      <div style={{flexShrink:0,padding:`calc(14px + ${top}) 20px 14px`,
        borderBottom:`1px solid ${C.border}`,
        display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:20,fontWeight:400,color:C.text}}>
          Profil
        </div>
        <button onClick={onClose}
          style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,
            color:C.muted,fontSize:13,padding:'5px 12px',cursor:'pointer',fontFamily:'inherit'}}>
          ✕ Schließen
        </button>
      </div>

      {/* ── Scrollbarer Inhalt ── */}
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch',padding:'16px 16px 48px'}}>

        {/* Ebene 0: Hero-Karte (Name + Avatar) */}
        <ProfileHero/>

        {/* Ebene 1 + 2: Kategorien-Akkordeon */}
        {SECTIONS.map(sec => {
          const isOpen   = openSec  === sec.id;
          const isEdit   = editSec  === sec.id;
          const wasSaved = saved    === sec.id;
          const sumText  = sec.summary(settings);
          const rows     = isOpen ? sec.viewRows(settings) : [];

          return (
            <div key={sec.id} style={{
              ...ST.card, padding:0, overflow:'hidden', marginBottom:8,
              border:`1px solid ${isOpen ? sec.color+'50' : C.border}`,
              transition:'border-color 0.2s',
            }}>

              {/* ══ Ebene 1: Kategorie-Kopfzeile (immer sichtbar) ══ */}
              <button
                onClick={()=>toggleSec(sec.id)}
                style={{width:'100%',background:'transparent',border:'none',cursor:'pointer',
                  padding:'13px 16px',display:'flex',alignItems:'center',gap:12,textAlign:'left'}}>

                {/* Farb-Indikator + Icon */}
                <div style={{width:34,height:34,borderRadius:9,flexShrink:0,
                  background:`${sec.color}18`,border:`1px solid ${sec.color}30`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:isOpen?sec.color:C.muted}}>
                  {sec.icon}
                </div>

                {/* Titel + Zusammenfassung */}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:isOpen?C.text:C.text,marginBottom:1}}>
                    {sec.title}
                  </div>
                  <div style={{fontSize:11,color:isOpen?sec.color:C.faint,
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                    transition:'color 0.2s'}}>
                    {wasSaved ? '✓ Gespeichert' : sumText}
                  </div>
                </div>

                {/* Chevron */}
                <span style={{fontSize:18,color:isOpen?sec.color:C.faint,flexShrink:0,
